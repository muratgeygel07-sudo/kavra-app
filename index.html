<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kavra — Dilleri keyifle öğren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F8FB; --surface:#FFFFFF; --ink:#17233B; --muted:#5B6579; --line:#E5EAF2;
  --brand:#0E7C6B; --brand-soft:#E2F3EF;
  --accent:#0E7C6B; --accent-soft:#E2F3EF; --accent-ink:#0A5A4E;
  --gold:#F5B93F; --gold-soft:#FDF3DC;
  --danger:#D64550; --ok:#1F9D62; --ok-soft:#E3F5EC;
  --radius:18px; --radius-sm:12px;
  --shadow:0 1px 2px rgba(23,35,59,.05),0 8px 24px -12px rgba(23,35,59,.12);
  --shadow-lg:0 4px 8px rgba(23,35,59,.06),0 20px 48px -16px rgba(23,35,59,.22);
  --font-display:"Bricolage Grotesque",system-ui,sans-serif;
  --font-body:"Instrument Sans",system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:1rem}
h1,h2,h3,h4{font-family:var(--font-display);line-height:1.15;letter-spacing:-.01em}
:focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* ---------- Auth / onboarding ---------- */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:
    radial-gradient(600px 400px at 12% 8%, rgba(14,124,107,.08), transparent 60%),
    radial-gradient(500px 380px at 88% 90%, rgba(245,185,63,.10), transparent 60%),
    var(--bg);}
.auth-card{width:100%;max-width:920px;background:var(--surface);border-radius:28px;box-shadow:var(--shadow-lg);display:grid;grid-template-columns:1.05fr 1fr;overflow:hidden;border:1px solid var(--line)}
.auth-hero{padding:52px 48px;background:linear-gradient(160deg,#0E7C6B 0%,#0A5A4E 100%);color:#F2FBF8;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-hero .halo{position:absolute;inset:auto -80px -120px auto;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(245,185,63,.35),transparent 65%)}
.brand{font-family:var(--font-display);font-weight:800;font-size:1.5rem;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
.brand .dot{width:12px;height:12px;border-radius:50%;background:var(--gold);display:inline-block}
.auth-hero h1{font-size:clamp(1.9rem,3.4vw,2.7rem);font-weight:800;margin:26px 0 14px}
.auth-hero p{color:#CBE9E1;max-width:34ch}
.hello-strip{display:flex;flex-wrap:wrap;gap:8px;margin-top:30px}
.hello-chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:6px 13px;border-radius:999px;font-size:.85rem;animation:floaty 5s ease-in-out infinite}
.hello-chip:nth-child(2){animation-delay:.7s}.hello-chip:nth-child(3){animation-delay:1.4s}
.hello-chip:nth-child(4){animation-delay:2.1s}.hello-chip:nth-child(5){animation-delay:2.8s}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.auth-body{padding:48px 44px}
.auth-body h2{font-size:1.5rem;margin-bottom:6px}
.auth-sub{color:var(--muted);font-size:.95rem;margin-bottom:24px}
.profile-list{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.profile-item{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);transition:border-color .15s, transform .15s;width:100%;text-align:left}
.profile-item:hover{border-color:var(--brand);transform:translateY(-1px)}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-family:var(--font-display);flex-shrink:0}
.profile-item .meta{flex:1}
.profile-item .meta b{display:block}
.profile-item .meta span{font-size:.83rem;color:var(--muted)}
.field{margin-bottom:16px}
.field label{display:block;font-weight:600;font-size:.9rem;margin-bottom:7px}
.field input[type=text]{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);background:#FBFCFE}
.field input[type=text]:focus{border-color:var(--brand);outline:none;box-shadow:0 0 0 3px var(--brand-soft)}
.lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.lang-opt{border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;transition:.15s;background:#FBFCFE}
.lang-opt .fl{font-size:1.5rem;display:block;margin-bottom:4px}
.lang-opt span{font-size:.82rem;font-weight:600}
.lang-opt.sel{border-color:var(--brand);background:var(--brand-soft)}
.goal-row{display:flex;gap:8px}
.goal-opt{flex:1;border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:10px;text-align:center;background:#FBFCFE}
.goal-opt b{display:block;font-family:var(--font-display)}
.goal-opt span{font-size:.78rem;color:var(--muted)}
.goal-opt.sel{border-color:var(--brand);background:var(--brand-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:999px;font-weight:700;font-size:.95rem;transition:transform .12s, box-shadow .12s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 6px 16px -6px var(--accent)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn-soft{background:var(--accent-soft);color:var(--accent-ink)}
.btn-block{width:100%}
.link-btn{color:var(--brand);font-weight:600;font-size:.9rem;text-decoration:underline;text-underline-offset:3px}

/* ---------- App shell ---------- */
.app{display:none;min-height:100vh}
.app.on{display:grid;grid-template-columns:236px 1fr}
.sidebar{background:var(--surface);border-right:1px solid var(--line);padding:22px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
.sidebar .brand{color:var(--ink);padding:4px 12px 18px;font-size:1.3rem}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:12px;font-weight:600;color:var(--muted);font-size:.95rem;width:100%;text-align:left;transition:.13s}
.nav-item svg{width:20px;height:20px;flex-shrink:0}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.on{background:var(--accent-soft);color:var(--accent-ink)}
.sidebar .spacer{flex:1}
.side-profile{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid var(--line)}
.side-profile .avatar{width:34px;height:34px;font-size:.85rem}
.side-profile b{font-size:.88rem;display:block;line-height:1.2}
.side-profile span{font-size:.75rem;color:var(--muted)}
.main{padding:26px 36px 80px;max-width:1060px;width:100%;margin:0 auto}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:26px;flex-wrap:wrap}
.topbar h2{font-size:1.55rem;font-weight:800;margin-right:auto}
.pill{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-weight:700;font-size:.9rem;box-shadow:var(--shadow)}
.pill .ico{font-size:1.05rem}
.pill.gold{background:var(--gold-soft);border-color:#F2DFAE;color:#8A6511}
.lang-switch{display:flex;gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px;box-shadow:var(--shadow)}
.lang-switch button{width:36px;height:36px;border-radius:50%;font-size:1.15rem;display:flex;align-items:center;justify-content:center;transition:.13s;filter:grayscale(.6);opacity:.65}
.lang-switch button:hover{filter:none;opacity:1}
.lang-switch button.on{background:var(--accent-soft);filter:none;opacity:1;box-shadow:inset 0 0 0 2px var(--accent)}

/* ---------- Cards & dashboard ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.grid{display:grid;gap:18px}
.grid.c2{grid-template-columns:1fr 1fr}
.grid.c3{grid-template-columns:repeat(3,1fr)}
.hero-card{background:linear-gradient(140deg,var(--accent) 0%,var(--accent-ink) 100%);color:#fff;border:none;position:relative;overflow:hidden}
.hero-card .halo{position:absolute;right:-60px;top:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.22),transparent 65%)}
.hero-card .greet{font-family:var(--font-display);font-size:clamp(1.7rem,3vw,2.3rem);font-weight:800;letter-spacing:-.02em}
.hero-card .greet-tr{opacity:.85;margin-top:2px;font-size:.95rem}
.hero-card .cta-row{margin-top:22px;display:flex;gap:10px;flex-wrap:wrap}
.hero-card .btn-primary{background:#fff;color:var(--accent-ink);box-shadow:none}
.hero-card .btn-ghost{border-color:rgba(255,255,255,.55);color:#fff}
.stat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-head h3{font-size:1.02rem}
.stat-big{font-family:var(--font-display);font-size:2.1rem;font-weight:800;line-height:1}
.stat-sub{color:var(--muted);font-size:.85rem;margin-top:5px}
.bar{height:10px;background:var(--bg);border-radius:999px;overflow:hidden;border:1px solid var(--line)}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-ink));border-radius:999px;transition:width .5s ease}
.bar.gold i{background:linear-gradient(90deg,#F5B93F,#E29B12)}
.ring-wrap{display:flex;align-items:center;gap:18px}
.ring{transform:rotate(-90deg)}
.ring .track{stroke:var(--bg)}
.ring .val{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.week-row{display:flex;gap:6px;margin-top:12px}
.week-day{flex:1;text-align:center;font-size:.72rem;color:var(--muted)}
.week-day .d{width:30px;height:30px;margin:0 auto 4px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--line);font-size:.95rem}
.week-day.hit .d{background:var(--gold-soft);border-color:var(--gold)}
.section-title{display:flex;align-items:baseline;gap:10px;margin:34px 0 14px}
.section-title h3{font-size:1.25rem;font-weight:800}
.section-title span{color:var(--muted);font-size:.88rem}

/* ---------- Lessons ---------- */
.level-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.level-tab{padding:9px 20px;border-radius:999px;border:1.5px solid var(--line);background:var(--surface);font-weight:700;font-size:.92rem;color:var(--muted);transition:.13s}
.level-tab:hover{border-color:var(--accent)}
.level-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.level-tab .pct{font-size:.75rem;opacity:.75;margin-left:5px}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.lesson-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;transition:transform .15s, box-shadow .15s;text-align:left}
.lesson-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.lesson-card .kind{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent-soft);padding:4px 10px;border-radius:999px;align-self:flex-start}
.lesson-card h4{font-size:1.08rem;font-weight:700}
.lesson-card p{font-size:.87rem;color:var(--muted);flex:1}
.lesson-card .foot{display:flex;align-items:center;justify-content:space-between;font-size:.82rem;color:var(--muted)}
.lesson-card .done-badge{color:var(--ok);font-weight:700;display:inline-flex;align-items:center;gap:5px}
.xp-tag{color:#8A6511;background:var(--gold-soft);padding:3px 9px;border-radius:999px;font-weight:700;font-size:.78rem}

/* ---------- Lesson view ---------- */
.lesson-view .back{margin-bottom:18px}
.lesson-head{display:flex;align-items:flex-start;gap:14px;justify-content:space-between;flex-wrap:wrap;margin-bottom:20px}
.lesson-head h2{font-size:1.7rem;font-weight:800;max-width:24ch}
.tr-toggle{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:.86rem;background:var(--surface);border:1.5px solid var(--line);padding:9px 16px;border-radius:999px;transition:.13s}
.tr-toggle.on{background:#FDECEA;border-color:#E5484D;color:#B3261E}
.prose{font-size:1.02rem;max-width:70ch}
.prose p{margin-bottom:14px}
.prose .tr-line{display:none;color:#B3261E;background:#FDECEA;border-radius:8px;padding:8px 12px;font-size:.92rem;margin:-6px 0 14px}
.tr-on .tr-line{display:block}
.tipbox{background:var(--gold-soft);border:1px solid #F2DFAE;border-radius:var(--radius-sm);padding:16px 18px;margin:20px 0;display:flex;gap:12px}
.tipbox .em{font-size:1.4rem;line-height:1}
.tipbox b{display:block;margin-bottom:3px;color:#7A5A0F;font-family:var(--font-display)}
.tipbox p{font-size:.93rem;color:#6B5313;margin:0}
.ex-list{display:flex;flex-direction:column;gap:10px;margin:16px 0 22px}
.sync-code-box{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--accent-soft);border:1.5px dashed var(--accent);border-radius:var(--radius-sm);padding:16px 18px;margin-top:8px}
.sync-code-box span{font-family:var(--font-display);font-size:1.5rem;font-weight:700;letter-spacing:3px;color:var(--accent-ink)}
.sync-code-box.small{padding:10px 14px}
.sync-code-box.small span{font-size:1.1rem;letter-spacing:2px}
.sync-pull-box{margin-top:18px;padding-top:18px;border-top:1px solid var(--line)}
.sync-pull-box label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:8px}
.sync-pull-box input{flex:1;border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;font-family:var(--font-body);font-size:.95rem}
.irr-table{display:flex;flex-direction:column;gap:2px;margin:16px 0}
.irr-row{display:grid;grid-template-columns:1fr 1fr 1fr 1.4fr;gap:8px;padding:10px 12px;border-radius:10px;font-size:14px;background:var(--surface)}
.irr-row:nth-child(odd){background:var(--bg)}
.irr-head{font-weight:700;background:var(--accent-soft)!important;color:var(--accent-ink)}
.irr-row span.tr{color:var(--muted);font-style:italic}
@media (max-width:640px){.irr-row{grid-template-columns:1fr 1fr 1fr;font-size:12px}.irr-row span:nth-child(4){grid-column:1/4;font-size:12px;padding-top:2px}}
.ex-item{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:var(--radius-sm);padding:13px 16px}
.ex-item .t{font-weight:600}
.ex-item .tr{color:var(--muted);font-size:.9rem;margin-top:3px;display:none}
.tr-on .ex-item .tr{display:block}
.ex-item .tr::before{content:"TR · ";font-weight:700;color:#B3261E}

/* ---------- Quiz ---------- */
.quiz-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow);max-width:640px}
.quiz-prog{display:flex;gap:6px;margin-bottom:20px}
.quiz-prog i{flex:1;height:6px;border-radius:99px;background:var(--bg);border:1px solid var(--line)}
.quiz-prog i.ok{background:var(--ok);border-color:var(--ok)}
.quiz-prog i.bad{background:var(--danger);border-color:var(--danger)}
.quiz-prog i.cur{background:var(--accent-soft);border-color:var(--accent)}
.quiz-q{font-size:1.15rem;font-weight:700;font-family:var(--font-display);margin-bottom:18px}
.quiz-opts{display:flex;flex-direction:column;gap:9px}
.quiz-opt{border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:13px 16px;text-align:left;font-size:.98rem;transition:.12s;background:#FBFCFE}
.quiz-opt:hover{border-color:var(--accent)}
.quiz-opt.correct{border-color:var(--ok);background:var(--ok-soft);font-weight:700}
.quiz-opt.wrong{border-color:var(--danger);background:#FDECEA}
.quiz-opt:disabled{cursor:default}
.quiz-exp{margin-top:14px;background:var(--accent-soft);border-radius:var(--radius-sm);padding:12px 15px;font-size:.9rem;color:var(--accent-ink);display:none}
.quiz-exp.show{display:block}
.fill-input{width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:var(--radius-sm);font-size:1rem;background:#FBFCFE}
.fill-input:focus{border-color:var(--accent);outline:none}
.quiz-foot{margin-top:18px;display:flex;justify-content:flex-end;gap:10px}
.result-card{text-align:center;padding:40px 26px}
.result-card .big-em{font-size:3.2rem}
.result-card h3{font-size:1.5rem;margin:10px 0 4px}
.result-card p{color:var(--muted)}
.result-card .xp-earn{display:inline-flex;margin:16px 0;font-size:1.05rem}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:99}
.confetti i{position:absolute;width:9px;height:14px;top:-20px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.4}}

/* ---------- Flashcards & matching ---------- */
.flash-stage{max-width:520px;margin:0 auto;text-align:center}
.flash-card{perspective:1200px;height:250px;margin-bottom:20px;cursor:pointer}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flash-card.flip .flash-inner{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px;border:1px solid var(--line);box-shadow:var(--shadow-lg)}
.flash-face.front{background:var(--surface)}
.flash-face.back{background:linear-gradient(150deg,var(--accent),var(--accent-ink));color:#fff;transform:rotateY(180deg)}
.flash-face .w{font-family:var(--font-display);font-size:2rem;font-weight:800}
.flash-face .hint{font-size:.83rem;color:var(--muted)}
.flash-face.back .hint{color:rgba(255,255,255,.8)}
.flash-face .ex{font-size:.92rem;opacity:.9;font-style:italic}
.flash-btns{display:flex;gap:10px;justify-content:center}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:600px;margin:0 auto}
.match-tile{border:1.5px solid var(--line);background:var(--surface);border-radius:var(--radius-sm);padding:15px 12px;font-weight:600;font-size:.95rem;transition:.12s;box-shadow:var(--shadow)}
.match-tile:hover{border-color:var(--accent)}
.match-tile.sel{border-color:var(--accent);background:var(--accent-soft)}
.match-tile.ok{border-color:var(--ok);background:var(--ok-soft);color:var(--ok);pointer-events:none;opacity:.75}
.match-tile.shake{animation:shake .3s}
@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ---------- Reading & writing ---------- */
.read-passage{font-size:1.08rem;line-height:1.85;max-width:66ch}
.read-sent{cursor:pointer;border-radius:6px;padding:1px 3px;transition:background .12s}
.read-sent:hover{background:var(--accent-soft)}
.read-sent.open{background:var(--accent-soft)}
.read-tr{display:block;background:#FDECEA;color:#B3261E;border-radius:8px;padding:8px 12px;font-size:.9rem;margin:6px 0 8px;line-height:1.5}
.glossary{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.gloss-chip{background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:.85rem;transition:.12s}
.gloss-chip:hover{border-color:var(--accent)}
.gloss-chip b{color:var(--accent-ink)}
.write-area{width:100%;min-height:170px;border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:15px;font-family:inherit;font-size:1rem;resize:vertical;background:#FBFCFE}
.write-area:focus{border-color:var(--accent);outline:none}
.check-list{display:flex;flex-direction:column;gap:9px;margin:14px 0}
.check-item{display:flex;gap:10px;align-items:flex-start;font-size:.93rem}
.check-item input{margin-top:3px;accent-color:var(--accent);width:17px;height:17px}
.sample-box{background:var(--bg);border:1px dashed var(--line);border-radius:var(--radius-sm);padding:16px;font-size:.95rem;margin-top:14px}
.hidden{display:none!important}

/* ---------- Badges & profile ---------- */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.badge-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 14px;text-align:center;box-shadow:var(--shadow)}
.badge-card .em{font-size:2.2rem;display:block;margin-bottom:8px}
.badge-card b{display:block;font-size:.92rem;font-family:var(--font-display)}
.badge-card span{font-size:.78rem;color:var(--muted)}
.badge-card.locked{opacity:.45;filter:grayscale(1)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:999px;font-weight:600;font-size:.93rem;box-shadow:var(--shadow-lg);transition:transform .3s;z-index:100;display:flex;gap:9px;align-items:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.prog-lang-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.prog-lang-row:last-child{border-bottom:none}
.prog-lang-row .fl{font-size:1.4rem}
.prog-lang-row .meta{flex:1}
.prog-lang-row .meta b{font-size:.92rem}
.prog-lang-row .bar{margin-top:5px}

/* ---------- Responsive ---------- */
@media(max-width:900px){
  .auth-card{grid-template-columns:1fr}
  .auth-hero{padding:34px 30px}
  .app.on{grid-template-columns:1fr}
  .sidebar{position:fixed;bottom:0;top:auto;height:auto;width:100%;flex-direction:row;padding:8px 10px;border-right:none;border-top:1px solid var(--line);z-index:50;justify-content:space-around}
  .sidebar .brand,.sidebar .spacer,.side-profile,.nav-item span.lbl{display:none}
  .nav-item{flex-direction:column;gap:3px;font-size:.68rem;padding:8px 10px}
  .main{padding:20px 16px 110px}
  .grid.c2,.grid.c3{grid-template-columns:1fr}
  .match-grid{grid-template-columns:1fr 1fr}
}

   tip:"'If I was' yerine 'If I were' kullan (If I were you...) — resmi ve doğru kabul edilen budur. Ayrıca 'would' asla if'li tarafa girmez: 'If I would have...' ✗",
   ex:[{t:"If I were you, I would accept the offer.",tr:"Senin yerinde olsam teklifi kabul ederdim."},{t:"If we had left earlier, we wouldn't have missed the flight.",tr:"Daha erken çıksaydık uçağı kaçırmazdık."},{t:"She would learn faster if she practised daily.",tr:"Her gün pratik yapsa daha hızlı öğrenirdi."}],
   quiz:[
    {q:"If I ___ rich, I would buy a boat.",o:["am","were","would be"],a:1,e:"2. tip: If + past (were)."},
    {q:"If you had called me, I ___ you up.",o:["would pick","would have picked","picked"],a:1,e:"3. tip: would have + V3."},
    {q:"Hangisi yanlış?",o:["If I were you...","If I would know...","If she had seen it..."],a:1,e:"'Would' if tarafında kullanılmaz."}
   ]},
  {t:"Passive Voice (Edilgen)", d:"Eylem önde, fail geride",
   body:[
    {p:"Yapı: <b>be + V3</b>. Zamanı 'be' fiili taşır: is made, was made, has been made, will be made. Fail önemliyse <b>by</b> ile eklenir.", tr:"Türkçedeki '-il/-in' edilgenliği: 'yapıldı' = it was made."},
    {p:"Ne zaman? Faili bilinmeyen, önemsiz ya da bariz olduğunda; rapor ve teknik metinlerde yoğun kullanılır: <b>The units are tested before shipment.</b>", tr:"Teknik/ticari İngilizcenin bel kemiğidir — e-posta ve kataloglarda çok işine yarar."}
   ],
   tip:"Aktif cümledeki nesneyi başa taşı, 'be' fiilini orijinal zamanda çek, ana fiili V3 yap. 'Siemens supplies the controllers' → 'The controllers are supplied by Siemens.'",
   ex:[{t:"The heat pumps are manufactured in İzmir.",tr:"Isı pompaları İzmir'de üretiliyor."},{t:"The order was shipped yesterday.",tr:"Sipariş dün gönderildi."},{t:"A new model has been developed.",tr:"Yeni bir model geliştirildi."}],
   quiz:[
    {q:"English ___ all over the world.",o:["speaks","is spoken","is speaking"],a:1,e:"Edilgen: is + spoken."},
    {q:"The invoice ___ sent tomorrow.",o:["will be","will","is being"],a:0,e:"Gelecek edilgen: will be + V3."},
    {q:"Edilgen yap: 'They test every unit.' → Every unit ___ tested.",fill:1,a:"is",e:"Geniş zaman edilgen: is tested."}
   ]}
 ],

 reading:{t:"The Remote Work Debate", sents:[
  {s:"Remote work has been adopted by thousands of companies since the pandemic.",tr:"Uzaktan çalışma pandemiden bu yana binlerce şirket tarafından benimsendi."},
  {s:"Supporters argue that employees are more productive when commuting is eliminated.",tr:"Destekleyenler, işe gidiş geliş ortadan kalkınca çalışanların daha üretken olduğunu savunuyor."},
  {s:"Critics, however, claim that creativity suffers if teams never meet in person.",tr:"Eleştirmenler ise ekipler hiç yüz yüze görüşmezse yaratıcılığın zarar gördüğünü iddia ediyor."},
  {s:"If offices had been redesigned earlier, the transition would have been smoother.",tr:"Ofisler daha önce yeniden tasarlansaydı geçiş daha pürüzsüz olurdu."},
  {s:"Whatever the outcome, flexible models are unlikely to disappear.",tr:"Sonuç ne olursa olsun, esnek modellerin ortadan kalkması pek olası değil."}],
  gloss:[["adopted","benimsendi"],["commuting","işe gidiş geliş"],["transition","geçiş"],["unlikely","olası değil"]],
  qs:[{q:"Eleştirmenlerin endişesi ne?",o:["Maliyet artışı","Yaratıcılığın azalması","Teknik sorunlar"],a:1},{q:"Metne göre esnek modeller...",o:["kaybolacak","kalıcı görünüyor","yasaklandı"],a:1}]},
 writing:{p:"'Uzaktan çalışma mı, ofis mi?' — İki tarafı da tartan kısa bir görüş paragrafı yaz (8-10 cümle).",
  ck:["En az bir edilgen cümle kullandım","Bir 2. veya 3. tip koşul cümlesi kurdum","'however / whereas / nevertheless' gibi bağlaçlar kullandım"],
  sample:"Remote work is often presented as the future of business. Meetings can be held online, and time is saved every day. However, some skills are developed only in person. If I were a manager, I would offer a hybrid model. Whereas full remote suits some roles, teamwork often needs a shared space. Nevertheless, flexibility should be protected wherever possible."}
},
C1:{
 grammar:[
  {t:"Inversion (Devrik Vurgu)", d:"Cümleye edebi güç katmak",
   body:[
    {p:"Olumsuz/kısıtlayıcı ifadeler başa alınınca özne-fiil ters döner: <b>Never have I seen</b> such quality. <b>Not only did we finish</b> early, but we also...", tr:"Türkçedeki devrik cümlenin vurgu gücüne benzer; yazılı sınavlarda ve etkileyici konuşmalarda puan getirir."},
    {p:"Sık kalıplar: <b>Never, Rarely, Not only, No sooner ... than, Under no circumstances, Only then</b>.", tr:"Kural: sanki soru cümlesi kuruyormuş gibi yardımcı fiili öne al."}
   ],
   tip:"'Not only' ile başladıysan devam eden yarıda 'but also' beklendiğini unutma: Not only did sales rise, but customer trust also grew.",
   ex:[{t:"Never have we received such positive feedback.",tr:"Hiç bu kadar olumlu geri bildirim almamıştık."},{t:"No sooner had I arrived than the meeting started.",tr:"Ben varır varmaz toplantı başladı."},{t:"Under no circumstances should this document be shared.",tr:"Bu belge hiçbir koşulda paylaşılmamalıdır."}],
   quiz:[
    {q:"Rarely ___ such a clear explanation.",o:["I have heard","have I heard","I heard have"],a:1,e:"Devrik yapı: yardımcı fiil özneden önce."},
    {q:"Not only ___ the deadline, but we also cut costs.",o:["we met","did we meet","we did meet"],a:1,e:"Not only + did + özne + fiil."},
    {q:"No sooner had she left ___ it started to rain.",fill:1,a:"than",e:"No sooner ... than kalıbı."}
   ]},
  {t:"Speculation Modals: must/can't/might have", d:"Geçmişe dair akıl yürütme",
   body:[
    {p:"Geçmiş hakkında çıkarım: <b>must have V3</b> (kesin olmuştur), <b>can't have V3</b> (imkânsız), <b>might/could have V3</b> (belki).", tr:"Türkçedeki '-mış olmalı / olamaz / olabilir' üçlüsünün birebir karşılığı."},
    {p:"Dikkat: 'mustn't have' çıkarım için kullanılmaz; olumsuz çıkarımın doğru biçimi <b>can't have</b>'dir.", tr:"'Gelmemiş olmalı' derken bile: He can't have come."}
   ],
   tip:"Kanıt gücüne göre seç: ışıklar yanıyorsa 'They must have arrived' (güçlü kanıt); araba yoksa 'They might have gone out' (zayıf kanıt).",
   ex:[{t:"The ground is wet — it must have rained.",tr:"Yer ıslak — yağmur yağmış olmalı."},{t:"She can't have finished already; it's too soon.",tr:"Şimdiden bitirmiş olamaz; çok erken."},{t:"He might have missed the train.",tr:"Treni kaçırmış olabilir."}],
   quiz:[
    {q:"The lights are off. They ___ left.",o:["must have","can't have","should"],a:0,e:"Güçlü kanıt → must have left."},
    {q:"You ___ seen Ayşe; she's abroad!",o:["might have","must have","can't have"],a:2,e:"İmkânsızlık → can't have."},
    {q:"'Anahtarları evde unutmuş olabilirim.' → I ___ have left the keys at home.",fill:1,a:"might",e:"İhtimal → might have + V3."}
   ]}
 ],
 vocab:[
  {w:"compelling",tr:"ikna edici, sürükleyici",ex:"She made a compelling argument."},{w:"scrutinize",tr:"ince ince incelemek",ex:"The contract was scrutinized by lawyers."},
  {w:"albeit",tr:"her ne kadar ... olsa da",ex:"A useful, albeit expensive, solution."},{w:"undermine",tr:"baltalamak, zayıflatmak",ex:"Doubt can undermine confidence."},
  {w:"feasible",tr:"uygulanabilir",ex:"Is the plan technically feasible?"},{w:"nuance",tr:"ince ayrım, nüans",ex:"The translation missed the nuance."},
  {w:"leverage",tr:"kaldıraç olarak kullanmak",ex:"We can leverage our network."},{w:"paradigm",tr:"paradigma, model",ex:"A new paradigm in energy."}
 ],
 reading:{t:"The Quiet Power of Constraints", sents:[
  {s:"Rarely do we consider that limitation itself might be a source of creativity.",tr:"Kısıtlamanın bizzat bir yaratıcılık kaynağı olabileceğini nadiren düşünürüz."},
  {s:"Poets who accept the rigid form of a sonnet often produce their most compelling work within it.",tr:"Sonenin katı biçimini kabul eden şairler, en sürükleyici eserlerini çoğu zaman onun içinde üretir."},
  {s:"Engineers, likewise, must have noticed that scarce resources force elegant solutions.",tr:"Mühendisler de benzer şekilde, kıt kaynakların zarif çözümleri zorladığını fark etmiş olmalılar."},
  {s:"Had unlimited budgets been available, many iconic designs would never have emerged.",tr:"Sınırsız bütçeler mevcut olsaydı, birçok ikonik tasarım asla ortaya çıkmazdı."},
  {s:"Constraints, albeit frustrating, may be the invisible architecture of invention.",tr:"Kısıtlamalar, sinir bozucu olsalar da, buluşun görünmez mimarisi olabilir."}],
  gloss:[["rigid","katı"],["scarce","kıt"],["emerge","ortaya çıkmak"],["invention","buluş"]],
  qs:[{q:"Metnin ana fikri nedir?",o:["Bütçeler artırılmalı","Kısıtlar yaratıcılığı besleyebilir","Şairler mühendislerden yaratıcıdır"],a:1},{q:"'albeit frustrating' ne anlama gelir?",o:["sinir bozucu olsa da","sinir bozucu olduğu için","asla sinir bozucu olmayan"],a:0}]},
 writing:{p:"'Kısıtlamalar yaratıcılığı artırır mı?' — Devrik yapı ve spekülasyon modalları kullanarak 10-12 cümlelik bir deneme paragrafı yaz.",
  ck:["En az bir devrik cümle kurdum (Never/Not only/Rarely...)","'must have / might have' türü bir çıkarım cümlesi kullandım","İleri bağlaçlardan birini kullandım (albeit, whereas, nevertheless)"],
  sample:"Rarely does abundance produce originality. Not only do constraints focus the mind, but they also eliminate easy answers. The great inventors of the past must have felt limited by their tools, yet those limits shaped their genius. Had everything been possible, nothing distinctive would have emerged. Albeit uncomfortable, a boundary is often a canvas."}
}
},

de:{
A1:{
 grammar:[
  {t:"Artikeller: der, die, das", d:"Almancanın kimlik kartları",
   body:[
    {p:"Her ismin bir cinsiyeti vardır: <b>der</b> (eril), <b>die</b> (dişil), <b>das</b> (nötr). Çoğul her zaman <b>die</b>.", tr:"Türkçede artikel yoktur, bu yüzden kelimeyi artikeliyle birlikte tek parça ezberle: 'Tisch' değil 'der Tisch'."},
    {p:"İpuçları: <b>-ung, -heit, -keit, -ion</b> ile bitenler hep <b>die</b>; <b>-chen, -lein</b> ile bitenler hep <b>das</b>.", tr:"Bu ekler yüzlerce kelimenin artikelini bedavaya getirir."}
   ],
   tip:"Kelimeleri renk koduyla öğren: der = mavi, die = kırmızı, das = yeşil. Beyin görsel etiketi kelimeyle birlikte saklar; sınavda renk aklına gelir.",
   ex:[{t:"Der Mann trinkt Kaffee.",tr:"Adam kahve içiyor."},{t:"Die Lampe ist neu.",tr:"Lamba yeni."},{t:"Das Kind spielt im Garten.",tr:"Çocuk bahçede oynuyor."},{t:"Die Bücher sind alt.",tr:"Kitaplar eski (çoğul → die)."}],
   quiz:[
    {q:"___ Zeitung (gazete) — '-ung' ile bitiyor.",o:["der","die","das"],a:1,e:"-ung ile bitenler her zaman die."},
    {q:"___ Mädchen (kız çocuğu)",o:["der","die","das"],a:2,e:"-chen ile bitenler das — anlamı dişil olsa bile!"},
    {q:"Çoğul isimlerin artikeli her zaman: ___",fill:1,a:"die",e:"Çoğulda istisnasız die kullanılır."}
   ]},
  {t:"Präsens: Fiil Çekimi", d:"ich lerne, du lernst...",
   body:[
    {p:"Fiil kökü + şahıs eki: ich lern<b>e</b>, du lern<b>st</b>, er/sie/es lern<b>t</b>, wir lern<b>en</b>, ihr lern<b>t</b>, sie/Sie lern<b>en</b>.", tr:"Türkçe gibi Almanca da şahıs eki kullanır — bu yüzden Türkler bu konuda avantajlıdır."},
    {p:"Bazı fiiller du/er formunda ünlü değiştirir: fahren → du f<b>ä</b>hrst, sprechen → du spr<b>i</b>chst, lesen → du l<b>ie</b>st.", tr:"a→ä ve e→i/ie değişimleri sadece du ve er/sie/es formlarında olur."}
   ],
   tip:"'sein' (olmak) ve 'haben' (sahip olmak) fiillerini şarkı gibi ezberle: ich bin, du bist, er ist... Bunlar ileride tüm geçmiş zamanın temeli olacak.",
   ex:[{t:"Ich lerne Deutsch.",tr:"Almanca öğreniyorum."},{t:"Du sprichst sehr gut.",tr:"Çok iyi konuşuyorsun."},{t:"Er fährt nach Berlin.",tr:"O Berlin'e gidiyor."},{t:"Wir haben eine Katze.",tr:"Bir kedimiz var."}],
   quiz:[
    {q:"Du ___ Fußball. (spielen)",o:["spielt","spielst","spielen"],a:1,e:"du → -st eki."},
    {q:"Sie (o, kadın) ___ ein Buch. (lesen)",o:["lest","liest","lese"],a:1,e:"lesen düzensiz: er/sie liest."},
    {q:"'Ben öğrenciyim' → Ich ___ Student.",fill:1,a:"bin",e:"sein fiili: ich bin."}
   ]}
 ],

 ],

 writing:{p:"Kendini ve aileni 5 cümleyle tanıt (Ich heiße..., Ich wohne..., Mein/e ...).",

A2:{
 grammar:[
  {t:"Akkusativ: den görünce korkma", d:"Nesne hali",
   body:[
    {p:"Cümlenin nesnesi Akkusativ'e girer ve sadece <b>eril</b> artikel değişir: der → <b>den</b>, ein → <b>einen</b>. die, das aynı kalır.", tr:"Türkçedeki '-i hali' (adamı, kitabı) ile aynı mantık — sadece artikel üzerinden gösterilir."},
    {p:"Bazı fiiller hep Akkusativ ister: haben, sehen, kaufen, suchen, brauchen, es gibt.", tr:"'Es gibt einen Park' — 'es gibt' her zaman Akkusativ alır."}
   ],
   tip:"Soruyu sor: 'Kimi/neyi?' Cevap olan şey Akkusativ'dir. 'Ich sehe den Mann' — kimi görüyorum? Adamı. Eril ise den/einen yap, gerisi bedava.",
   ex:[{t:"Ich habe einen Bruder.",tr:"Bir erkek kardeşim var."},{t:"Er kauft den Tisch.",tr:"O masayı satın alıyor."},{t:"Wir sehen das Auto.",tr:"Arabayı görüyoruz (das değişmez)."},{t:"Sie sucht eine Wohnung.",tr:"O bir daire arıyor (die → eine, değişmez)."}],
   quiz:[
    {q:"Ich brauche ___ Stift. (der Stift)",o:["der","den","dem"],a:1,e:"Nesne + eril → den."},
    {q:"Siehst du ___ Frau? (die Frau)",o:["die","den","der"],a:0,e:"Dişil Akkusativ'de değişmez: die."},
    {q:"Es gibt ___ Garten hier. (ein → ?)",fill:1,a:"einen",e:"es gibt + Akkusativ, eril → einen."}
   ]},
  {t:"Perfekt: Konuşma dilinin geçmişi", d:"habe gemacht, bin gegangen",
   body:[
    {p:"Günlük konuşmada geçmiş için Perfekt kullanılır: <b>haben/sein + Partizip II</b> (ge-...-t / ge-...-en): Ich habe gearbeitet. Ich bin gegangen.", tr:"Türkçedeki '-di'nin konuşma dilindeki karşılığı. Partizip cümlenin sonuna gider!"},
    {p:"<b>sein</b> ile: hareket (gehen, fahren, fliegen) ve durum değişikliği (aufstehen, einschlafen) fiilleri. Gerisi <b>haben</b>.", tr:"'Gitmek, gelmek, uçmak' → sein; 'yemek, görmek, almak' → haben."}
   ],
   tip:"Cümleyi köprü gibi kur: yardımcı fiil 2. pozisyonda, Partizip en sonda. 'Ich habe gestern mit Ali Fußball gespielt.' Araya ne girerse girsin Partizip sonda bekler.",
   ex:[{t:"Ich habe eine Pizza gegessen.",tr:"Bir pizza yedim."},{t:"Wir sind nach Wien gefahren.",tr:"Viyana'ya gittik."},{t:"Hast du das Buch gelesen?",tr:"Kitabı okudun mu?"},{t:"Sie ist früh aufgestanden.",tr:"O erken kalktı."}],
   quiz:[
    {q:"Ich ___ gestern Deutsch gelernt.",o:["bin","habe","hat"],a:1,e:"lernen → haben ile."},
    {q:"Er ___ nach Hause gegangen.",o:["hat","ist","sind"],a:1,e:"gehen hareket fiili → sein."},
    {q:"'machen' fiilinin Partizip II hali: ge___",fill:1,a:"macht",e:"machen → gemacht."}
   ]}
 ],

B1:{
 grammar:[
  {t:"Dativ ve Wechselpräpositionen", d:"Nerede? Nereye?",
   body:[
    {p:"Dativ artikelleri: der→<b>dem</b>, die→<b>der</b>, das→<b>dem</b>, çoğul→<b>den+n</b>. 'Kime/nerede?' sorusuna cevap verir.", tr:"Türkçedeki '-e hali' ve '-de hali'nin birleşimi gibi düşünebilirsin."},
    {p:"9 değişken edat (an, auf, in, über, unter, vor, hinter, neben, zwischen): <b>Nereye? → Akkusativ</b>, <b>Nerede? → Dativ</b>. 'Ich gehe in die Küche' (yön) ama 'Ich bin in der Küche' (konum).", tr:"Hareket varsa Akkusativ, durağanlık varsa Dativ — altın kural."}
   ],
   tip:"'Wohin? → Akkusativ, Wo? → Dativ' cümlesini bir mantra gibi tekrarla. Ayrıca kalıp halinde ezberle: 'in der Schule, auf dem Tisch, an der Wand' — beyin kalıpları kurallardan hızlı çağırır.",
   ex:[{t:"Ich helfe dem Kind.",tr:"Çocuğa yardım ediyorum (helfen hep Dativ)."},{t:"Die Lampe hängt über dem Tisch.",tr:"Lamba masanın üzerinde asılı (konum → Dativ)."},{t:"Er legt das Buch auf den Tisch.",tr:"Kitabı masanın üstüne koyuyor (yön → Akkusativ)."}],
   quiz:[
    {q:"Ich wohne in ___ Stadt. (die)",o:["die","der","dem"],a:1,e:"Konum (Wo?) → Dativ: der Stadt."},

B2:{
 grammar:[
  {t:"Konjunktiv II: höflich ve hayali", d:"wäre, hätte, würde",
   body:[
    {p:"Gerçek dışı durumlar ve kibarlık için: <b>wäre</b> (olsaydı), <b>hätte</b> (olsaydı/sahip olsaydı), <b>würde + Infinitiv</b> (yapardı). <b>Wenn ich Zeit hätte, würde ich reisen.</b>", tr:"Türkçedeki '-se ... -irdi' kalıbı. İş Almancasında kibar rica için vazgeçilmez: 'Könnten Sie...?'"},
    {p:"Geçmiş hayali için: <b>hätte/wäre + Partizip II</b>: Wenn ich das gewusst hätte, wäre ich gekommen.", tr:"'Bilseydim gelirdim' — geçmişe dönük pişmanlık."}
   ],
   tip:"E-postalarda üç sihirli kalıp: 'Ich hätte eine Frage', 'Könnten Sie mir bitte...', 'Es wäre schön, wenn...'. Bu üçlü seni anında profesyonel gösterir.",
   ex:[{t:"An deiner Stelle würde ich das Angebot annehmen.",tr:"Senin yerinde olsam teklifi kabul ederdim."},{t:"Hätten Sie morgen Zeit?",tr:"Yarın vaktiniz olur muydu? (kibar)"},{t:"Wenn er früher gekommen wäre, hätte er den Chef getroffen.",tr:"Daha erken gelseydi patronla görüşürdü."}],
   quiz:[
    {q:"Wenn ich reich ___, würde ich eine Weltreise machen.",o:["bin","wäre","war"],a:1,e:"Gerçek dışı şart → wäre."},
    {q:"Kibar rica: '___ Sie mir bitte helfen?'",o:["Können","Könnten","Konnten"],a:1,e:"Konjunktiv II kibarlığı: Könnten."},
    {q:"Wenn ich das gewusst ___, wäre ich nicht gegangen.",fill:1,a:"hätte",e:"Geçmiş: hätte + Partizip II."}
   ]},
  {t:"Passiv: werden + Partizip II", d:"Süreç odaklı anlatım",
   body:[
    {p:"Yapı: <b>werden + Partizip II</b>: Das Haus <b>wird gebaut</b> (inşa ediliyor), <b>wurde gebaut</b> (edildi), <b>ist gebaut worden</b> (edilmiş durumda).", tr:"Türkçe '-il' edilgeni. Teknik dokümanlarda ve iş yazışmalarında standart."},
    {p:"Zustandspassiv (durum edilgeni) 'sein' ile kurulur: Die Tür <b>ist geöffnet</b> — süreç değil sonuç vurgulanır.", tr:"'wird geöffnet' = açılıyor (süreç); 'ist geöffnet' = açık (durum)."}
   ],
   tip:"Faili söylemek istersen 'von + Dativ': Die Anlage wird von Siemens gesteuert. Teknik metinde fail çoğu zaman gereksizdir — atmaktan çekinme.",
   ex:[{t:"Die Wärmepumpen werden in Izmir produziert.",tr:"Isı pompaları İzmir'de üretiliyor."},{t:"Der Vertrag wurde gestern unterschrieben.",tr:"Sözleşme dün imzalandı."},{t:"Das Problem ist schon gelöst.",tr:"Sorun zaten çözülmüş durumda."}],
   quiz:[
    {q:"Das Auto ___ repariert. (şu an tamir ediliyor)",o:["wird","ist","hat"],a:0,e:"Süreç edilgeni → wird repariert."},
    {q:"Die E-Mail ___ gestern geschickt.",o:["wird","wurde","ist"],a:1,e:"Geçmiş edilgen → wurde."},
    {q:"Fail eklemek için hangi edat? '___ der Firma'",fill:1,a:"von",e:"Passiv'de fail: von + Dativ."}
   ]}
 ],

C1:{
 grammar:[
  {t:"Nominalisierung", d:"Fiilden isme: resmi üslup",
   body:[
    {p:"Akademik ve resmi Almancada fiiller isimleşir: prüfen → <b>die Prüfung</b>, entscheiden → <b>die Entscheidung</b>. 'Nachdem wir geprüft hatten' yerine <b>'Nach der Prüfung'</b>.", tr:"Türkçedeki '-ma/-me' isimleştirmesi gibi: 'inceledikten sonra' → 'incelemenin ardından'."},
    {p:"Sık dönüşümler: bei + isim (= -irken), nach + isim (= -dikten sonra), durch + isim (= -erek), trotz + Genitiv (= -e rağmen).", tr:"Bu yapı raporları kısaltır ve profesyonelleştirir; C1 sınavlarının favorisidir."}
   ],
   tip:"Bir cümleyi resmileştirmek istediğinde yan cümleyi bul, fiilini isme çevir, uygun edatla bağla: 'Weil die Nachfrage steigt' → 'Wegen der steigenden Nachfrage'. Tek hamlede B2'den C1'e.",
   ex:[{t:"Bei der Installation muss man vorsichtig sein.",tr:"Kurulum sırasında dikkatli olunmalı."},{t:"Nach der Unterzeichnung des Vertrags begann die Produktion.",tr:"Sözleşmenin imzalanmasının ardından üretim başladı."},{t:"Trotz des Regens fand das Fest statt.",tr:"Yağmura rağmen şenlik yapıldı."}],
   quiz:[
    {q:"'Nachdem wir angekommen waren' → 'Nach unserer ___'",o:["Ankunft","Ankommen","Angekommen"],a:0,e:"ankommen → die Ankunft."},
    {q:"'Obwohl es teuer ist' → '___ des hohen Preises'",o:["Wegen","Trotz","Bei"],a:1,e:"obwohl → trotz + Genitiv."},
    {q:"'entscheiden' fiilinin ismi: die ___",fill:1,a:"Entscheidung",e:"entscheiden → die Entscheidung."}
   ]},
  {t:"Partizipialkonstruktionen", d:"Sıkıştırılmış yan cümleler",
   body:[
    {p:"<b>Partizip I</b> (–end): süren eylem → 'die steigenden Kosten' (artan maliyetler). <b>Partizip II</b>: tamamlanmış/edilgen → 'das entwickelte System' (geliştirilen sistem).", tr:"Türkçedeki '-an/-en' ortacının birebir karşılığı: 'gülen çocuk' = das lachende Kind."},
    {p:"Genişletilmiş hali yazı dilinin zirvesidir: 'die <b>im letzten Jahr entwickelte</b> Technologie' = geçen yıl geliştirilen teknoloji.", tr:"Uzun sıfat blokları Türkçeyle aynı sırayla kurulur — Türkler için büyük avantaj!"}
   ],
   tip:"Cümleden ilgi cümleciğini (der/die/das ...) çıkarıp Partizip'e sıkıştır: 'Die Firma, die in Izmir produziert' → 'die in Izmir produzierende Firma'. Metnin yoğunluğu artar, akıcılığı bozulmaz.",
   ex:[{t:"Die wachsende Nachfrage überrascht niemanden.",tr:"Artan talep kimseyi şaşırtmıyor."},{t:"Das von Experten geprüfte Gerät ist sicher.",tr:"Uzmanlarca test edilen cihaz güvenlidir."},{t:"Die im Vertrag genannten Bedingungen gelten weiterhin.",tr:"Sözleşmede belirtilen koşullar geçerliliğini koruyor."}],
   quiz:[
    {q:"'gülen çocuk' → das ___ Kind",o:["gelacht","lachende","lachen"],a:1,e:"Süren eylem → Partizip I: lachend + e."},
    {q:"'imzalanan belge' → das ___ Dokument",o:["unterschreibende","unterschriebene","unterschreiben"],a:1,e:"Tamamlanmış/edilgen → Partizip II."},
    {q:"Partizip I nasıl kurulur? Infinitiv + ___",fill:1,a:"d",e:"lachen + d → lachend."}
   ]}
 ],

 reading:{t:"Die schweigende Mehrheit der Dinge", sents:[
  {s:"Die von uns täglich genutzten Geräte treffen längst Entscheidungen, die früher Menschen vorbehalten waren.",tr:"Her gün kullandığımız cihazlar, eskiden insanlara mahsus olan kararları çoktan veriyor."},

  {s:"Die entscheidende Frage lautet daher nicht ob, sondern wie wir diese Verantwortung gestalten.",tr:"Dolayısıyla belirleyici soru 'olup olmayacağı' değil, bu sorumluluğu 'nasıl' şekillendireceğimizdir."}],
  gloss:[["vorbehalten","mahsus, ayrılmış"],["der Widerspruch","çelişki"],["die Bedenken","endişeler"],["gestalten","şekillendirmek"]],

 writing:{p:"Teknoloji ve sorumluluk üzerine kısa bir köşe yazısı yaz: Nominalisierung ve Partizip yapıları kullan (10-12 cümle).",
  ck:["En az iki isimleştirme kullandım (bei der..., nach der...)","Bir genişletilmiş Partizip yapısı kurdum","Einerseits/andererseits gibi karşıtlık yapısı kullandım"],
  sample:"Bei der Einführung neuer Technologien wird oft nur an Effizienz gedacht. Die dabei entstehenden Fragen der Verantwortung bleiben unbeantwortet. Einerseits erleichtern die neu entwickelten Systeme unseren Alltag erheblich, andererseits wächst unsere Abhängigkeit. Nach sorgfältiger Abwägung scheint klar: Erst die bewusste Gestaltung macht den Fortschritt wertvoll."}

A1:{
 grammar:[
  {t:"Artikeller: le, la, les", d:"Her ismin bir cinsiyeti var",
   body:[
    {p:"Fransızcada isimler eril (<b>le</b>) veya dişil (<b>la</b>) olur; çoğul her zaman <b>les</b>. Sesli harfle başlayan kelimelerde le/la → <b>l'</b> olur: l'école.", tr:"Türkçede artikel yok; kelimeyi artikeliyle birlikte tek parça ezberle: 'la maison' (ev), 'le livre' (kitap)."},
    {p:"Belirsiz artikeller: <b>un</b> (eril), <b>une</b> (dişil), <b>des</b> (çoğul): un café, une table, des amis.", tr:"un/une = 'bir', des = 'birkaç/bazı' gibi düşünebilirsin."}
   ],
   tip:"İpucu: -tion, -té, -ette ile bitenler neredeyse hep dişil (la station, la liberté); -age, -ment ile bitenler çoğunlukla eril (le voyage, le moment). Bu iki kural yüzlerce kelimeyi kurtarır.",
   ex:[{t:"Le café est chaud.",tr:"Kahve sıcak."},{t:"La maison est grande.",tr:"Ev büyük."},{t:"J'aime les livres.",tr:"Kitapları severim."},{t:"C'est une bonne idée.",tr:"Bu iyi bir fikir."}],
   quiz:[
    {q:"___ liberté (özgürlük) — '-té' ile bitiyor.",o:["le","la","les"],a:1,e:"-té ile bitenler dişil → la."},
    {q:"___ voyage (seyahat)",o:["le","la","l'"],a:0,e:"-age ile bitenler çoğunlukla eril → le."},
    {q:"Sesli harfle başlayan kelime: ___école",fill:1,a:"l'",e:"le/la sesli harften önce l' olur."}
   ]},
  {t:"être ve avoir", d:"İki temel taş",
   body:[
    {p:"<b>être</b> (olmak): je suis, tu es, il/elle est, nous sommes, vous êtes, ils/elles sont. <b>avoir</b> (sahip olmak): j'ai, tu as, il a, nous avons, vous avez, ils ont.", tr:"Bu iki fiil hem günlük konuşmanın hem de ileride öğreneceğin geçmiş zamanın temelidir."},
    {p:"Dikkat: yaş <b>avoir</b> ile söylenir: <b>J'ai 30 ans</b> (30 yaşındayım). Açlık, susuzluk da öyle: J'ai faim, j'ai soif.", tr:"Türkçe mantığıyla 'je suis 30 ans' demek en klasik hatadır — yaş 'sahip olunur'!"}
   ],
   tip:"'vous' hem 'siz' hem kibar 'sen'dir. Tanımadığın herkese vous ile başla; 'tu' teklifi karşıdan gelsin. Bu, Fransız kültüründe nezaketin altın anahtarıdır.",
   ex:[{t:"Je suis turc / turque.",tr:"Türküm (eril/dişil)."},{t:"Nous sommes contents.",tr:"Memnunuz."},{t:"Elle a une voiture rouge.",tr:"Onun kırmızı bir arabası var."},{t:"Vous avez raison.",tr:"Haklısınız."}],
   quiz:[
    {q:"Tu ___ étudiant?",o:["es","est","as"],a:0,e:"tu + être → es."},
    {q:"'25 yaşındayım' → J'___ 25 ans.",o:["suis","ai","as"],a:1,e:"Yaş avoir ile: j'ai 25 ans."},
    {q:"Nous ___ une grande famille.",fill:1,a:"avons",e:"nous + avoir → avons."}
   ]}

A2:{
 grammar:[
  {t:"Passé composé", d:"avoir mı, être mi?",
   body:[
    {p:"Geçmiş zaman: <b>avoir/être + participe passé</b>. Çoğu fiil avoir ile: J'<b>ai mangé</b> (yedim). -er fiilleri → é, -ir → i, -re → u.", tr:"Türkçedeki '-di'li geçmiş: 'yedim, gördüm, gittim'."},
    {p:"Hareket ve değişim fiilleri <b>être</b> ile: aller, venir, partir, arriver, naître, mourir... Être'de participe özneyle uyumlanır: elle est all<b>ée</b>.", tr:"'Gitmek, gelmek, doğmak' gibi 14 fiil être ister — meşhur 'ev şeması' (la maison d'être) ile ezberlenir."}
   ],
   tip:"Être fiillerini bir hikâyeyle ezberle: 'Doğdum (naître), geldim (venir), girdim (entrer), çıktım (sortir), gittim (aller), döndüm (retourner), öldüm (mourir).' Bir insanın yolculuğu — hepsi être!",
   ex:[{t:"J'ai visité le musée du Louvre.",tr:"Louvre müzesini ziyaret ettim."},{t:"Elle est arrivée hier soir.",tr:"O dün akşam vardı (arriver → être + uyum)."},{t:"Nous avons mangé au restaurant.",tr:"Restoranda yemek yedik."},{t:"Ils sont partis tôt.",tr:"Erken ayrıldılar."}],
   quiz:[
    {q:"J'___ acheté un billet.",o:["suis","ai","as"],a:1,e:"acheter → avoir ile."},
    {q:"Elle ___ allée au marché.",o:["a","est","ai"],a:1,e:"aller hareket fiili → être."},
    {q:"'manger' fiilinin participe passé hali: J'ai ___",fill:1,a:"mangé",e:"-er fiilleri → é: mangé."}
   ]},
  {t:"Sıfat Uyumu", d:"grand, grande, grands, grandes",
   body:[
    {p:"Sıfat, nitelediği ismin cinsiyet ve sayısına uyar: un livre <b>intéressant</b>, une ville <b>intéressante</b>, des villes <b>intéressantes</b>.", tr:"Türkçede sıfat hiç değişmez; Fransızcada isimle birlikte 'giyinir'. Dişil için genelde -e, çoğul için -s eklenir."},
    {p:"Çoğu sıfat isimden <b>sonra</b> gelir: une voiture <b>rouge</b>. Ama küçük bir grup önce gelir: petit, grand, bon, beau, jeune, vieux (BAGS kuralı: Beauty, Age, Goodness, Size).", tr:"'Güzel, yaşlı, iyi, büyük/küçük' anlamlı sıfatlar isimden önce gelir."}
   ],
   tip:"BAGS'i cebine koy: Güzellik-Yaş-İyilik-Boyut sıfatları önde, gerisi arkada. 'Un bon petit café français' — bon ve petit önde, français arkada. Kulağa doğal gelen budur.",

B1:{
 grammar:[
  {t:"Imparfait vs Passé composé", d:"Fon mu, olay mı?",
   body:[
    {p:"<b>Imparfait</b> (-ais, -ait, -ions...): geçmişte süren durum, alışkanlık, dekor: Il <b>faisait</b> beau, je <b>lisais</b>. <b>Passé composé</b>: anlık, tamamlanmış olay: le téléphone <b>a sonné</b>.", tr:"Türkçe karşılığı nettir: imparfait = '-yordu' (okuyordum), passé composé = '-di' (çaldı)."},
    {p:"İkisi çoğu zaman aynı cümlede dans eder: <b>Je dormais quand tu as appelé.</b> (Uyuyordum, aradın.)", tr:"Fon imparfait ile boyanır, olay passé composé ile patlar."}
   ],
   tip:"Film tekniği: kamera geniş açıda geziniyorsa (hava, duygular, manzara) → imparfait; 'kes!' deyip tek bir olay çekiliyorsa → passé composé. 'Il pleuvait (fon), soudain elle est entrée (olay).'",
   ex:[{t:"Quand j'étais enfant, je jouais dans la rue.",tr:"Çocukken sokakta oynardım (alışkanlık)."},{t:"Je regardais la télé quand il est arrivé.",tr:"O geldiğinde televizyon izliyordum."},{t:"Hier, il a plu toute la journée.",tr:"Dün bütün gün yağmur yağdı (bitmiş olay)."}],
   quiz:[
    {q:"Avant, elle ___ au bord de la mer.",o:["a habité","habitait","habite"],a:1,e:"Geçmiş alışkanlık → imparfait."},
    {q:"Je lisais quand le téléphone ___.",o:["sonnait","a sonné","sonne"],a:1,e:"Fonu kesen olay → passé composé."},
    {q:"'Hava güzeldi' (fon) → Il ___ beau.",fill:1,a:"faisait",e:"Dekor/fon → imparfait: faisait."}
   ]},
  {t:"Futur simple", d:"Gelecek: -rai, -ras, -ra",
   body:[
    {p:"Mastara ekler gelir: je parler<b>ai</b>, tu parler<b>as</b>, il parler<b>a</b>, nous parler<b>ons</b>, vous parler<b>ez</b>, ils parler<b>ont</b>.", tr:"Türkçedeki '-ecek': konuşacağım = je parlerai."},
    {p:"Önemli düzensiz kökler: être → ser-, avoir → aur-, aller → ir-, faire → fer-, pouvoir → pourr-.", tr:"'J'irai' (gideceğim) gibi kısa formlar ilk bakışta tanınmaz — kökleri ezberle."}
   ],
   tip:"Yakın gelecek için konuşma dili 'aller + mastar'ı sever: 'Je vais partir' (birazdan çıkacağım). Futur simple daha çok plan, söz ve tahminlerde parlar. İkisini de cebinde tut.",
   ex:[{t:"Demain, je finirai le rapport.",tr:"Yarın raporu bitireceğim."},{t:"Nous irons en France l'été prochain.",tr:"Gelecek yaz Fransa'ya gideceğiz."},{t:"Tu verras, tout ira bien.",tr:"Göreceksin, her şey iyi olacak."}],
   quiz:[
    {q:"L'année prochaine, ils ___ une maison.",o:["achèteront","achètent","ont acheté"],a:0,e:"Gelecek → futur simple."},
    {q:"'aller' fiilinin gelecek kökü:",o:["all-","ir-","va-"],a:1,e:"aller → j'irai, tu iras..."},
    {q:"Je ___ (être) là à huit heures.",fill:1,a:"serai",e:"être → ser- : je serai."}
   ]}
 ],

B2:{
 grammar:[
  {t:"Le subjonctif", d:"Duygu ve şüphenin kipi",
   body:[
    {p:"Kesinlik değil; istek, duygu, gereklilik ve şüphe ifade eden yapılardan sonra gelir: <b>Il faut que tu viennes.</b> <b>Je veux qu'il parte.</b> Kuruluş: ils çekiminin kökü + -e, -es, -e, -ions, -iez, -ent.", tr:"Türkçedeki '-mesi' yapısına benzer: 'Gelmen gerek' = Il faut que tu viennes."},
    {p:"Tetikleyiciler: il faut que, vouloir que, être content que, avoir peur que, bien que... Kesinlik bildirenler (je pense que, je sais que) subjonctif almaz!", tr:"'Je pense qu'il vient' (indicatif) ama 'Je ne pense pas qu'il vienne' (şüphe → subjonctif)."}
   ],
   tip:"Dört düzensizi kartlara yaz: être → sois, avoir → aie, aller → aille, faire → fasse. 'Il faut que + bunlardan biri' kalıbı sınavların ve günlük konuşmanın yıldızıdır.",
   ex:[{t:"Il faut que nous partions maintenant.",tr:"Şimdi gitmemiz gerek."},{t:"Je suis content que tu sois là.",tr:"Burada olmana sevindim."},{t:"Bien qu'il soit tard, elle travaille encore.",tr:"Geç olmasına rağmen hâlâ çalışıyor."}],
   quiz:[
    {q:"Il faut que tu ___ tes devoirs.",o:["fais","fasses","feras"],a:1,e:"il faut que → subjonctif: fasses."},
    {q:"Hangi cümle subjonctif İSTEMEZ?",o:["Je veux que...","Je pense que...","Il faut que..."],a:1,e:"'Je pense que' kesinlik → indicatif."},
    {q:"être fiilinin subjonctif'i: que je ___",fill:1,a:"sois",e:"être → que je sois."}
   ]},
  {t:"Zamirler: y ve en", d:"Fransızcanın joker kartları",
   body:[
    {p:"<b>y</b> = 'oraya/orada' ve à ile gelen şeyler: Tu vas à Paris? — J'<b>y</b> vais. <b>en</b> = 'ondan/onlardan' ve de ile gelenler: Tu veux du café? — J'<b>en</b> veux.", tr:"Türkçedeki 'oraya gidiyorum → gidiyorum oraya' kısaltmasının zarif hali. Cümleyi tekrar etmekten kurtarır."},
    {p:"Yerleri fiilden hemen önce: J'y pense. Il en parle. Miktarla birlikte en zorunludur: J'ai trois frères → J'<b>en</b> ai trois.", tr:"'Üç tane var' derken 'en' atlanamaz: J'en ai trois."}
   ],
   tip:"Kalıp ifadelerle hazır al: 'Vas-y!' (Hadi!), 'J'en ai marre' (Bıktım!), 'Je m'en vais' (Gidiyorum), 'Ça y est!' (Tamamdır!). Bunlar konuşmana anında doğallık katar.",
   ex:[{t:"Tu penses à ton projet? — Oui, j'y pense.",tr:"Projeni düşünüyor musun? — Evet, düşünüyorum."},{t:"Vous avez des questions? — Oui, nous en avons deux.",tr:"Sorunuz var mı? — Evet, iki tane var."},{t:"Elle revient de Paris? — Oui, elle en revient.",tr:"Paris'ten mi dönüyor? — Evet, oradan dönüyor."}],
   quiz:[
    {q:"Tu vas au bureau? — Oui, j'___ vais.",o:["y","en","le"],a:0,e:"à + yer → y."},
    {q:"Tu veux du thé? — Oui, j'___ veux bien.",o:["y","en","la"],a:1,e:"du (de+le) → en."},
    {q:"'Bıktım!' → J'___ ai marre!",fill:1,a:"en",e:"Kalıp: j'en ai marre."}
   ]}
 ],

 reading:{t:"Le télétravail en question", sents:[
  {s:"Depuis quelques années, le télétravail s'est installé dans les entreprises françaises.",tr:"Birkaç yıldır uzaktan çalışma Fransız şirketlerine yerleşti."},
  {s:"Ses partisans veulent que cette liberté soit protégée.",tr:"Destekçileri bu özgürlüğün korunmasını istiyor."},

 writing:{p:"'Uzaktan çalışma özgürlük mü, yalnızlık mı?' — Subjonctif ve y/en zamirlerini kullanarak görüş paragrafı yaz (8-10 cümle).",
  ck:["'Il faut que / je veux que' + subjonctif kullandım","y veya en zamirini doğal biçimde kullandım","tandis que / néanmoins gibi bir bağlaç kullandım"],
  sample:"Le télétravail offre une liberté précieuse, et beaucoup de salariés en profitent. Néanmoins, il faut que les équipes gardent un lien humain. Je ne pense pas que la solution soit extrême: le bureau a ses avantages, tandis que la maison offre le calme. Il faudrait qu'on y réfléchisse sans dogme."}

C1:{
 grammar:[
  {t:"Conditionnel passé", d:"Pişmanlığın grameri",
   body:[
    {p:"Yapı: <b>aurais/serais + participe passé</b>: J'<b>aurais aimé</b> venir (gelmek isterdim). Geçmişte olabilecek ama olmamış şeyleri anlatır.", tr:"Türkçedeki '-erdim/-mış olurdum': 'Gelirdim ama...' = Je serais venu, mais..."},
    {p:"Si'li kalıpta: <b>Si + plus-que-parfait, conditionnel passé</b>: Si j'avais su, je ne serais pas venu.", tr:"'Bilseydim gelmezdim' — geçmiş, geri alınamaz."}
   ],
   tip:"Basında 'iddiaya göre' anlamı da taşır: 'Le ministre aurait accepté...' (Bakanın kabul ettiği öne sürülüyor). Fransız gazetesi okurken bu nüansı bilmek seni C1 yapar.",
   ex:[{t:"À ta place, j'aurais accepté l'offre.",tr:"Senin yerinde olsam teklifi kabul ederdim."},{t:"Si nous étions partis plus tôt, nous n'aurions pas raté le train.",tr:"Daha erken çıksaydık treni kaçırmazdık."},{t:"Elle serait devenue médecin si elle avait continué.",tr:"Devam etseydi doktor olurdu."}],
   quiz:[
    {q:"Si j'avais eu le temps, je t'___ aidé.",o:["aurais","serais","avais"],a:0,e:"Conditionnel passé: aurais + aidé."},
    {q:"'Le président aurait démissionné' ne demek?",o:["İstifa etti (kesin)","İstifa ettiği iddia ediliyor","İstifa edecek"],a:1,e:"Basın dili: doğrulanmamış iddia."},
    {q:"Si elle ___ su, elle serait restée.",fill:1,a:"avait",e:"Si + plus-que-parfait: avait su."}
   ]},
  {t:"La mise en relief: c'est... qui/que", d:"Vurgu sanatı",
   body:[
    {p:"Vurgulamak istediğin öğeyi öne çeker: <b>C'est Marie qui a appelé.</b> (Arayan Marie'ydi.) <b>C'est ce livre que je cherche.</b> (Aradığım bu kitap.)", tr:"Türkçedeki devrik vurgu ve '-en/-dığı' yapısının birleşimi: 'Arayan Marie'ydi.'"},
    {p:"İleri kalıplar: <b>Ce qui</b> m'étonne, c'est... (Beni şaşırtan şey...), <b>Ce que</b> je veux, c'est... (İstediğim şey...).", tr:"Sunum ve tartışmalarda cümleye profesyonel ritim katar."}
   ],
   tip:"Sunuma başlarken kullan: 'Ce qui compte vraiment, c'est la qualité.' Dinleyicinin dikkati otomatik olarak vurgulanan öğeye kilitlenir — retorik bedava puan.",
   ex:[{t:"C'est la qualité qui fait la différence.",tr:"Fark yaratan şey kalitedir."},{t:"Ce qui m'inquiète, c'est le délai.",tr:"Beni endişelendiren şey, teslim süresi."},{t:"C'est en forgeant qu'on devient forgeron.",tr:"Demir dövülerek demirci olunur (pratik yaparak öğrenilir)."}],

    {q:"___ mon frère ___ a trouvé la solution.",o:["C'est / qui","C'est / que","Ce qui / est"],a:0,e:"Özne vurgusu → c'est... qui."},
    {q:"___ je préfère, c'est le silence.",o:["Ce qui","Ce que","C'est"],a:1,e:"Nesne vurgusu → ce que."},
    {q:"'Beni şaşırtan şey' → Ce ___ m'étonne...",fill:1,a:"qui",e:"Özne konumunda → ce qui."}
   ]}

 reading:{t:"L'éloge de la lenteur", sents:[
  {s:"Ce qui caractérise notre époque, c'est une accélération que personne n'a vraiment choisie.",tr:"Çağımızı tanımlayan şey, kimsenin gerçekten seçmediği bir hızlanmadır."},
  {s:"Nous aurions pu ralentir; nous avons préféré optimiser.",tr:"Yavaşlayabilirdik; optimize etmeyi tercih ettik."},
  {s:"Quoique la technologie nous fasse gagner du temps, ce temps gagné est aussitôt rempli.",tr:"Teknoloji bize zaman kazandırsa da, kazanılan bu zaman anında dolduruluyor."},
  {s:"Si nous avions mesuré le coût de cette course, nous l'aurions peut-être refusée.",tr:"Bu yarışın bedelini ölçseydik, belki de onu reddederdik."},
  {s:"C'est la lenteur, paradoxalement, qui pourrait devenir le vrai luxe du siècle.",tr:"Paradoksal biçimde, yüzyılın gerçek lüksü hâline gelebilecek olan şey yavaşlıktır."}],
  gloss:[["l'accélération","hızlanma"],["ralentir","yavaşlamak"],["aussitôt","derhal"],["la course","yarış, koşuşturma"]],
  qs:[{q:"Metne göre kazanılan zaman ne oluyor?",o:["Tasarruf ediliyor","Anında dolduruluyor","Kayboluyor"],a:1},{q:"Yazara göre yüzyılın gerçek lüksü ne olabilir?",o:["Teknoloji","Hız","Yavaşlık"],a:2}]},
 writing:{p:"'Hız çağında yavaşlık bir lüks mü?' — Conditionnel passé ve mise en relief kullanarak bir deneme paragrafı yaz (10-12 cümle).",
  ck:["Bir conditionnel passé cümlesi kurdum","'Ce qui... c'est...' vurgusu kullandım","quoique veya néanmoins kullandım"],
  sample:"Ce qui frappe aujourd'hui, c'est notre incapacité à ne rien faire. Nous aurions pu profiter du temps libéré par la technologie; nous avons choisi de le remplir. Quoique chaque outil promette la liberté, c'est souvent la dépendance qui s'installe. Si nous avions posé la question du sens plus tôt, nous aurions peut-être bâti un autre rythme."}
}
},
/* ================= İSPANYOLCA ================= */
es:{
A1:{
 grammar:[
  {t:"ser vs estar", d:"İki 'olmak', iki dünya",
   body:[
    {p:"<b>ser</b>: kalıcı özellikler, kimlik, meslek, milliyet: Soy turco. Es profesora. <b>estar</b>: geçici durumlar, konum, ruh hali: Estoy cansado. Estamos en Madrid.", tr:"Türkçede tek 'olmak' var; İspanyolca ikiye böler. Kalıcıysa ser, geçiciyse estar."},
    {p:"Aynı sıfat, farklı anlam: <b>es aburrido</b> = sıkıcıdır (kişilik), <b>está aburrido</b> = canı sıkkın (şu an).", tr:"Ser kimliği, estar hali anlatır — bu ayrım anlamı tamamen değiştirebilir."}
   ],
   tip:"DOCTOR & PLACE ezberi: ser = Description, Occupation, Characteristic, Time, Origin, Relationship; estar = Position, Location, Action, Condition, Emotion. Şüphede kaldığında bu iki listeye başvur.",
   ex:[{t:"Soy ingeniero.",tr:"Mühendisim (meslek → ser)."},{t:"Estoy muy feliz hoy.",tr:"Bugün çok mutluyum (ruh hali → estar)."},{t:"La oficina está en el centro.",tr:"Ofis merkezde (konum → estar)."},{t:"Ella es de İzmir.",tr:"O İzmirli (köken → ser)."}],
   quiz:[
    {q:"Yo ___ turco.",o:["soy","estoy","es"],a:0,e:"Milliyet kalıcı → ser: soy."},
    {q:"El café ___ frío. (şu an soğumuş)",o:["es","está","son"],a:1,e:"Geçici durum → estar."},
    {q:"Konum her zaman hangi fiille? Madrid'deyiz → ___ en Madrid.",fill:1,a:"estamos",e:"Konum → estar: estamos."}
   ]},
  {t:"Presente: Şimdiki/Geniş Zaman", d:"-ar, -er, -ir üç ailesi",
   body:[
    {p:"Üç fiil ailesi: habl<b>ar</b> → hablo, hablas, habla, hablamos, habláis, hablan. com<b>er</b> → como, comes... viv<b>ir</b> → vivo, vives...", tr:"Türkçe gibi şahıs ekleri net olduğu için özne çoğu zaman söylenmez: 'Hablo español' yeterli."},
    {p:"Sık düzensizler: tener (tengo), ir (voy), hacer (hago), querer (quiero). Bunlar günlük konuşmanın yıldızlarıdır.", tr:"'Tengo hambre' (açım), 'voy a casa' (eve gidiyorum) gibi kalıplar hazır ezberlenmeli."}
   ],
   tip:"İspanyolca yazıldığı gibi okunur — Türkçe gibi! Bu yüzden telaffuz korkusu olmadan yüksek sesle çalış. Sadece 'h' okunmaz, 'j' bizim 'h'mizdir (Juan = Huan).",
   ex:[{t:"Hablo un poco de español.",tr:"Biraz İspanyolca konuşuyorum."},{t:"¿Dónde vives?",tr:"Nerede yaşıyorsun?"},{t:"Tengo dos hermanos.",tr:"İki kardeşim var."},{t:"Vamos a la playa.",tr:"Plaja gidiyoruz."}],
   quiz:[
    {q:"Ella ___ en Barcelona. (vivir)",o:["vivo","vive","vives"],a:1,e:"3. tekil şahıs → vive."},
    {q:"'tener' fiilinin ben çekimi:",o:["teno","tengo","tiene"],a:1,e:"Düzensiz: yo tengo."},
    {q:"Nosotros ___ español. (hablar)",fill:1,a:"hablamos",e:"nosotros → -amos."}
   ]}
 ],

A2:{
 grammar:[
  {t:"Pretérito indefinido", d:"Dün oldu, bitti",
   body:[
    {p:"Tamamlanmış geçmiş: habl<b>é</b>, habl<b>aste</b>, habl<b>ó</b>... / com<b>í</b>, com<b>iste</b>, com<b>ió</b>... Vurgu işaretleri kritik: hablo (konuşuyorum) ≠ habló (konuştu)!", tr:"Türkçedeki '-di': konuştum = hablé. Aksan işareti zamanı değiştirir, gözden kaçırma."},
    {p:"Ünlü düzensizler: ir/ser → fui, fuiste, fue (ikisi de aynı!); hacer → hice; tener → tuve; estar → estuve.", tr:"'Fui' hem 'gittim' hem 'oldum' demektir — bağlam belirler."}
   ],
   tip:"Sinyal kelimeleri kancala: ayer, anoche, la semana pasada, en 2020 gördüğünde indefinido zamanıdır. Bu kelimeler cümlenin kimliğini ele verir.",
   ex:[{t:"Ayer compré un billete de tren.",tr:"Dün bir tren bileti aldım."},{t:"Fuimos a Granada el año pasado.",tr:"Geçen yıl Granada'ya gittik."},{t:"Ella no vino a la fiesta.",tr:"O partiye gelmedi."},{t:"¿Qué hiciste el fin de semana?",tr:"Hafta sonu ne yaptın?"}],
   quiz:[
    {q:"Anoche ___ una película. (yo, ver)",o:["veo","vi","veía"],a:1,e:"Anoche (dün gece) → indefinido: vi."},
    {q:"'ir' fiilinin geçmişi (yo):",o:["ió","fui","iba"],a:1,e:"ir → fui (düzensiz)."},
    {q:"Ellos ___ en un hotel. (estar)",fill:1,a:"estuvieron",e:"estar → estuve kökü: estuvieron."}
   ]},
  {t:"gustar yapısı", d:"Ters çalışan fiil",
   body:[
    {p:"'Sevmek' ters kurulur: hoşlanılan şey öznedir! <b>Me gusta el café</b> = kahve bana hoş gelir. Çoğulsa: <b>Me gustan los libros</b>.", tr:"Türkçedeki 'hoşuma gidiyor' ile birebir aynı mantık: 'Kahve hoşuma gidiyor.' Türkçe düşün, doğru kur!"},
    {p:"Kişi zamirle belirtilir: me, te, le, nos, os, les gusta(n). Vurgu için 'A mí me gusta' denir.", tr:"Aynı aileden fiiller: encantar (bayılmak), interesar, molestar, doler (ağrımak)."}
   ],
   tip:"Tek karar: gusta mı gustan mı? Hoşlanılan şey tekilse gusta, çoğulsa gustan. 'Me gustan viajar' ✗ — fiiller tekil sayılır: 'Me gusta viajar' ✓",
   ex:[{t:"Me gusta mucho la música.",tr:"Müziği çok seviyorum."},{t:"¿Te gustan los deportes?",tr:"Sporları sever misin?"},{t:"A ella le encanta bailar.",tr:"O dans etmeye bayılır."},{t:"Me duele la cabeza.",tr:"Başım ağrıyor."}],
   quiz:[
    {q:"Me ___ las películas de acción.",o:["gusta","gustan","gusto"],a:1,e:"las películas çoğul → gustan."},
    {q:"'Yüzmeyi severim' → Me ___ nadar.",o:["gusta","gustan","gusto"],a:0,e:"Fiil (nadar) tekil sayılır → gusta."},
    {q:"'Ona (kadın) dans etmek hoş gelir' → A ella ___ gusta bailar.",fill:1,a:"le",e:"3. şahıs zamiri → le."}
   ]}
 ],

B1:{
 grammar:[
  {t:"Indefinido vs Imperfecto", d:"Olay mı, manzara mı?",
   body:[
    {p:"<b>Imperfecto</b> (-aba/-ía): geçmişin fonu — alışkanlık, tasvir, süren durum: Cuando era niño, <b>jugaba</b> en la calle. <b>Indefinido</b>: fonu kesen olay: De repente, <b>sonó</b> el teléfono.", tr:"Türkçesi hazır: imperfecto = '-yordu/-irdi' (oynardım), indefinido = '-di' (çaldı)."},
    {p:"Aynı cümlede birlikte: <b>Dormía cuando llamaste.</b> (Uyuyordum, aradın.)", tr:"Tasvir ve duygular imperfecto, aksiyon indefinido."}
   ],
   tip:"Tiyatro tekniği: sahne dekoru ve ışıklar imperfecto ile kurulur (hacía frío, estaba nervioso), oyuncunun her hamlesi indefinido ile oynanır (entró, gritó, salió).",
   ex:[{t:"Antes vivíamos en un pueblo pequeño.",tr:"Eskiden küçük bir kasabada yaşardık."},{t:"Estaba lloviendo cuando salí de casa.",tr:"Evden çıktığımda yağmur yağıyordu."},{t:"Ayer conocí a tu hermana.",tr:"Dün kız kardeşinle tanıştım (tek olay)."}],
   quiz:[
    {q:"Cuando era joven, ___ al fútbol cada día.",o:["jugué","jugaba","juego"],a:1,e:"Alışkanlık → imperfecto."},
    {q:"Leía un libro cuando alguien ___ a la puerta.",o:["llamaba","llamó","llama"],a:1,e:"Fonu kesen olay → indefinido."},
    {q:"'Hava soğuktu' (tasvir) → ___ frío.",fill:1,a:"hacía",e:"Tasvir → imperfecto: hacía frío."}
   ]},
  {t:"Futuro simple", d:"-é, -ás, -á: tek ek, üç aile",
   body:[
    {p:"Mastara doğrudan ek: hablar<b>é</b>, comer<b>ás</b>, vivir<b>á</b>, hablar<b>emos</b>... Tüm fiil aileleri aynı ekleri alır — kolay!", tr:"Türkçedeki '-ecek': konuşacağım = hablaré."},
    {p:"Düzensiz kökler: tener → tendr-, hacer → har-, poder → podr-, salir → saldr-, decir → dir-.", tr:"Ayrıca tahmin için de kullanılır: '¿Qué hora será?' = Saat kaçtır acaba?"}
   ],
   tip:"Konuşma dili yakın gelecek için 'ir a + mastar'ı sever: 'Voy a llamar' (arayacağım şimdi). Futuro simple ise sözler, planlar ve 'acaba' tahminleri içindir. Ton farkını hisset.",
   ex:[{t:"Mañana terminaré el informe.",tr:"Yarın raporu bitireceğim."},{t:"El año que viene viajaremos a México.",tr:"Gelecek yıl Meksika'ya seyahat edeceğiz."},{t:"Serán las ocho, más o menos.",tr:"Saat sekiz civarıdır herhalde (tahmin)."}],
   quiz:[
    {q:"La semana que viene ___ los resultados. (nosotros, saber)",o:["sabremos","sabemos","supimos"],a:0,e:"Gelecek → sabremos."},
    {q:"'tener' fiilinin gelecek kökü:",o:["ten-","tendr-","tuv-"],a:1,e:"tener → tendré, tendrás..."},
    {q:"Yo ___ (hacer) todo lo posible.",fill:1,a:"haré",e:"hacer → har-: haré."}
   ]}
 ],

 reading:{t:"El cambio de Marta", sents:[
  {s:"Marta trabajaba en un banco y ganaba bien, pero no era feliz.",tr:"Marta bir bankada çalışıyordu ve iyi kazanıyordu ama mutlu değildi."},

  {s:"El próximo año abrirá su propio restaurante.",tr:"Gelecek yıl kendi restoranını açacak."}],

 writing:{p:"Geçmişteki bir alışkanlığını (imperfecto), onu değiştiren olayı (indefinido) ve bir gelecek planını (futuro) yaz (6-8 cümle).",

  sample:"Cuando era estudiante, pasaba horas en la biblioteca. Un día encontré un libro sobre España y todo cambió. Empecé a estudiar español esa misma semana. El año que viene viajaré a Andalucía y hablaré con la gente en su idioma."}

B2:{
 grammar:[
  {t:"Subjuntivo presente", d:"İstek, şüphe, duygu kipi",
   body:[
    {p:"Kesin olmayan her şeyin kipi: <b>Quiero que vengas.</b> (Gelmeni istiyorum.) Kuruluş ters mantıkla: -ar fiilleri e alır (hable), -er/-ir fiilleri a alır (coma, viva).", tr:"Türkçedeki '-meni/-mesini' yapısı: 'Gelmeni istiyorum' = Quiero que vengas."},
    {p:"Tetikleyiciler: querer que, esperar que, es importante que, no creo que, cuando (gelecek anlamında), para que...", tr:"'Creo que viene' (kesin → indicativo) ama 'No creo que venga' (şüphe → subjuntivo)."}
   ],
   tip:"WEIRDO ezberi: Wishes, Emotions, Impersonal expressions, Recommendations, Doubt, Ojalá. Bu altı kapıdan biri açıldıysa subjuntivo girer. 'Ojalá' (inşallah — Arapçadan!) her zaman subjuntivo ister.",
   ex:[{t:"Espero que tengas un buen día.",tr:"İyi bir gün geçirmeni dilerim."},{t:"Es importante que practiques cada día.",tr:"Her gün pratik yapman önemli."},{t:"Ojalá llueva mañana.",tr:"İnşallah yarın yağmur yağar."}],
   quiz:[
    {q:"Quiero que me ___ la verdad. (decir)",o:["dices","digas","dirás"],a:1,e:"querer que → subjuntivo: digas."},
    {q:"Hangi cümle subjuntivo İSTEMEZ?",o:["No creo que...","Creo que...","Espero que..."],a:1,e:"'Creo que' kesinlik → indicativo."},
    {q:"'Ojalá' kelimesi hangi dilden geliyor?",o:["Latince","Arapça","Yunanca"],a:1,e:"'İnşallah'tan (law šā' allāh) — her zaman subjuntivo alır."}
   ]},
  {t:"Condicional", d:"Kibarlık ve hayal",
   body:[
    {p:"Mastara -ía ekleri: hablar<b>ía</b>, comer<b>ías</b>... 'Yapardım' anlamı: <b>Me gustaría viajar.</b> (Seyahat etmek isterdim.)", tr:"Türkçedeki '-irdi': yapardım = haría. Kibar rica için birebir: '¿Podrías ayudarme?' (Yardım edebilir miydin?)"},
    {p:"Geçmişe dönük tahmin de yapar: <b>Serían las diez cuando llegó.</b> (Geldiğinde saat on falandı.)", tr:"Düzensiz kökler futuro ile aynıdır: tendría, haría, podría."}
   ],
   tip:"'Me gustaría' kalıbını cebine koy: restoranda, otelde, iş e-postasında kapıları açar. 'Quiero' (istiyorum) yerine 'Me gustaría' (isterdim) demek, İspanyolcada kibarlığın birinci basamağıdır.",
   ex:[{t:"Me gustaría reservar una mesa.",tr:"Bir masa ayırtmak isterdim."},{t:"¿Podrías enviarme el documento?",tr:"Bana belgeyi gönderebilir miydin?"},{t:"Yo en tu lugar hablaría con el jefe.",tr:"Senin yerinde olsam patronla konuşurdum."}],
   quiz:[
    {q:"¿___ ayudarme con esto? (kibar)",o:["Puedes","Podrías","Podrás"],a:1,e:"Kibarlık → condicional: podrías."},
    {q:"Yo ___ ese coche. (comprar, tavsiye)",o:["compraría","compraré","compro"],a:0,e:"'Ben olsam alırdım' → condicional."},
    {q:"'hacer' fiilinin condicional'i (yo): ___",fill:1,a:"haría",e:"hacer → har- + ía."}
   ]}
 ],

 reading:{t:"El debate del teletrabajo", sents:[
  {s:"El teletrabajo se ha instalado en miles de empresas españolas.",tr:"Uzaktan çalışma binlerce İspanyol şirketine yerleşti."},
  {s:"Sus defensores quieren que esta flexibilidad se proteja por ley.",tr:"Savunucuları bu esnekliğin yasayla korunmasını istiyor."},
  {s:"Los críticos, sin embargo, temen que la creatividad se pierda sin contacto humano.",tr:"Eleştirmenler ise insan teması olmadan yaratıcılığın kaybolmasından korkuyor."},
  {s:"Es probable que el futuro sea un modelo híbrido.",tr:"Geleceğin hibrit bir model olması muhtemel."},
  {s:"Cada empresa tendría que encontrar su propio equilibrio.",tr:"Her şirketin kendi dengesini bulması gerekirdi."}],
  gloss:[["instalarse","yerleşmek"],["proteger","korumak"],["temer","korkmak"],["el equilibrio","denge"]],
  qs:[{q:"Savunucular ne istiyor?",o:["Ofise dönüş","Esnekliğin yasayla korunması","Daha az maaş"],a:1},{q:"Metne göre gelecek muhtemelen nasıl?",o:["Tamamen uzaktan","Tamamen ofiste","Hibrit"],a:2}]},
 writing:{p:"'Uzaktan çalışma hakkında ne düşünüyorsun?' — Subjuntivo ve condicional kullanarak görüş yaz (8-10 cümle).",
  ck:["Bir 'quiero/espero que + subjuntivo' cümlesi kurdum","Condicional ile bir öneri yazdım","sin embargo / mientras que kullandım"],
  sample:"El teletrabajo ofrece libertad, y es natural que muchos lo prefieran. Sin embargo, no creo que sea perfecto para todos. Yo recomendaría un modelo híbrido: la oficina crea equipo, mientras que la casa da concentración. Espero que las empresas escuchen a sus empleados antes de decidir."}

C1:{
 grammar:[
  {t:"Subjuntivo pasado ve si cümleleri", d:"hubiera... habría...",
   body:[
    {p:"Gerçek dışı şimdiki durum: <b>Si tuviera tiempo, viajaría.</b> (Zamanım olsa seyahat ederdim.) Geçmiş pişmanlık: <b>Si hubiera sabido, habría venido.</b> (Bilseydim gelirdim.)", tr:"Türkçeyle birebir eşleşir: tuviera = olsa, hubiera sabido = bilseydi."},
    {p:"Imperfecto de subjuntivo iki biçimlidir: hablara/hablase — ikisi de doğru, -ra biçimi daha yaygın.", tr:"'Como si' (sanki ... -mış gibi) her zaman bu kipi ister: 'Habla como si lo supiera todo.'"}
   ],
   tip:"'Si + hubiera + participio, habría + participio' kalıbını bir şablon gibi ezberle ve içini değiştir. C1 sınav yazılarında bu tek kalıp, jüriye seviye sinyali verir.",
   ex:[{t:"Si fuera millonario, compraría una isla.",tr:"Milyoner olsaydım bir ada alırdım."},{t:"Si hubiéramos salido antes, no habríamos perdido el vuelo.",tr:"Daha erken çıksaydık uçağı kaçırmazdık."},{t:"Habla como si fuera el jefe.",tr:"Sanki patronmuş gibi konuşuyor."}],
   quiz:[
    {q:"Si ___ más tiempo, aprendería alemán.",o:["tengo","tuviera","tendré"],a:1,e:"Gerçek dışı şart → tuviera."},
    {q:"Si me hubieras llamado, te ___ ayudado.",o:["habría","hubiera","habré"],a:0,e:"Sonuç tarafı → habría + participio."},
    {q:"'como si' kalıbından sonra hangi kip gelir?",o:["indicativo","subjuntivo","futuro"],a:1,e:"como si + subjuntivo pasado."}
   ]},
  {t:"Pasiva ve 'se' yapıları", d:"İspanyolcanın görünmez öznesi",
   body:[
    {p:"Klasik edilgen (ser + participio) yazı dilindedir: <b>El edificio fue construido en 1920.</b> Konuşmada 'pasiva refleja' hükmeder: <b>Se venden pisos.</b> (Daireler satılır.)", tr:"'Se' yapısı Türkçedeki '-ilir/-ir' genellemesinin karşılığı: 'se dice' = denir, 'se puede' = yapılabilir."},
    {p:"Genelleme için 'se impersonal': <b>Se vive bien aquí.</b> (Burada iyi yaşanır.) Tabelaların ve ilanların dili budur: Se alquila, Se busca.", tr:"İspanya sokaklarındaki her ikinci tabela 'se' ile başlar — okuyabilmek pratik hayatta paha biçilmez."}
   ],
   tip:"Kural: nesne çoğulsa fiil de çoğul olur: 'Se vende una casa' ama 'Se venden dos casas'. Bu küçük uyum, yazında C1 titizliğinin göstergesidir.",
   ex:[{t:"El contrato fue firmado por ambas partes.",tr:"Sözleşme her iki tarafça imzalandı."},{t:"En esta región se produce mucho aceite.",tr:"Bu bölgede çok zeytinyağı üretilir."},{t:"No se permite fumar aquí.",tr:"Burada sigara içilmesine izin verilmez."}],
   quiz:[
    {q:"Se ___ pisos en el centro. (vender, çoğul)",o:["vende","venden","vendieron"],a:1,e:"Nesne çoğul (pisos) → venden."},
    {q:"'Burada İspanyolca konuşulur' → Aquí ___ habla español.",fill:1,a:"se",e:"Pasiva refleja: se habla."},
    {q:"Klasik edilgende fail hangi edatla verilir?",o:["de","por","con"],a:1,e:"fue construido POR los romanos."}
   ]}
 ],

 reading:{t:"El elogio de los límites", sents:[
  {s:"Rara vez se considera que la limitación pueda ser fuente de creatividad.",tr:"Kısıtlamanın bir yaratıcılık kaynağı olabileceği nadiren düşünülür."},
  {s:"Los poetas que aceptan la forma rígida del soneto producen, a menudo, su obra más contundente.",tr:"Sonenin katı biçimini kabul eden şairler çoğu zaman en çarpıcı eserlerini üretir."},
  {s:"Si los recursos hubieran sido ilimitados, muchos diseños icónicos jamás habrían nacido.",tr:"Kaynaklar sınırsız olsaydı, birçok ikonik tasarım asla doğmazdı."},
  {s:"Se diría que la escasez obliga a pensar con elegancia.",tr:"Kıtlığın insanı zarafetle düşünmeye zorladığı söylenebilir."},
  {s:"Si bien resultan frustrantes, los límites podrían ser la arquitectura invisible de la invención.",tr:"Sinir bozucu olsalar da, sınırlar buluşun görünmez mimarisi olabilir."}],
  gloss:[["rara vez","nadiren"],["la escasez","kıtlık"],["obligar","zorlamak"],["nacer","doğmak"]],
  qs:[{q:"Metnin ana savı ne?",o:["Kaynaklar artırılmalı","Sınırlar yaratıcılığı besleyebilir","Şiir mühendislikten üstündür"],a:1},{q:"'Se diría que...' ifadesi ne anlatır?",o:["Kesin bir gerçek","İhtiyatlı bir yorum: 'denebilir ki'","Bir emir"],a:1}]},
 writing:{p:"'Sınırlar yaratıcılığı besler mi?' — Si cümleleri ve 'se' yapıları kullanarak bir deneme paragrafı yaz (10-12 cümle).",
  ck:["Bir 'si + hubiera..., habría...' cümlesi kurdum","En az bir 'se' yapısı kullandım","si bien / sin embargo kullandım"],
  sample:"Se suele pensar que la libertad total produce las mejores ideas. Sin embargo, la historia sugiere lo contrario. Si los grandes inventores hubieran tenido recursos infinitos, quizá no habrían buscado soluciones elegantes. Se crea mejor dentro de un marco: si bien los límites incomodan, también concentran la mente."}
}

/* ================= İTALYANCA ================= */
it:{
A1:{
 grammar:[
  {t:"Artikeller: il, la, i, le", d:"Müzikal bir sistem",
   body:[
    {p:"Eril: <b>il</b> (il libro), s+ünsüz/z ile başlıyorsa <b>lo</b> (lo studente), sesli harften önce <b>l'</b>. Dişil: <b>la</b> / <b>l'</b>. Çoğullar: il→<b>i</b>, lo/l'→<b>gli</b>, la→<b>le</b>.", tr:"Kural çok ama mantık ses uyumudur: İtalyanca kulağa güzel gelmeyi her şeyin üstünde tutar."},
    {p:"İsimlerin çoğu -o (eril) veya -a (dişil) ile biter; çoğulda -o→-i, -a→-e olur: libro→libri, casa→case.", tr:"Kelimenin son harfi cinsiyetini çoğu zaman ele verir — Fransızcadan daha kolay!"}
   ],
   tip:"Artikeli isimle birlikte şarkı gibi söyle: 'il gelato, la pizza, lo spaghetto...' İtalyanca ritim diliyse artikel de o ritmin ilk vuruşudur.",
   ex:[{t:"Il caffè è buono.",tr:"Kahve güzel."},{t:"La casa è grande.",tr:"Ev büyük."},{t:"Gli studenti sono qui.",tr:"Öğrenciler burada (lo → gli)."},{t:"Le ragazze parlano italiano.",tr:"Kızlar İtalyanca konuşuyor."}],
   quiz:[
    {q:"___ studente (s+ünsüz ile başlıyor)",o:["il","lo","la"],a:1,e:"s+ünsüz → lo studente."},
    {q:"'libro' kelimesinin çoğulu:",o:["libros","libri","libre"],a:1,e:"-o → -i: libri."},
    {q:"la pizza → çoğul: ___ pizze",fill:1,a:"le",e:"la → le (dişil çoğul)."}
   ]},
  {t:"essere ve avere", d:"İtalyancanın iki kalbi",
   body:[
    {p:"<b>essere</b> (olmak): sono, sei, è, siamo, siete, sono. <b>avere</b> (sahip olmak): ho, hai, ha, abbiamo, avete, hanno.", tr:"'Sono' hem 'ben ...im' hem 'onlar ...ler' demektir — bağlam ayırır."},
    {p:"Yaş, açlık, susuzluk <b>avere</b> ile: <b>Ho 30 anni</b> (30 yaşındayım), ho fame, ho sete.", tr:"'Sono 30 anni' klasik hatadır; İtalyanca da yaşı 'sahip olur'."}
   ],
   tip:"'h' harfi İtalyancada asla okunmaz: 'ho' = 'o' diye okunur. Yazarken var, konuşurken yok — 'ho, hai, ha, hanno' dörtlüsünü sesli tekrar ederek otomatikleştir.",
   ex:[{t:"Sono turco e sono di Smirne.",tr:"Türküm ve İzmirliyim."},{t:"Siamo molto contenti.",tr:"Çok memnunuz."},{t:"Ho una domanda.",tr:"Bir sorum var."},{t:"Hanno una casa al mare.",tr:"Deniz kenarında evleri var."}],
   quiz:[
    {q:"Tu ___ italiano?",o:["sei","è","hai"],a:0,e:"tu + essere → sei."},
    {q:"'25 yaşındayım' → ___ 25 anni.",o:["Sono","Ho","Ha"],a:1,e:"Yaş avere ile: ho."},
    {q:"Noi ___ una macchina rossa. (avere)",fill:1,a:"abbiamo",e:"noi + avere → abbiamo."}
   ]}
 ],

 reading:{t:"La mia giornata a Firenze", sents:[

  {s:"Firenze è antica, ma la mia vita è semplice e felice.",tr:"Floransa eskidir ama hayatım sade ve mutlu."}],
