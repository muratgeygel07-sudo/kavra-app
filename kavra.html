B1:{
 grammar:[
  {t:"Imperfetto vs Passato prossimo", d:"Manzara ve aksiyon",
   body:[
    {p:"<b>Imperfetto</b> (-avo, -evo, -ivo): geçmişin fonu, alışkanlık, tasvir: Da bambino <b>giocavo</b> in strada. <b>Passato prossimo</b>: tamamlanmış olay: Ieri <b>ho incontrato</b> Luca.", tr:"Türkçe eşleşme net: imperfetto = '-yordu/-irdi', passato prossimo = '-di'."},
    {p:"Birlikte kullanım: <b>Dormivo quando hai chiamato.</b> (Uyuyordum, aradın.) 'Mentre' (iken) hep imperfetto ister.", tr:"'Mentre mangiavo, è arrivato Marco' — süren eylem imperfetto, kesen olay passato prossimo."}
   ],
   tip:"Opera tekniği: sahnenin dekoru ve atmosferi imperfetto ile boyanır (era sera, faceva freddo), aryanın patlama anı passato prossimo ile gelir (è entrata lei!).",
   ex:[{t:"Quando ero piccolo, andavo sempre dai nonni.",tr:"Küçükken hep dedemlere giderdim."},{t:"Mentre studiavo, è suonato il telefono.",tr:"Ders çalışırken telefon çaldı."},{t:"Ieri ha piovuto tutto il giorno.",tr:"Dün bütün gün yağmur yağdı."}],
   quiz:[
    {q:"Da giovane, mia nonna ___ ogni giorno.",o:["ha cucinato","cucinava","cucina"],a:1,e:"Alışkanlık → imperfetto."},
    {q:"Mentre leggevo, qualcuno ___ alla porta.",o:["bussava","ha bussato","bussa"],a:1,e:"Kesen olay → passato prossimo."},
    {q:"'Hava soğuktu' (tasvir) → ___ freddo.",fill:1,a:"faceva",e:"Tasvir → imperfetto: faceva freddo."}
   ]},
  {t:"Futuro semplice", d:"-erò, -erai, -erà",
   body:[
    {p:"Gelecek zaman: parl<b>erò</b>, prend<b>erai</b>, dorm<b>irà</b>... -are fiillerinde a→e olur: parlare → parlerò.", tr:"Türkçedeki '-ecek': konuşacağım = parlerò."},
    {p:"Düzensiz kökler: essere → sarò, avere → avrò, andare → andrò, fare → farò, venire → verrò.", tr:"Tahmin için de kullanılır: 'Sarà stanco' = Yorgundur herhalde."}
   ],
   tip:"İtalyanlar yakın gelecek için çoğu zaman şimdiki zamanı kullanır: 'Domani vado a Milano' (yarın Milano'ya gidiyorum). Futuro'yu asıl planlar, sözler ve 'herhalde' tahminleri için sakla.",
   ex:[{t:"L'anno prossimo studierò in Italia.",tr:"Gelecek yıl İtalya'da okuyacağım."},{t:"Vedrai, andrà tutto bene.",tr:"Göreceksin, her şey iyi gidecek."},{t:"Dove sarà Marco? Sarà in ufficio.",tr:"Marco nerededir? Ofistedir herhalde."}],
   quiz:[
    {q:"Domani ___ i risultati. (noi, sapere)",o:["sapremo","sappiamo","abbiamo saputo"],a:0,e:"Gelecek → sapremo."},
    {q:"'andare' fiilinin gelecek kökü:",o:["and-","andr-","vad-"],a:1,e:"andare → andrò."},
    {q:"Io ___ (fare) del mio meglio.",fill:1,a:"farò",e:"fare → farò."}
   ]}
 ],

const API_BASE = "https://YOUR-KAVRA-SYNC.onrender.com";

const memStore = {};
const store = {
 async get(k){
   try{ if(window.storage){const r=await window.storage.get(k);return r?r.value:null;} }catch(e){}
   try{ const v=localStorage.getItem(k); if(v!==null) return v; }catch(e){}
   return memStore[k]||null;
 },
 async set(k,v){
   try{ if(window.storage){await window.storage.set(k,v);return;} }catch(e){}
   try{ localStorage.setItem(k,v); return; }catch(e){}
   memStore[k]=v;
 }
};

function genSyncCode(){
 const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 0/O, 1/I gibi karışan karakterler çıkarıldı
 let s=""; for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
 return s;
}
async function syncPush(profile){
 if(!profile || !profile.syncCode || API_BASE.includes("YOUR-KAVRA-SYNC")) return;
 try{
  await fetch(`${API_BASE}/api/profiles/${profile.syncCode}`, {
   method:"PUT", headers:{"Content-Type":"application/json"},
   body: JSON.stringify({data:profile})
  });
 }catch(e){ /* internet yoksa sessizce geç, yerel kayıt zaten yapıldı */ }
}
async function syncPull(code){
 if(API_BASE.includes("YOUR-KAVRA-SYNC")){ toast("⚠️ Backend URL'si henüz ayarlanmadı"); return null; }
 try{
  const res = await fetch(`${API_BASE}/api/profiles/${code}`);
  if(!res.ok) return null;
  const j = await res.json();
  return j.data;
 }catch(e){ return null; }
}

}

/* ================= YARDIMCILAR ================= */
const $ = s=>document.querySelector(s);
const esc = s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
const todayStr = ()=>new Date().toISOString().slice(0,10);
function totalXP(p){ return Object.values(p.xp).reduce((a,b)=>a+b,0); }
function rankOf(p){ const t=totalXP(p); return {name:RANKS[Math.min(Math.floor(t/RANK_XP),RANKS.length-1)], idx:Math.min(Math.floor(t/RANK_XP),RANKS.length-1), inRank:t%RANK_XP, next:RANK_XP}; }
function unitItems(l,lv){ const u=CONTENT[l][lv]; const arr=[]; u.grammar.forEach((g,i)=>arr.push({k:`${l}:${lv}:g${i}`,type:"grammar",data:g})); arr.push({k:`${l}:${lv}:v`,type:"vocab"}); (u.readings||[u.reading]).forEach((r,i)=>arr.push({k:`${l}:${lv}:r${i}`,type:"reading",data:r})); (u.writings||[u.writing]).forEach((w,i)=>arr.push({k:`${l}:${lv}:w${i}`,type:"writing",data:w})); return arr; }
function levelPct(p,l,lv){ const items=unitItems(l,lv); const done=items.filter(i=>p.done[i.k]).length; return Math.round(done/items.length*100); }
function langPct(p,l){ let d=0,t=0; LEVELS.forEach(lv=>{const it=unitItems(l,lv);t+=it.length;d+=it.filter(i=>p.done[i.k]).length;}); return Math.round(d/t*100); }
function applyAccent(l){ const L=LANGS[l]; document.documentElement.style.setProperty("--accent",L.accent); document.documentElement.style.setProperty("--accent-soft",L.soft); document.documentElement.style.setProperty("--accent-ink",L.ink); }
function toast(msg){ const t=$("#toast"); t.innerHTML=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2600); }
function confetti(){ const c=$("#confetti"); c.innerHTML=""; const cols=["#F5B93F","#0E7C6B","#BE3455","#2563EB","#C2410C"]; for(let i=0;i<60;i++){ const s=document.createElement("i"); s.style.left=Math.random()*100+"%"; s.style.background=cols[i%cols.length]; s.style.animationDuration=(1.4+Math.random()*1.6)+"s"; s.style.animationDelay=(Math.random()*.5)+"s"; c.appendChild(s);} setTimeout(()=>c.innerHTML="",3200); }

async function addXP(amount, key){
 const t = todayStr();
 if(P.lastActive !== t){
   const y = new Date(Date.now()-864e5).toISOString().slice(0,10);
   P.streak = (P.lastActive===y) ? P.streak+1 : 1;
   P.lastActive = t; P.todayXP = 0;
   P.weekHits = P.weekHits||{}; 
 }
 P.weekHits = P.weekHits||{}; P.weekHits[t]=true;
 P.xp[P.lang] = (P.xp[P.lang]||0) + amount;
 P.todayXP = (P.todayXP||0) + amount;
 if(key) P.done[key]=true;
 const before = P.badges.length;
 BADGES.forEach(b=>{ if(!P.badges.includes(b.id) && b.test(P)) P.badges.push(b.id); });
 await saveDB();
 if(P.badges.length>before){ const nb=BADGES.find(b=>b.id===P.badges[P.badges.length-1]); toast(`${nb.em} Yeni rozet: <b>${nb.n}</b>!`); confetti(); }
 else toast(`⚡ +${amount} XP kazandın!`);
}

/* ---------- Quiz motoru ---------- */
function runQuiz(mount, questions, onDone){
 let i=0, score=0; const results=[];
 function draw(){
  if(i>=questions.length){
   const pct=score/questions.length;
   mount.innerHTML=`<div class="quiz-box result-card">
     <div class="big-em">${pct===1?"🏆":pct>=.5?"🎉":"💪"}</div>
     <h3>${score} / ${questions.length} doğru</h3>
     <p>${pct===1?"Kusursuz! Bu konu artık senin.":pct>=.5?"Güzel iş! Yanlışların açıklamalarına tekrar göz at.":"Sorun değil — konuyu bir daha okuyup tekrar dene."}</p>
     <span class="pill gold xp-earn">⚡ +${score*10} XP</span><br>
     <button class="btn btn-primary" id="quizFinish">Devam et</button></div>`;
   if(pct===1) confetti();
   mount.querySelector("#quizFinish").onclick=async()=>{await onDone(score,questions.length);renderLessons();};
   return;
  }
  const q=questions[i];
  const prog=questions.map((_,j)=>`<i class="${j<i?(results[j]?'ok':'bad'):(j===i?'cur':'')}"></i>`).join("");
  if(q.fill){
   mount.innerHTML=`<div class="quiz-box"><div class="quiz-prog">${prog}</div>
     <div class="quiz-q">${esc(q.q)}</div>
     <input class="fill-input" id="fillIn" placeholder="Cevabını yaz..." autocomplete="off">
     <div class="quiz-exp" id="exp"></div>
     <div class="quiz-foot"><button class="btn btn-primary" id="chk">Kontrol et</button></div></div>`;
   const inp=mount.querySelector("#fillIn"); inp.focus();
   const check=()=>{
    const ans=inp.value.trim().toLowerCase().replace(/\s+/g," ");
    const ok=ans===q.a.toLowerCase();
    results[i]=ok; if(ok)score++;
    inp.style.borderColor=ok?"var(--ok)":"var(--danger)"; inp.disabled=true;
    const ex=mount.querySelector("#exp"); ex.classList.add("show");
    ex.innerHTML=(ok?"✅ Doğru! ":"❌ Doğru cevap: <b>"+esc(q.a)+"</b>. ")+esc(q.e);
    const btn=mount.querySelector("#chk"); btn.textContent="Sıradaki →"; btn.onclick=()=>{i++;draw();};
   };
   mount.querySelector("#chk").onclick=check;
   inp.onkeydown=e=>{if(e.key==="Enter"&&!inp.disabled)check();};
  } else {
   mount.innerHTML=`<div class="quiz-box"><div class="quiz-prog">${prog}</div>
     <div class="quiz-q">${esc(q.q)}</div>
     <div class="quiz-opts">${q.o.map((o,j)=>`<button class="quiz-opt" data-j="${j}">${esc(o)}</button>`).join("")}</div>
     <div class="quiz-exp" id="exp"></div>
     <div class="quiz-foot hidden" id="nextRow"><button class="btn btn-primary" id="nxt">Sıradaki →</button></div></div>`;
   mount.querySelectorAll(".quiz-opt").forEach(b=>b.onclick=()=>{
    const j=+b.dataset.j, ok=j===q.a;
    results[i]=ok; if(ok)score++;
    mount.querySelectorAll(".quiz-opt").forEach((x,k)=>{x.disabled=true;if(k===q.a)x.classList.add("correct");});
    if(!ok)b.classList.add("wrong");
    const ex=mount.querySelector("#exp"); ex.classList.add("show"); ex.innerHTML=(ok?"✅ ":"❌ ")+esc(q.e);
    mount.querySelector("#nextRow").classList.remove("hidden");
    mount.querySelector("#nxt").onclick=()=>{i++;draw();};
   });
  }
 }
 draw();
}

/* ---------- Seviye Testi (kümülatif) ---------- */
function shuffleArr(a){ const arr=[...a]; for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function renderLevelTest(lv){
 const u = CONTENT[P.lang][lv];
 const pool = u.grammar.flatMap(g=>g.quiz.map(q=>({...q})));
 const questions = shuffleArr(pool).slice(0, Math.min(20, pool.length));
 $("#main").innerHTML = topbar("Seviye Testi")+`<div class="lesson-view">${backBtn}
  <div class="lesson-head"><div><h2>${LANGS[P.lang].flag} ${lv} Seviye Testi</h2><p class="stat-sub">${questions.length} soru · tüm gramer konularından karışık · doğru başına +10 XP</p></div></div>
  <div id="quizMount"></div></div>`;
 bindTopbar(); bindBack();
 runQuiz($("#quizMount"), questions, async(score,total)=>{
   const pct = score/total;
   if(pct>=0.8){ P.flags["leveltest_"+P.lang+"_"+lv]=true; }
   await addXP(score*10, null);
 });
}

function renderPractice(){

 $("#main").innerHTML = topbar("Kelime Pratiği")+`
  <div class="card" style="max-width:680px;margin:0 auto">
   <div class="stat-head"><h3>🧩 Eşleştirme Oyunu</h3><span class="xp-tag">+20 XP</span></div>

 document.querySelectorAll("#pLevels .level-tab").forEach(b=>b.onclick=()=>{curLevel=b.dataset.lv;renderPractice();});

function startMatch(mount, lv){
 const pool=[...CONTENT[P.lang][lv].vocab].sort(()=>Math.random()-.5).slice(0,6);
 const left=[...pool].sort(()=>Math.random()-.5);
 const right=[...pool].sort(()=>Math.random()-.5);
 let selL=null, matched=0, t0=Date.now();
 mount.innerHTML=`<div class="match-grid">
   ${left.map(w=>`<button class="match-tile" data-side="l" data-w="${esc(w.w)}">${esc(w.w)}</button>`).join("")}
 </div><div style="height:10px"></div><div class="match-grid">
   ${right.map(w=>`<button class="match-tile" data-side="r" data-w="${esc(w.w)}">${esc(w.tr)}</button>`).join("")}
 </div>`;
 // iki sütunu yan yana diz: sol=hedef dil, sağ=TR — grid'i tek gridde birleştir
 mount.querySelectorAll(".match-tile").forEach(t=>t.onclick=()=>{
  if(t.dataset.side==="l"){ mount.querySelectorAll('[data-side="l"]').forEach(x=>x.classList.remove("sel")); t.classList.add("sel"); selL=t; }
  else{
   if(!selL){t.classList.add("shake");setTimeout(()=>t.classList.remove("shake"),300);return;}
   if(t.dataset.w===selL.dataset.w){ t.classList.add("ok"); selL.classList.add("ok"); selL.classList.remove("sel"); selL=null; matched++;
    if(matched===pool.length){
     const secs=Math.round((Date.now()-t0)/1000);
     P.flags.match=true;
     mount.innerHTML=`<div class="result-card"><div class="big-em">🧩</div><h3>Hepsini eşleştirdin!</h3><p>${secs} saniyede tamamladın.</p>
       <span class="pill gold xp-earn">⚡ +20 XP</span><br>
       <button class="btn btn-primary" id="again">Tekrar oyna</button></div>`;
     confetti(); addXP(20);
     mount.querySelector("#again").onclick=()=>startMatch(mount,lv);
    }
   } else { t.classList.add("shake"); selL.classList.add("shake"); setTimeout(()=>{t.classList.remove("shake");if(selL)selL.classList.remove("shake");},300); }
  }
 });
}

 ]

B1:{
 grammar:[
  {t:"Modals: should / must / have to", d:"Tavsiyeden zorunluluğa",
   body:[
    {p:"<b>should</b>: tavsiye (You should rest). <b>must</b>: güçlü zorunluluk, iç kaynaklı (I must finish this). <b>have to</b>: dış kaynaklı zorunluluk, kural (I have to wear a uniform).", tr:"should = '-meli (bence)', must/have to = '-mek zorunda'. Nüans: must içten gelir, have to kuraldan."},
    {p:"Olumsuzda anlam ayrılır: <b>mustn't</b> = yasak (You mustn't smoke here), <b>don't have to</b> = gerek yok (You don't have to come).", tr:"Bu ayrım kritik: mustn't 'yapma!', don't have to 'yapmasan da olur' demek."}
   ],
   tip:"'mustn't' ve 'don't have to' asla eş anlamlı değildir. Sınavların en sevdiği tuzak budur: yasak mı, gereksiz mi? Cümlede ceza/kural varsa mustn't, serbestlik varsa don't have to.",
   ex:[{t:"You should see a doctor.",tr:"Bir doktora görünmelisin (tavsiye)."},{t:"Passengers must wear seatbelts.",tr:"Yolcular kemer takmak zorundadır (kural)."},{t:"You don't have to pay now.",tr:"Şimdi ödemek zorunda değilsin (gerek yok)."},{t:"You mustn't use your phone during the exam.",tr:"Sınavda telefon kullanman yasak."}],
   quiz:[
    {q:"'Gelmene gerek yok' → You ___ come.",o:["mustn't","don't have to","shouldn't"],a:1,e:"Gereklilik yok → don't have to."},
    {q:"'Burada park etmek yasak' → You ___ park here.",o:["don't have to","mustn't","shouldn't"],a:1,e:"Yasak → mustn't."},
    {q:"Tavsiye: You ___ drink more water.",fill:1,a:"should",e:"Tavsiye → should."}
   ]},
  {t:"Relative Clauses: who / which / that", d:"Cümleleri birleştirme sanatı",
   body:[
    {p:"İnsanlar için <b>who</b>, nesneler için <b>which</b>, ikisi için de <b>that</b>: The man <b>who called</b> is my boss. The report <b>which/that you sent</b> was great.", tr:"Türkçedeki '-en/-dığı' yapısı: 'arayan adam' = the man who called."},
    {p:"Nesne konumundaysa atılabilir: The film (that) we watched... Ama özneyse atılamaz: The woman who lives next door...", tr:"'İzlediğimiz film' → that düşebilir; 'yan dairede oturan kadın' → who kalmalı."}
   ],
   tip:"Türkçeden çevirirken sıralamayı ters çevir: Türkçede önce niteleme sonra isim ('kırmızı arabayı süren adam'), İngilizcede önce isim sonra niteleme ('the man who drives the red car').",
   ex:[{t:"The colleague who sits next to me is from Bursa.",tr:"Yanımda oturan iş arkadaşım Bursalı."},{t:"This is the book which changed my life.",tr:"Bu, hayatımı değiştiren kitap."},{t:"The email (that) you wrote was very clear.",tr:"Yazdığın e-posta çok netti."}],
   quiz:[
    {q:"The woman ___ works here is my aunt.",o:["which","who","where"],a:1,e:"İnsan → who."},
    {q:"The phone ___ I bought is broken.",o:["who","which","whose"],a:1,e:"Nesne → which/that."},
    {q:"Hangi cümlede bağlaç ATILABİLİR?",o:["The man who called you...","The car that I sold...","The dog which barked..."],a:1,e:"Nesne konumunda (I sold the car) → atılabilir."}
   ]}
 ],

 writings:[
  {p:"Şehrine yeni taşınan birine 5 tavsiye yaz: should/shouldn't, must ve don't have to kullan (6-8 cümle).",
   ck:["should ile en az 2 tavsiye verdim","mustn't ve don't have to farkını doğru kullandım","Bir relative clause kurdum (a place which..., people who...)"],
   sample:"Welcome to İzmir! You should walk along Kordon at sunset — it's the moment which makes everyone fall in love with this city. You must try boyoz for breakfast. You don't have to take a taxi everywhere; the metro is fast. You mustn't miss the historic bazaar in Kemeraltı. And you should learn a few Turkish words — people who try are always welcomed warmly."},
  {p:"Hayatını değiştiren bir kişiyi anlat: 'the person who...' yapısıyla başla (6-8 cümle).",

   sample:"The person who changed my life was my first English teacher. She was someone who never accepted 'I can't'. The advice that she gave me still guides me: 'You should make mistakes bravely.' She taught lessons which were about life, not just grammar. Thanks to her, I became a person who loves learning."}
 ]

B2:{
 grammar:[
  {t:"Reported Speech", d:"Dedi ki...",
   body:[
    {p:"Aktarırken zaman bir adım geriye kayar: 'I <b>am</b> tired' → She said she <b>was</b> tired. 'I <b>will</b> come' → He said he <b>would</b> come. 'I <b>have finished</b>' → ...she <b>had finished</b>.", tr:"Türkçedeki 'yorgun olduğunu söyledi' yapısı. Zaman kaydırma (backshift) mekaniktir: bir vites geri."},
    {p:"Sorular aktarılırken düz cümle olur: 'Where do you live?' → He asked where I <b>lived</b>. Evet/hayır soruları <b>if/whether</b> alır: She asked <b>if</b> I was ready.", tr:"Aktarılan soruda soru işareti ve devrik yapı kaybolur!"}
   ],
   tip:"Zaman zarfları da taşınır: today→that day, tomorrow→the next day, here→there, this→that. Aktarım bir 'zaman makinesi'dir — her şey bir adım uzaklaşır.",
   ex:[{t:"'I work in export,' he said. → He said (that) he worked in export.",tr:"'İhracatta çalışıyorum' dedi → İhracatta çalıştığını söyledi."},{t:"She asked if the meeting was still on.",tr:"Toplantının hâlâ geçerli olup olmadığını sordu."},{t:"They told us they would send the offer the next day.",tr:"Teklifi ertesi gün göndereceklerini söylediler."}],
   quiz:[
    {q:"'I am busy,' she said. → She said she ___ busy.",o:["is","was","were"],a:1,e:"Backshift: am → was."},
    {q:"'Will you help?' → He asked ___ I would help.",o:["that","if","what"],a:1,e:"Evet/hayır sorusu → if/whether."},
    {q:"'tomorrow' aktarımda neye dönüşür? the ___ day",fill:1,a:"next",e:"tomorrow → the next day."}
   ]},
  {t:"Gerund vs Infinitive", d:"-ing mi, to mu?",
   body:[
    {p:"Bazı fiiller <b>-ing</b> ister: enjoy, finish, avoid, mind, suggest (I enjoy read<b>ing</b>). Bazıları <b>to</b> ister: want, decide, hope, plan, agree (I decided <b>to go</b>).", tr:"Türkçede tek '-mek' var; İngilizce fiile göre ikiye ayırır. Ezber listesi kaçınılmaz ama kısa."},
    {p:"Anlam değiştirenler en kritik grup: <b>stop smoking</b> (sigarayı bırakmak) ≠ <b>stop to smoke</b> (sigara içmek için durmak); <b>remember to lock</b> (kilitlemeyi unutma) ≠ <b>remember locking</b> (kilitlediğini hatırlamak).", tr:"stop, remember, forget, try — bu dörtlüde seçim anlamı tamamen değiştirir."}
   ],
   tip:"Edattan sonra HER ZAMAN -ing gelir: interested in learning, good at swimming, before leaving. Bu tek kural yüzlerce kararı otomatikleştirir.",
   ex:[{t:"I enjoy working with international clients.",tr:"Uluslararası müşterilerle çalışmaktan keyif alırım."},{t:"We decided to postpone the launch.",tr:"Lansmanı ertelemeye karar verdik."},{t:"He stopped drinking coffee last year.",tr:"Geçen yıl kahve içmeyi bıraktı."},{t:"I'm looking forward to seeing you.",tr:"Seni görmeyi dört gözle bekliyorum (to burada edat → -ing!)."}],
   quiz:[
    {q:"I enjoy ___ new languages.",o:["to learn","learning","learn"],a:1,e:"enjoy → -ing."},
    {q:"She decided ___ the job offer.",o:["accepting","to accept","accept"],a:1,e:"decide → to."},
    {q:"'Süt almayı unutma!' → Don't forget ___ milk.",o:["buying","to buy"],a:1,e:"Gelecekteki görev → to buy."}
   ]}
 ],

C1:{
 grammar:[
  {t:"Participle Clauses", d:"Cümle sıkıştırma teknolojisi",
   body:[
    {p:"Yan cümleyi kısaltır: 'Because she felt tired, she left early' → <b>Feeling tired</b>, she left early. Edilgen için V3: <b>Written in 1920</b>, the book still feels modern.", tr:"Türkçedeki '-erek/-ince/-mişken' zarf-fiillerinin karşılığı: 'Yorgun hissederek erken ayrıldı.'"},
    {p:"<b>Having + V3</b> öncelik bildirir: <b>Having finished</b> the report, I sent it. (Raporu bitirdikten sonra...)", tr:"Akademik ve profesyonel yazının imzasıdır; cümleleri hem kısaltır hem ağırlaştırır."}
   ],
   tip:"Gizli tuzak — sarkık ortaç (dangling participle): 'Walking to work, the rain started' ✗ (yağmur mu yürüyor?). Ortacın öznesi, ana cümlenin öznesiyle aynı olmak ZORUNDA: 'Walking to work, I got wet' ✓",
   ex:[{t:"Opening the email, she noticed the mistake immediately.",tr:"E-postayı açınca hatayı hemen fark etti."},{t:"Having lived abroad, he understands cultural differences well.",tr:"Yurt dışında yaşamış olduğundan kültürel farkları iyi anlar."},{t:"The products, tested twice, were shipped on Friday.",tr:"İki kez test edilen ürünler cuma günü gönderildi."}],
   quiz:[
    {q:"___ the news, she called her family.",o:["Heard","Hearing","To hear"],a:1,e:"Etken eşzamanlı eylem → Hearing."},
    {q:"___ finished the project, we celebrated.",o:["Having","Have","Had"],a:0,e:"Önce biten eylem → Having finished."},
    {q:"Hangisi 'sarkık ortaç' hatası içerir?",o:["Feeling ill, I went home.","Driving home, the phone rang.","Having eaten, we left."],a:1,e:"Telefon araba kullanamaz — özne uyumsuz."}
   ]},
  {t:"Mixed Conditionals & wish", d:"Zaman çizgileri kesişince",
   body:[
    {p:"Karma koşul, geçmiş ile şimdiyi bağlar: <b>If I had studied medicine (geçmiş), I would be a doctor now (şimdi).</b>", tr:"'Tıp okusaydım şimdi doktor olurdum' — Türkçede de zamanlar karışır, mantık aynı."},
    {p:"<b>wish + past</b> = şimdiki pişmanlık (I wish I knew), <b>wish + past perfect</b> = geçmiş pişmanlık (I wish I had known), <b>wish + would</b> = başkasının davranışından şikâyet (I wish he would stop).", tr:"'Keşke bilseydim / bilseymişim / bir dursa' üçlüsü."}
   ],
   tip:"'If only' = wish'in dramatik kardeşi: If only I had more time! Yazıda duygusal vurgu gerektiğinde wish yerine if only kullan — aynı gramer, iki kat etki.",
   ex:[{t:"If I had taken that job, I would be living in Berlin now.",tr:"O işi kabul etseydim şimdi Berlin'de yaşıyor olurdum."},{t:"I wish I spoke more languages.",tr:"Keşke daha çok dil konuşabilseydim (şu an)."},{t:"She wishes she had backed up the files.",tr:"Keşke dosyaları yedekleseymiş (geçmiş)."}],
   quiz:[
    {q:"If I ___ harder at school, I would have a better job now.",o:["worked","had worked","would work"],a:1,e:"Geçmiş koşul + şimdiki sonuç → had worked."},
    {q:"'Keşke şu an tatilde olsam' → I wish I ___ on holiday.",o:["am","were","had been"],a:1,e:"Şimdiki dilek → wish + past: were."},
    {q:"I wish he ___ stop interrupting me!",fill:1,a:"would",e:"Başkasının davranışına sitem → wish + would."}
   ]}
 ],

 grammar:[
  {t:"Modalverben: können, müssen, wollen...", d:"Cümlenin motoru, fiil sonda",
   body:[
    {p:"<b>können</b> (yapabilmek), <b>müssen</b> (zorunda olmak), <b>wollen</b> (istemek), <b>dürfen</b> (izinli olmak), <b>sollen</b> (-meli), <b>möchten</b> (rica). Yapı: modal 2. pozisyonda, ana fiil MASTAR halinde SONDA: Ich <b>kann</b> gut <b>schwimmen</b>.", tr:"Türkçedeki '-ebilmek, -mek zorunda, istemek' hepsi tek kalıpta: modal + ... + mastar."},
    {p:"Tekil çekimlerde ünlü değişir: ich kann, du kannst, er kann (können); ich muss, du musst (müssen).", tr:"ich ve er/sie/es çekimi aynıdır: ich kann = er kann. Bu simetri işini kolaylaştırır."}
   ],
   tip:"'möchte' aslında mögen'in Konjunktiv'idir ama bunu bilmene gerek yok — restoranda 'Ich möchte einen Kaffee' de, kapılar açılsın. 'Ich will' (istiyorum) çocuk ağzı gibi durabilir, möchte zarafettir.",
   ex:[{t:"Ich kann ein bisschen Deutsch sprechen.",tr:"Biraz Almanca konuşabilirim."},{t:"Du musst morgen früh aufstehen.",tr:"Yarın erken kalkmak zorundasın."},{t:"Wir wollen im Sommer nach Wien fahren.",tr:"Yazın Viyana'ya gitmek istiyoruz."},{t:"Hier darf man nicht rauchen.",tr:"Burada sigara içilemez (izin yok)."}],

B1:{
 grammar:[
  {t:"Präteritum: war, hatte ve modallar", d:"Yazının geçmişi",
   body:[
    {p:"Konuşmada Perfekt kullanılır ama <b>sein, haben ve modal fiiller</b> her zaman Präteritum'da söylenir: Ich <b>war</b> müde. Ich <b>hatte</b> keine Zeit. Ich <b>konnte</b> nicht kommen.", tr:"'Ich bin müde gewesen' teorik olarak doğru ama kimse öyle demez — 'Ich war müde' der."},
    {p:"Masal ve haber dili tamamen Präteritum'dur: Er ging, sie sagte, es gab... Okuma için tanıman şart.", tr:"Konuş: Perfekt. Yaz/oku: Präteritum. İş bölümü net."}
   ],
   tip:"Altı fiili Präteritum'da ezberle, gerisini Perfekt'e bırak: war, hatte, konnte, musste, wollte, sollte. Bu altılı, konuşma Almancasının geçmiş zaman iskeletidir.",
   ex:[{t:"Gestern war ich krank und hatte Fieber.",tr:"Dün hastaydım ve ateşim vardı."},{t:"Ich konnte leider nicht zur Party kommen.",tr:"Maalesef partiye gelemedim."},{t:"Als Kind wollte ich Pilot werden.",tr:"Çocukken pilot olmak istiyordum."}],
   quiz:[
    {q:"Gestern ___ ich keine Zeit.",o:["habe","hatte","hätte"],a:1,e:"haben → Präteritum: hatte."},
    {q:"Als Kind ___ er nicht schwimmen.",o:["konnte","kann","gekonnt"],a:0,e:"Modal geçmişi → konnte."},
    {q:"'sein' fiilinin Präteritum'u (ich): ich ___",fill:1,a:"war",e:"sein → war."}
   ]},
  {t:"Komparativ & Superlativ", d:"schneller, am schnellsten",
   body:[
    {p:"Karşılaştırma: sıfat + <b>er</b> + als: schnell<b>er als</b> (daha hızlı). Enüstünlük: <b>am ...sten</b>: am schnell<b>sten</b>. Tek heceliler çoğu zaman umlaut alır: alt → älter, groß → größer, jung → jünger.", tr:"İngilizceden farkı: uzun sıfatlar bile -er alır, 'more' yoktur! 'interessanter' ✓ 'mehr interessant' ✗"},
    {p:"Düzensizler: gut → besser → am besten; viel → mehr → am meisten; gern → lieber → am liebsten.", tr:"'gern/lieber/am liebsten' üçlüsü tercihlerin dili: Ich trinke lieber Tee = Çayı tercih ederim."}
   ],

    {q:"'gut' sıfatının enüstünlüğü: am ___",o:["gutesten","besten","gutsten"],a:1,e:"gut → besser → am besten."},

B2:{
 grammar:[
  {t:"Relativsätze", d:"der, die, das: cümle yapıştırıcısı",
   body:[
    {p:"İlgi zamiri, işaret ettiği ismin cinsiyetini alır ama halini kendi cümlesinden alır: Der Mann, <b>der</b> dort steht (özne)... Der Mann, <b>den</b> ich kenne (nesne)... Der Mann, <b>dem</b> ich helfe (Dativ)...", tr:"Türkçedeki '-en/-dığı': 'orada duran adam', 'tanıdığım adam'. Fiil yine yan cümle sonuna!"},
    {p:"Edatlı hali: Die Firma, <b>mit der</b> wir arbeiten... (birlikte çalıştığımız firma). Yer için <b>wo</b> kullanılabilir: Die Stadt, wo ich geboren bin.", tr:"Edat + ilgi zamiri bloğu bölünmez: 'mit der', 'für den', 'über das'."}
   ],
   tip:"İki adımlı karar: 1) İsim ne cinsiyette? (der/die/das ailesini seç) 2) Yan cümledeki görevi ne? (özne/nesne/Dativ haline çek). Bu iki soruyu sırayla sor, asla şaşırma.",
   ex:[{t:"Das ist der Kollege, der mir geholfen hat.",tr:"Bu, bana yardım eden iş arkadaşı."},{t:"Die Wärmepumpe, die wir entwickelt haben, ist sehr effizient.",tr:"Geliştirdiğimiz ısı pompası çok verimli."},{t:"Der Kunde, mit dem ich telefoniert habe, kommt aus Wien.",tr:"Telefonlaştığım müşteri Viyanalı."}],
   quiz:[
    {q:"Der Film, ___ wir gesehen haben, war toll.",o:["der","den","dem"],a:1,e:"Nesne konumu, eril → den."},
    {q:"Die Frau, ___ ich geholfen habe, ist Ärztin.",o:["die","der","den"],a:1,e:"helfen + Dativ, dişil → der."},
    {q:"Das Haus, ___ dem wir wohnen, ist alt. (edatlı)",fill:1,a:"in",e:"in + Dativ: in dem (= worin)."}
   ]},
  {t:"Genitiv ve Edatları", d:"Resmî dilin son kalesi",
   body:[
    {p:"İyelik hali: <b>des Mannes, der Frau, des Kindes, der Leute</b>. Eril ve nötr isimler -s/-es alır: das Auto <b>des Chefs</b> (şefin arabası).", tr:"Türkçedeki '-in' eki: 'şefin arabası'. Konuşmada 'von + Dativ' ile değiştirilir ama yazıda Genitiv şıklıktır."},
    {p:"Genitiv edatları resmi metinlerin imzası: <b>wegen</b> (yüzünden), <b>trotz</b> (rağmen), <b>während</b> (sırasında), <b>innerhalb/außerhalb</b> (içinde/dışında): trotz des Regens, während der Sitzung.", tr:"İş yazışmalarında 'wegen des Termins' diyebilmek seni bir lige yukarı taşır."}
   ],
   tip:"Konuşurken zorlanırsan 'von' kaçışı meşrudur: 'das Auto von meinem Chef'. Ama e-postada 'aufgrund der aktuellen Lage' (mevcut durum nedeniyle) gibi Genitiv kalıpları hazır ezberle — kopyala, yapıştır, parla.",
   ex:[{t:"Das Büro meines Vaters ist im Zentrum.",tr:"Babamın ofisi merkezde."},{t:"Trotz des schlechten Wetters kamen alle.",tr:"Kötü havaya rağmen herkes geldi."},{t:"Während der Messe haben wir viele Kunden getroffen.",tr:"Fuar sırasında birçok müşteriyle görüştük."}],
   quiz:[
    {q:"Das ist das Haus ___ Lehrers.",o:["der","des","dem"],a:1,e:"Eril Genitiv → des Lehrers."},
    {q:"___ des Regens spielen sie draußen.",o:["Wegen","Trotz","Während"],a:1,e:"'Rağmen' → trotz."},
    {q:"'Toplantı sırasında' → ___ der Sitzung",fill:1,a:"während",e:"während + Genitiv."}
   ]}
 ],

C1:{
 grammar:[
  {t:"Konjunktiv I: indirekte Rede", d:"Gazetecinin kipi",
   body:[
    {p:"Başkasının sözünü tarafsız aktarır: Der Minister sagte, er <b>sei</b> zufrieden (memnun olduğunu söyledi — doğru mu bilmiyoruz). Kuruluş: mastar kökü + e: er habe, er komme, er könne.", tr:"Türkçedeki '-mış' aktarımının resmî hali. Haber dilinin bel kemiğidir: 'söylediğine göre'."},
    {p:"Konjunktiv I, Indikativ ile aynı görünürse Konjunktiv II devreye girer: sie sagten, sie <b>hätten</b> (haben yerine).", tr:"Kural zinciri: önce K1, çakışırsa K2, o da çakışırsa würde."}
   ],
   tip:"Spiegel veya Zeit okurken 'sei, habe, wolle' gördüğünde dur: yazar mesafe koyuyor, iddiayı sahiplenmiyor demektir. Bu kipi tanımak, Almanca haberi 'okumak' ile 'anlamak' arasındaki farktır.",
   ex:[{t:"Er sagte, er sei krank und könne nicht kommen.",tr:"Hasta olduğunu ve gelemeyeceğini söyledi."},{t:"Die Firma erklärte, man habe das Problem gelöst.",tr:"Şirket, sorunun çözüldüğünü açıkladı."},{t:"Sie behauptet, sie wisse nichts davon.",tr:"Bundan haberi olmadığını iddia ediyor."}],
   quiz:[
    {q:"Er sagte, er ___ keine Zeit.",o:["hat","habe","hätte"],a:1,e:"İndirekte Rede → Konjunktiv I: habe."},
    {q:"'sein' fiilinin Konjunktiv I'i (er): er ___",fill:1,a:"sei",e:"sein → er sei."},
    {q:"K1 Indikativ'le çakışırsa ne kullanılır?",o:["Präteritum","Konjunktiv II","Futur"],a:1,e:"Çakışmada K2 devreye girer."}
   ]},
  {t:"İleri Bağlaçlar: je...desto, indem, sodass", d:"Düşünceyi ören iplikler",
   body:[
    {p:"<b>je + Komparativ ..., desto + Komparativ</b>: Je mehr ich lerne, desto sicherer werde ich. (Ne kadar öğrenirsem o kadar eminleşirim.)", tr:"'Ne kadar ... o kadar' kalıbının birebir karşılığı. je tarafında fiil sonda, desto tarafında fiil zamirle yer değiştirir."},
    {p:"<b>indem</b> = '-erek' (yöntem): Man lernt eine Sprache, <b>indem</b> man sie spricht. <b>sodass</b> = 'öyle ki' (sonuç): Es regnete stark, <b>sodass</b> wir blieben.", tr:"indem, Türkçenin '-erek' zarf-fiilinin en yakın Almanca akrabasıdır."}
   ],
   tip:"Sunumda güç cümlesi hazırla: 'Je früher wir investieren, desto geringer sind die Risiken.' je...desto yapısı, dinleyicide neden-sonuç zincirini otomatik kurar — ikna sanatının gramer hali.",
   ex:[{t:"Je länger ich in Deutschland lebte, desto besser verstand ich die Kultur.",tr:"Almanya'da ne kadar uzun yaşadıysam kültürü o kadar iyi anladım."},{t:"Wir senken die Kosten, indem wir Prozesse automatisieren.",tr:"Süreçleri otomatikleştirerek maliyetleri düşürüyoruz."},{t:"Der Vortrag war überzeugend, sodass alle zustimmten.",tr:"Sunum ikna ediciydi, öyle ki herkes onayladı."}],
   quiz:[
    {q:"Je mehr man übt, ___ besser wird man.",o:["je","desto","so"],a:1,e:"je ... desto kalıbı."},
    {q:"'Konuşarak öğrenilir' → Man lernt, ___ man spricht.",o:["indem","sodass","obwohl"],a:0,e:"Yöntem → indem."},
    {q:"Sonuç bağlacı: Es war spät, ___ wir gingen.",fill:1,a:"sodass",e:"Sonuç → sodass."}
   ]}
 ],

 grammar:[
  {t:"-er Fiilleri ve Olumsuzluk", d:"parler, aimer, habiter",
   body:[
    {p:"Fransız fiillerinin %90'ı -er ailesindendir: je parl<b>e</b>, tu parl<b>es</b>, il parl<b>e</b>, nous parl<b>ons</b>, vous parl<b>ez</b>, ils parl<b>ent</b>. Son -ent OKUNMAZ: ils parlent = 'il parl'.", tr:"Yazıda altı farklı ek, konuşmada çoğu aynı ses! Bu yüzden Fransızcada özne zamiri asla atlanmaz."},
    {p:"Olumsuzluk fiili sandviç yapar: <b>ne + fiil + pas</b>: Je <b>ne</b> parle <b>pas</b>. Sesli harften önce ne → n': Je <b>n'</b>aime <b>pas</b>.", tr:"Konuşma dilinde 'ne' sık düşer (je parle pas) ama yazıda ikisi de şart."}

A2:{
 grammar:[
  {t:"L'article partitif: du, de la, des", d:"Biraz ekmek, biraz su",
   body:[
    {p:"Sayılamayan miktarlar için: <b>du</b> pain (eril), <b>de la</b> confiture (dişil), <b>de l'</b>eau (sesli), <b>des</b> fruits (çoğul). 'Bir kısım, biraz' anlamı taşır.", tr:"Türkçede karşılığı çoğu zaman hiçtir: 'Ekmek alıyorum' = J'achète du pain. Fransızca o 'biraz'ı mutlaka söyler."},
    {p:"Olumsuzda hepsi <b>de</b>'ye döner: Je ne mange pas <b>de</b> pain. Je n'ai pas <b>d'</b>argent.", tr:"Altın kural: pas'tan sonra du/de la/des yaşayamaz — hepsi 'de' olur."}
   ],
   tip:"Miktar zarflarından sonra da yalnız 'de' gelir: beaucoup <b>de</b> café, un peu <b>de</b> sucre, trop <b>de</b> travail. 'Beaucoup du café' ✗ — bu hatayı yapmayan A2 öğrencisi azdır, sen o az kişiden ol.",
   ex:[{t:"Je voudrais du fromage et de la salade.",tr:"Peynir ve salata istiyorum."},{t:"Tu bois de l'eau ou du vin?",tr:"Su mu içersin şarap mı?"},{t:"Il n'y a plus de lait.",tr:"Hiç süt kalmadı (olumsuz → de)."},{t:"Elle boit beaucoup de café.",tr:"Çok kahve içiyor."}],
   quiz:[
    {q:"Je mange ___ pain le matin.",o:["du","de la","des"],a:0,e:"le pain eril → du."},
    {q:"Olumsuz: Je ne bois pas ___ café.",o:["du","de","des"],a:1,e:"pas'tan sonra → de."},
    {q:"beaucoup ___ travail",fill:1,a:"de",e:"Miktar zarfı + de."}
   ]},
  {t:"COD Zamirleri: le, la, les", d:"Tekrarı öldüren zamirler",
   body:[
    {p:"Nesneyi tekrar etmemek için: Tu vois <b>le film</b>? — Oui, je <b>le</b> vois. La pomme → je <b>la</b> mange. Les clés → je <b>les</b> cherche. Zamir fiilden ÖNCE gelir!", tr:"Türkçedeki 'onu/onları': 'Onu görüyorum' = Je le vois. Ama Fransızca zamiri fiilin önüne koyar."},
    {p:"Passé composé'de participe uyum yapar: Les clés? Je <b>les</b> ai trouvé<b>es</b>. (COD önde olduğu için -es geldi.)", tr:"Bu uyum kuralı yazılı sınavların gözdesidir: nesne öne geçtiyse participe süslenir."}
   ],
   tip:"Sıralamayı şarkı gibi ezberle: özne + zamir + fiil. 'Je t'aime' bu kalıbın en ünlü örneğidir: seni (t') seviyorum. Zamiri fiilin arkasına atma dürtüsüne diren!",
   ex:[{t:"Ce livre? Je le lis maintenant.",tr:"Bu kitap mı? Onu şimdi okuyorum."},{t:"Ta sœur? Je la connais bien.",tr:"Kız kardeşin mi? Onu iyi tanırım."},{t:"Les photos? Je les ai envoyées hier.",tr:"Fotoğraflar mı? Onları dün gönderdim."}],
   quiz:[
    {q:"Tu regardes la télé? — Oui, je ___ regarde.",o:["le","la","les"],a:1,e:"la télé dişil → la."},
    {q:"Zamirin yeri neresi? 'Je vois Marc' → ",o:["Je vois le","Je le vois","Le je vois"],a:1,e:"Zamir fiilden önce: je le vois."},
    {q:"Les fleurs? Je ___ ai achetées.",fill:1,a:"les",e:"Çoğul → les (uyum: achetées)."}
   ]}
 ],

B1:{
 grammar:[
  {t:"Le conditionnel présent", d:"Kibarlık ve hayal kipi",
   body:[
    {p:"Futur kökü + imparfait ekleri: je parler<b>ais</b>, tu parler<b>ais</b>, il parler<b>ait</b>... Kibar istek: <b>Je voudrais</b> un café. Tavsiye: <b>Tu devrais</b> te reposer.", tr:"Türkçedeki '-irdi': isterdim = je voudrais. Fransız nezaketinin anahtar kipi."},
    {p:"Hayali durumlar: <b>Si j'avais le temps, je voyagerais.</b> (Si + imparfait, + conditionnel.)", tr:"'Zamanım olsa seyahat ederdim' — si tarafında asla conditionnel olmaz!"}
   ],
   tip:"Üç sihirli kalıbı hazır tut: 'Je voudrais...' (isterdim), 'Pourriez-vous...?' (yapabilir miydiniz?), 'Il faudrait...' (gerekirdi). Bu üçlü, e-postadan restorana her kapıyı açar.",
   ex:[{t:"Je voudrais réserver une table pour deux.",tr:"İki kişilik masa ayırtmak isterdim."},{t:"Pourriez-vous m'envoyer le document?",tr:"Bana belgeyi gönderebilir miydiniz?"},{t:"À ta place, je parlerais avec le chef.",tr:"Senin yerinde olsam şefle konuşurdum."},{t:"Si j'étais riche, j'achèterais une maison à Nice.",tr:"Zengin olsaydım Nice'te bir ev alırdım."}],
   quiz:[
    {q:"Kibar istek: Je ___ un thé, s'il vous plaît.",o:["veux","voudrais","voulais"],a:1,e:"Kibarlık → conditionnel: voudrais."},
    {q:"Si j'avais le temps, je ___ du sport.",o:["ferais","ferai","fais"],a:0,e:"Si + imparfait → conditionnel: ferais."},
    {q:"Tavsiye: Tu ___ dormir plus. (devoir)",fill:1,a:"devrais",e:"devoir → conditionnel: devrais."}
   ]},
  {t:"Pronoms relatifs: qui, que, dont, où", d:"Cümle birleştirme dörtlüsü",
   body:[
    {p:"<b>qui</b> = özne (La femme <b>qui</b> parle...), <b>que</b> = nesne (Le film <b>que</b> j'aime...), <b>où</b> = yer/zaman (La ville <b>où</b> je suis né...).", tr:"Türkçedeki '-en/-dığı': konuşan kadın = la femme qui parle; sevdiğim film = le film que j'aime."},
    {p:"<b>dont</b> = 'de'li yapıların zamiri: Le projet <b>dont</b> je parle (bahsettiğim proje — parler DE). Le livre <b>dont</b> j'ai besoin (ihtiyacım olan kitap — avoir besoin DE).", tr:"Fiil 'de' ile mi çalışıyor? O zaman dont! Bu tek soru dont'un tüm gizemini çözer."}
   ],
   tip:"qui/que kararı için özne testi: ilgi cümlesinde fiilin öznesi var mı? Varsa que (le film que J'AIME — özne je), yoksa qui özne olur (la femme qui PARLE). İki saniyelik test, sıfır hata.",
   ex:[{t:"C'est le collègue qui m'a aidé.",tr:"Bana yardım eden iş arkadaşı bu."},{t:"Le rapport que tu as écrit est excellent.",tr:"Yazdığın rapor mükemmel."},{t:"Voilà le quartier où j'ai grandi.",tr:"İşte büyüdüğüm mahalle."},{t:"C'est un sujet dont on parle beaucoup.",tr:"Bu, hakkında çok konuşulan bir konu."}],
   quiz:[
    {q:"La personne ___ travaille ici est ma tante.",o:["que","qui","dont"],a:1,e:"Özne yok → qui özne olur."},
    {q:"Le gâteau ___ tu as fait était délicieux.",o:["qui","que","où"],a:1,e:"Özne var (tu) → que."},
    {q:"Le livre ___ j'ai besoin est cher. (avoir besoin DE)",fill:1,a:"dont",e:"de'li yapı → dont."}
   ]}
 ],

   sample:"Si j'avais un an de congé, je partirais d'abord en Italie. J'apprendrais l'italien le matin et je cuisinerais l'après-midi. Je voudrais aussi écrire un petit livre sur mes voyages. Il faudrait bien sûr économiser avant. Mais quel rêve ce serait!"},
  {p:"Hayatındaki önemli bir yeri anlat: qui, que, dont, où zamirlerinin dördünü de kullan (8 cümle).",

   sample:"Il y a un endroit qui compte beaucoup pour moi: la maison où j'ai grandi. C'est une maison que mon grand-père a construite de ses mains. Le jardin dont ma mère s'occupait était plein de roses. Les souvenirs que je garde de cette maison sont mon vrai trésor. C'est l'endroit dont je rêve quand la vie devient trop rapide."}

B2:{
 grammar:[
  {t:"Le discours indirect", d:"Il a dit que...",
   body:[
    {p:"Ana fiil geçmişteyse zaman kayar: présent → imparfait ('Je suis fatigué' → Il a dit qu'il <b>était</b> fatigué), futur → conditionnel ('Je viendrai' → ...qu'il <b>viendrait</b>), passé composé → plus-que-parfait.", tr:"'Yorgun olduğunu söyledi' yapısı. Kayma mekaniktir: bir vites geri."},
    {p:"Sorular: 'Où habites-tu?' → Il m'a demandé <b>où j'habitais</b>. Evet/hayır → <b>si</b>: Il a demandé <b>si</b> j'étais prêt. Emirler → <b>de + infinitif</b>: 'Viens!' → Il m'a dit <b>de venir</b>.", tr:"Aktarılan soruda devrik yapı ve soru işareti kaybolur; emir mastara döner."}
   ],
   tip:"Zaman ifadeleri de göç eder: aujourd'hui → ce jour-là, demain → le lendemain, hier → la veille. Bir dedikodu aktarır gibi düşün: her ayrıntı 'oradan buraya' taşınırken kılık değiştirir.",
   ex:[{t:"'Je peux t'aider.' → Elle a dit qu'elle pouvait m'aider.",tr:"'Sana yardım edebilirim' → Yardım edebileceğini söyledi."},{t:"Il m'a demandé si le projet avançait.",tr:"Projenin ilerleyip ilerlemediğini sordu."},{t:"Le chef nous a dit de finir avant vendredi.",tr:"Şef bize cuma gününden önce bitirmemizi söyledi."}],
   quiz:[
    {q:"'Je suis prêt' → Il a dit qu'il ___ prêt.",o:["est","était","serait"],a:1,e:"présent → imparfait."},
    {q:"'Viendras-tu?' → Elle a demandé ___ je viendrais.",o:["que","si","quand"],a:1,e:"Evet/hayır sorusu → si."},
    {q:"Emir aktarımı: 'Attendez!' → Il nous a dit ___ attendre.",fill:1,a:"d'",e:"Emir → de + infinitif (d'attendre)."}
   ]},
  {t:"Le gérondif: en + -ant", d:"-erek yapmanın Fransızcası",
   body:[
    {p:"<b>en + participe présent</b>: eşzamanlılık ve yöntem bildirir: J'apprends <b>en écoutant</b> des podcasts (dinleyerek öğreniyorum). Il est parti <b>en courant</b> (koşarak).", tr:"Türkçedeki '-erek/-arak' zarf-fiili ile birebir: yaparak öğrenmek = apprendre en faisant."},
    {p:"Participe présent 'nous' çekiminden türer: nous finiss<b>ons</b> → finiss<b>ant</b>. Üç düzensiz: étant (être), ayant (avoir), sachant (savoir).", tr:"'Tout en' vurgulu eşzamanlılık ve karşıtlık verir: Tout en souriant, il refusa (gülümseyerek reddetti)."}
   ],
   tip:"Gérondif'in gizli öznesi ana cümlenin öznesidir: 'En sortant du bureau, mon téléphone a sonné' ✗ (telefon mu çıkıyor?). 'En sortant du bureau, j'ai entendu mon téléphone' ✓ — özne uyumunu daima kontrol et.",
   ex:[{t:"On apprend une langue en la parlant.",tr:"Bir dil onu konuşarak öğrenilir."},{t:"Elle lit en buvant son café.",tr:"Kahvesini içerken okuyor."},{t:"En arrivant, appelez-moi.",tr:"Varınca beni arayın."},{t:"Tout en comprenant ta position, je ne suis pas d'accord.",tr:"Pozisyonunu anlamakla birlikte katılmıyorum."}],
   quiz:[
    {q:"'Çalışarak başardı' → Il a réussi ___ travaillant.",o:["en","dans","pour"],a:0,e:"Yöntem → en + -ant."},
    {q:"'finir' fiilinin participe présent'ı:",o:["finant","finissant","finirant"],a:1,e:"nous finissons → finissant."},
    {q:"'être' fiilinin participe présent'ı: ___",fill:1,a:"étant",e:"Düzensiz: étant."}
   ]}
 ],

 writings:[

C1:{
 grammar:[
  {t:"Le passé simple (tanıma)", d:"Edebiyatın zamanı",
   body:[
    {p:"Roman ve masal dilidir; konuşulmaz ama OKUNUR: il parl<b>a</b> (konuştu), il fin<b>it</b>, il e<b>ut</b> (avoir), il f<b>ut</b> (être), ils all<b>èrent</b>.", tr:"Türk okur için müjde: anlamı passé composé ile aynıdır — 'il parla' = 'il a parlé'. Sadece tanıman yeterli, üretmen gerekmez."},
    {p:"Sık düzensizler: être → fut, avoir → eut, faire → fit, venir → vint, pouvoir → put, savoir → sut.", tr:"'Il fut un temps où...' (bir zamanlar...) gibi kalıplar edebî metnin kapısını açar."}
   ],
   tip:"Kestirme tanıma yöntemi: -a, -it, -ut, -int ile biten tuhaf fiil biçimi gördüysen ve metin hikâye anlatıyorsa, passé simple'dır. Panik yapma, zihninde passé composé'ye çevir, oku geç.",
   ex:[{t:"Elle ouvrit la porte et vit la mer.",tr:"Kapıyı açtı ve denizi gördü."},{t:"Il fut un temps où ce village vivait de la pêche.",tr:"Bir zamanlar bu köy balıkçılıkla geçinirdi."},{t:"Ils se regardèrent et comprirent tout.",tr:"Birbirlerine baktılar ve her şeyi anladılar."}],
   quiz:[
    {q:"'il eut' hangi fiilin passé simple'ı?",o:["être","avoir","aller"],a:1,e:"avoir → il eut."},
    {q:"'Elle parla' günlük dile çevrilirse:",o:["Elle parle","Elle a parlé","Elle parlerait"],a:1,e:"passé simple = passé composé anlamı."},
    {q:"'être' fiilinin passé simple'ı (il): il ___",fill:1,a:"fut",e:"être → fut."}
   ]},
  {t:"Connecteurs logiques avancés", d:"Denemenin iskeleti",
   body:[
    {p:"Karşıtlık: <b>néanmoins, toutefois, en revanche, or</b>. Sebep-sonuç: <b>par conséquent, dès lors, d'où</b>. Taviz: <b>certes... mais, quoi qu'il en soit</b>.", tr:"'Certes... mais' kalıbı Fransız tartışma sanatının kalbidir: önce hakkını teslim et (certes), sonra vur (mais)."},
    {p:"<b>Or</b> özel bir mücevherdir: beklenmedik ama kritik bir bilgiyi ekler ve akıl yürütmeyi döndürür: Il pensait réussir. <b>Or</b>, il avait oublié un détail.", tr:"'Or' = 'oysa/ne var ki' — mantık zincirinin menteşesi. DELF/DALF yazılarının gizli puanı."}
   ],
   tip:"Deneme şablonu hazırla: 'Certes, X présente des avantages. Toutefois, Y. Par conséquent, Z.' Bu üç cümlelik iskeleti her konuya giydirebilirsin — jüri organize düşünceye bayılır.",
   ex:[{t:"Certes, le projet est coûteux; toutefois, ses bénéfices sont durables.",tr:"Elbette proje maliyetli; ne var ki faydaları kalıcı."},{t:"Il avait tout prévu. Or, le marché changea brusquement.",tr:"Her şeyi öngörmüştü. Oysa piyasa aniden değişti."},{t:"Dès lors, une seule option restait possible.",tr:"O andan itibaren tek bir seçenek mümkündü."}],
   quiz:[
    {q:"Taviz kalıbı: ___, c'est cher, mais ça vaut la peine.",o:["Certes","Or","D'où"],a:0,e:"Taviz → certes... mais."},
    {q:"'Beklenmedik kritik bilgi' bağlacı:",o:["donc","or","ainsi"],a:1,e:"or = oysa/ne var ki."},
    {q:"Sonuç bağlacı: Par ___, nous devons agir.",fill:1,a:"conséquent",e:"par conséquent = dolayısıyla."}
   ]}
 ],

 readings:[
  {t:"Le manuscrit retrouvé", sents:[
   {s:"Un matin d'hiver, la bibliothécaire ouvrit une caisse oubliée et découvrit un manuscrit jauni.",tr:"Bir kış sabahı kütüphaneci unutulmuş bir sandığı açtı ve sararmış bir el yazması keşfetti."},
   {s:"Elle le lut d'une traite, sans remarquer que la nuit était tombée.",tr:"Onu bir solukta okudu; gecenin çöktüğünü fark etmeden."},
   {s:"L'auteur, dont personne ne connaissait le nom, y racontait la ville telle qu'elle fut un siècle plus tôt.",tr:"Adını kimsenin bilmediği yazar, şehri bir yüzyıl önceki hâliyle anlatıyordu."},
   {s:"Certes, les rues avaient changé; toutefois, les espoirs des habitants semblaient étrangement familiers.",tr:"Elbette sokaklar değişmişti; ne var ki sakinlerin umutları tuhaf biçimde tanıdıktı."},
   {s:"Elle comprit alors que les villes vieillissent, mais que les rêves, eux, se transmettent.",tr:"O zaman anladı ki şehirler yaşlanır ama hayaller aktarılır."}],
   gloss:[["la caisse","sandık"],["d'une traite","bir solukta"],["jauni","sararmış"],["se transmettre","aktarılmak"]],
   qs:[{q:"'elle ouvrit, découvrit, lut' hangi zamandır?",o:["Imparfait","Passé simple","Conditionnel"],a:1},{q:"Metnin son fikri ne?",o:["Şehirler değişmez","Hayaller aktarılır","El yazmaları değersizdir"],a:1}]},
  {t:"L'éloge de la friction", sents:[
   {s:"Tout, dans nos outils numériques, vise à supprimer l'effort; or, l'effort est précisément ce qui grave la mémoire.",tr:"Dijital araçlarımızdaki her şey çabayı ortadan kaldırmayı hedefler; oysa hafızaya kazıyan şey tam da çabadır."},
   {s:"Certes, la fluidité séduit; toutefois, ce qui s'obtient sans résistance s'oublie sans regret.",tr:"Elbette akıcılık cezbeder; ne var ki dirençsiz elde edilen, pişmanlıksız unutulur."},
   {s:"Les chercheurs préconisent dès lors de réintroduire une friction choisie: écrire à la main, attendre, relire.",tr:"Araştırmacılar bu nedenle seçilmiş bir sürtünmeyi geri getirmeyi öneriyor: elle yazmak, beklemek, tekrar okumak."},
   {s:"En amont de toute réforme éducative, c'est notre rapport à la facilité qu'il faudrait remettre en cause.",tr:"Her eğitim reformundan önce sorgulanması gereken, kolaylıkla kurduğumuz ilişkidir."},
   {s:"La portée de ce constat dépasse l'école: elle touche à ce que nous voulons devenir.",tr:"Bu tespitin kapsamı okulu aşar: kim olmak istediğimize dokunur."}],
   gloss:[["graver","kazımak"],["la fluidité","akıcılık"],["la friction","sürtünme"],["le rapport à","ile ilişki"]],
   qs:[{q:"Hafızaya kazıyan şey ne?",o:["Hız","Çaba","Tekrar"],a:1},{q:"Önerilen 'seçilmiş sürtünme' örneği hangisi?",o:["Daha hızlı uygulamalar","Elle yazmak","Sesli asistanlar"],a:1}]}
 ],
 writings:[
  {p:"'La facilité est-elle l'ennemie de l'apprentissage?' — certes/toutefois/or/par conséquent bağlaçlarıyla yapılandırılmış bir deneme paragrafı yaz (10-12 cümle).",
   ck:["'Certes... toutefois' taviz yapısını kurdum","'or' bağlacını doğru yerde kullandım","Bir sonuç bağlacıyla bitirdim (par conséquent, dès lors)"],
   sample:"Certes, les outils modernes rendent l'apprentissage plus accessible que jamais. Toutefois, l'accessibilité ne garantit pas la profondeur. Nous consommons des leçons comme des vidéos; or, comprendre exige de la lenteur et de la résistance. Dès lors, le véritable luxe éducatif serait peut-être la difficulté choisie. Par conséquent, apprenons à désirer l'effort plutôt qu'à le fuir."},
  {p:"Kısa bir öykü açılışı yaz (5-6 cümle) — passé simple kullanmayı dene, en az üç düzensiz biçim (fut, eut, fit...) kullan.",
   ck:["Passé simple biçimlerini doğru kullandım","Anlatı ile tasvir (imparfait) dengesini kurdum","Bir edebî bağlaç kullandım"],
   sample:"Il fut un temps où la maison au bout de la rue restait toujours éclairée. Un soir de novembre, un voyageur frappa à la porte. La vieille dame ouvrit, le regarda longuement, puis sourit comme si elle l'attendait depuis des années. 'Vous voilà enfin', dit-elle. Il eut alors la certitude étrange d'être déjà venu."}
 ]
}

 grammar:[

   body:[
    {p:"Belirli: <b>el</b> (eril), <b>la</b> (dişil), <b>los/las</b> (çoğul). Belirsiz: <b>un, una, unos, unas</b>. -o ile bitenler çoğunlukla eril (el libro), -a ile bitenler dişil (la casa).", tr:"İstisnalar ezber ister: el día (gün), el mapa, la mano (el), el problema."},

A2:{
 grammar:[
  {t:"Estar + gerundio", d:"Şu anda oluyor",
   body:[
    {p:"Konuşma anı: <b>estar + -ando/-iendo</b>: Estoy trabaj<b>ando</b> (çalışıyorum şu an). Estamos com<b>iendo</b>.", tr:"Türkçedeki vurgulu '-yor': 'şu an çalışıyorum' = estoy trabajando. Genel alışkanlık için sade presente yeter: trabajo aquí."},
    {p:"Düzensiz gerundio'lar: leer → le<b>y</b>endo, dormir → d<b>u</b>rmiendo, pedir → p<b>i</b>diendo.", tr:"İngilizce -ing ile aynı mantık ama İspanyolca günlük işler için sade presente'yi tercih eder."}
   ],
   tip:"Telefonda hazır kalıp: '¿Qué estás haciendo?' (Ne yapıyorsun?) — 'Nada, estoy viendo la tele.' Bu ikili, İspanyol gündelik konuşmasının açılış perdesidir.",
   ex:[{t:"Estoy aprendiendo español.",tr:"İspanyolca öğreniyorum (şu dönem)."},{t:"¿Qué estás haciendo? — Estoy cocinando.",tr:"Ne yapıyorsun? — Yemek yapıyorum."},{t:"Los niños están durmiendo.",tr:"Çocuklar uyuyor."}],
   quiz:[
    {q:"Ahora mismo (yo) ___ estudiando.",o:["estoy","soy","hay"],a:0,e:"Şu an → estoy + gerundio."},
    {q:"'leer' fiilinin gerundio'su:",o:["leendo","leyendo","liendo"],a:1,e:"leer → leyendo."},
    {q:"Ellos están ___ la cena. (preparar)",fill:1,a:"preparando",e:"-ar → -ando."}
   ]},
  {t:"Pretérito perfecto: he hablado", d:"Bugünle bağlantılı geçmiş",
   body:[
    {p:"<b>haber + participio</b>: he, has, ha, hemos, habéis, han + habl<b>ado</b>/com<b>ido</b>. Bugün, bu hafta, hayat boyu deneyimler: <b>Hoy he trabajado mucho.</b> <b>¿Has estado en Madrid?</b>", tr:"İngilizce present perfect'in kuzeni. 'Hoy, esta semana, alguna vez, todavía' sinyalleri onu çağırır."},
    {p:"Düzensiz participio'lar: hecho (yapılmış), visto, dicho, escrito, puesto, vuelto.", tr:"İspanya'da bugünkü olaylar için bu zaman standarttır; Latin Amerika indefinido'yu tercih eder — ikisi de doğru."}
   ],
   tip:"Zaman çizgisi kapalı mı açık mı? 'Ayer' (dün) kapandı → indefinido. 'Hoy' (bugün) hâlâ açık → perfecto. 'Hoy he comido' ✓ ama 'Ayer he comido' İspanya standardında ✗.",
   ex:[{t:"Esta semana he tenido mucho trabajo.",tr:"Bu hafta çok işim oldu."},{t:"¿Alguna vez has probado el mate?",tr:"Hiç mate denedin mi?"},{t:"Todavía no hemos visto esa película.",tr:"O filmi henüz izlemedik."}],
   quiz:[
    {q:"Hoy (yo) ___ hablado con el jefe.",o:["he","ha","has"],a:0,e:"yo → he hablado."},
    {q:"'hacer' fiilinin participio'su:",o:["hacido","hecho","hacho"],a:1,e:"hacer → hecho."},
    {q:"¿___ vez has estado en México? (hiç)",fill:1,a:"alguna",e:"alguna vez = hiç / herhangi bir zaman."}
   ]}
 ],

B1:{
 grammar:[
  {t:"El imperativo", d:"Emir, rica, tarif",
   body:[
    {p:"<b>tú</b> için: presente'nin 3. tekil hali: ¡Habla! ¡Come! Düzensizler: di (de!), haz (yap!), ve (git!), pon (koy!), sal (çık!), ten, ven.", tr:"Tarifler, yol tarifi ve tavsiyelerin kipi: 'Gira a la derecha' (sağa dön)."},
    {p:"Olumsuz emir subjuntivo'ya döner: ¡No habl<b>es</b>! ¡No com<b>as</b>! Zamirler olumluda fiile yapışır (dime, levántate), olumsuzda öne geçer (no me digas).", tr:"'Dime' (söyle bana) ↔ 'No me digas' (deme ya!) — ikinci aynı zamanda şaşkınlık ünlemi!"}
   ],
   tip:"Sekiz düzensiz tú emrini tek cümleyle ezberle: 'Di, haz, ve, pon, sal, sé, ten, ven' — İspanyol öğretmenler buna 'emir marşı' der. Ritimle üç kez söyle, ömür boyu kalır.",
   ex:[{t:"Habla más despacio, por favor.",tr:"Lütfen daha yavaş konuş."},{t:"Haz la tarea antes de salir.",tr:"Çıkmadan önce ödevi yap."},{t:"No comas tan rápido.",tr:"O kadar hızlı yeme."},{t:"Levántate temprano mañana.",tr:"Yarın erken kalk."}],
   quiz:[
    {q:"'hacer' fiilinin tú emri:",o:["hace","haz","haga"],a:1,e:"Düzensiz: ¡haz!"},
    {q:"Olumsuz emir: ¡No ___ tan alto! (hablar)",o:["habla","hables","hablas"],a:1,e:"Olumsuz → subjuntivo: no hables."},
    {q:"'Bana söyle' → ¡___! (decir + me)",fill:1,a:"dime",e:"Olumluda zamir yapışır: dime."}
   ]},
  {t:"por vs para", d:"İki 'için', bin nüans",
   body:[
    {p:"<b>para</b>: amaç, hedef, alıcı, son tarih: Estudio <b>para</b> aprender. Un regalo <b>para</b> ti. <b>Para</b> el lunes.", tr:"para = ileriye bakar (hedef). 'Ne için? Kime? Ne zamana kadar?'"},
    {p:"<b>por</b>: sebep, araç, değişim, süre, yer boyunca: Gracias <b>por</b> tu ayuda. Hablamos <b>por</b> teléfono. Lo compré <b>por</b> 20 euros. Paseo <b>por</b> el parque.", tr:"por = geriye/etrafa bakar (sebep, kanal). 'Neden? Ne aracılığıyla? Ne karşılığında?'"}
   ],
   tip:"Ok metaforu: para bir ok gibi hedefe gider (→), por bir daire gibi sebebin etrafında döner (⟳). 'Trabajo para vivir' (yaşamak İÇİN çalışırım) ama 'Brindo por ti' (senin ŞEREFİNE kadeh kaldırırım).",
   ex:[{t:"Este informe es para el director.",tr:"Bu rapor müdür için (alıcı → para)."},{t:"Gracias por venir.",tr:"Geldiğin için teşekkürler (sebep → por)."},{t:"Necesito el visado para viajar.",tr:"Seyahat etmek için vizeye ihtiyacım var."},{t:"Caminamos por la playa.",tr:"Sahil boyunca yürüdük."}],
   quiz:[
    {q:"Estudio español ___ mi trabajo. (amacıyla)",o:["por","para","de"],a:1,e:"Amaç → para."},
    {q:"Gracias ___ el regalo.",o:["para","por","con"],a:1,e:"Sebep/teşekkür → por."},
    {q:"Lo vendí ___ 100 euros. (karşılığında)",fill:1,a:"por",e:"Değişim/fiyat → por."}
   ]}
 ],

B2:{
 grammar:[
  {t:"Pronombres de objeto: lo, la, le, se", d:"Zamirlerin dansı",
   body:[
    {p:"Doğrudan nesne: <b>lo, la, los, las</b> (onu/onları). Dolaylı nesne: <b>le, les</b> (ona/onlara). Fiilden önce gelirler: <b>Lo veo.</b> <b>Le escribo.</b>", tr:"'Onu görüyorum' = Lo veo. 'Ona yazıyorum' = Le escribo. Sıra: dolaylı + doğrudan + fiil."},
    {p:"İkisi yan yana gelince le/les → <b>se</b> olur: ¿El libro? <b>Se lo</b> di ayer. (Ona onu dün verdim — 'le lo' denmez!)", tr:"'se lo, se la' kalıbı konuşmanın her yerindedir: Se lo dije (ona söyledim)."}
   ],
   tip:"'le lo' dil sürçmesi gibi durur — İspanyolca iki l-zamirini yan yana sevmez, ilkini se yapar. 'Se lo di' ezberle: bu üç heceli kalıp sana yüzlerce cümle kazandırır.",
   ex:[{t:"¿Has visto mi móvil? — No, no lo he visto.",tr:"Telefonumu gördün mü? — Hayır, onu görmedim."},{t:"Le mandé el informe al jefe.",tr:"Raporu şefe gönderdim."},{t:"¿La dirección? Te la envío ahora.",tr:"Adres mi? Onu sana şimdi gönderiyorum."},{t:"Se lo expliqué dos veces.",tr:"Ona iki kez açıkladım."}],
   quiz:[
    {q:"¿Has leído el correo? — Sí, ___ he leído.",o:["le","lo","la"],a:1,e:"el correo eril doğrudan nesne → lo."},
    {q:"'Ona çiçekleri verdim' → ___ ___ di.",o:["Le las","Se las","Las le"],a:1,e:"le + las → se las."},
    {q:"___ escribo a mis padres cada semana. (onlara)",fill:1,a:"les",e:"Dolaylı çoğul → les."}
   ]},
  {t:"El estilo indirecto", d:"Dijo que...",
   body:[
    {p:"Ana fiil geçmişteyse zaman kayar: presente → imperfecto ('Estoy cansado' → Dijo que <b>estaba</b> cansado), futuro → condicional ('Vendré' → ...que <b>vendría</b>), perfecto → pluscuamperfecto.", tr:"'Yorgun olduğunu söyledi' — kayma mekaniği İngilizce/Fransızca ile aynıdır."},
    {p:"Sorular: 'Dónde vives?' → Me preguntó <b>dónde vivía</b>. Evet/hayır → <b>si</b>. Emirler subjuntivo'ya döner: 'Ven' → Me dijo <b>que viniera</b>.", tr:"Emrin aktarımı İspanyolcaya özgü: dijo que + subjuntivo imperfecto."}
   ],
   tip:"Zaman ifadelerini taşımayı unutma: hoy → aquel día, mañana → al día siguiente, aquí → allí. Aktarım bir taşınma kamyonudur — her eşya yeni adrese göre etiketlenir.",
   ex:[{t:"'Llegaré tarde' → Avisó que llegaría tarde.",tr:"'Geç kalacağım' → Geç kalacağını haber verdi."},{t:"Me preguntó si había terminado el proyecto.",tr:"Projeyi bitirip bitirmediğimi sordu."},{t:"El médico me dijo que descansara.",tr:"Doktor bana dinlenmemi söyledi."}],
   quiz:[
    {q:"'Estoy ocupado' → Dijo que ___ ocupado.",o:["está","estaba","estaría"],a:1,e:"presente → imperfecto."},
    {q:"'¿Vendrás?' → Preguntó ___ vendría.",o:["que","si","cuando"],a:1,e:"Evet/hayır → si."},
    {q:"Emir aktarımı: 'Espera' → Me dijo que ___. (esperar)",fill:1,a:"esperara",e:"Emir → subjuntivo imperfecto."}
   ]}
 ],

C1:{
 grammar:[
  {t:"Perífrasis verbales", d:"llevar, seguir, acabar de...",
   body:[
    {p:"Fiil öbekleri anlamı inceltir: <b>llevar + gerundio</b> (süredir): Llevo tres años estudiando. <b>seguir + gerundio</b> (hâlâ): Sigo trabajando allí. <b>acabar de + inf.</b> (az önce): Acabo de llegar.", tr:"'Üç yıldır çalışıyorum' = Llevo tres años trabajando — İspanyolcanın en zarif süre yapısı."},
    {p:"Diğerleri: <b>volver a + inf.</b> (yeniden): Volvió a llamar. <b>dejar de + inf.</b> (bırakmak): Dejé de fumar. <b>estar a punto de</b> (üzere olmak): Está a punto de empezar.", tr:"Bu öbekler konuşmayı 'ders kitabı' seviyesinden 'yerli' seviyesine taşır."}
   ],
   tip:"'Acabo de + mastar' hazinesini keşfet: 'Acabo de verlo' (onu az önce gördüm) — İngilizcedeki 'just' için tek kelimelik çözüm. Geçmişe gerek yok, presente yeter!",
   ex:[{t:"Llevo diez años viviendo en Esmirna.",tr:"On yıldır İzmir'de yaşıyorum."},{t:"¿Sigues aprendiendo alemán?",tr:"Hâlâ Almanca öğreniyor musun?"},{t:"Acabamos de firmar el contrato.",tr:"Sözleşmeyi az önce imzaladık."},{t:"Dejó de trabajar los domingos.",tr:"Pazarları çalışmayı bıraktı."}],
   quiz:[
    {q:"'Beş yıldır burada çalışıyorum' → ___ cinco años trabajando aquí.",o:["Estoy","Llevo","Sigo"],a:1,e:"Süre → llevar + gerundio."},
    {q:"'Az önce yedim' → ___ de comer.",o:["Dejo","Acabo","Vuelvo"],a:1,e:"acabar de = az önce."},
    {q:"'Sigarayı bıraktı' → ___ de fumar.",fill:1,a:"dejó",e:"dejar de + infinitivo."}
   ]},
  {t:"Conectores discursivos avanzados", d:"Denemenin omurgası",
   body:[
    {p:"Karşıtlık: <b>no obstante, ahora bien, en cambio</b>. Sonuç: <b>por consiguiente, de ahí que</b> (+subjuntivo!). Ekleme: <b>asimismo, es más</b>. Taviz: <b>si bien, aun así</b>.", tr:"'de ahí que' özel: ardından subjuntivo ister — De ahí que sea importante (bu yüzden önemlidir)."},
    {p:"Yeniden ifade: <b>es decir, en otras palabras</b>. Örnekleme: <b>a saber, tal como</b>. Kapanış: <b>en definitiva, a fin de cuentas</b>.", tr:"DELE C1 yazı jürisi bu bağlaçları sayar — her paragrafa bir 'omurga kelimesi' yerleştir."}
   ],
   tip:"'Ahora bien' kalıbını sev: 'Şimdi, şu var ki...' anlamında düşünce yönünü kibarca döndürür. Sunumda slayt geçişi gibidir — dinleyici toparlanır, sen derinleşirsin.",
   ex:[{t:"El plan es sólido; no obstante, requiere tiempo.",tr:"Plan sağlam; ne var ki zaman gerektiriyor."},{t:"Los costes bajaron; de ahí que la dirección apruebe el proyecto.",tr:"Maliyetler düştü; bu yüzden yönetim projeyi onaylıyor."},{t:"En definitiva, la calidad decide.",tr:"Sonuç olarak, kaliteye karar veren kalitedir."}],
   quiz:[
    {q:"'de ahí que' bağlacından sonra hangi kip gelir?",o:["indicativo","subjuntivo","imperativo"],a:1,e:"de ahí que + subjuntivo."},
    {q:"Karşıtlık bağlacı hangisi?",o:["asimismo","no obstante","es decir"],a:1,e:"no obstante = ne var ki."},
    {q:"Kapanış: ___ definitiva, el esfuerzo vale la pena.",fill:1,a:"en",e:"en definitiva = sonuç olarak."}
   ]}
 ],

 writings:[

   sample:"Llevo dos años estudiando español, y sigo descubriendo algo nuevo cada semana. Acabo de terminar mi primera novela en español — despacio, pero la terminé. Ahora bien, lo importante nunca fue la velocidad. Dejé de compararme con los demás y volví a disfrutar del proceso. En definitiva, aprender una lengua es aprender a tener paciencia con uno mismo."}

B1:{
 grammar:[
  {t:"L'imperativo", d:"Dai! Senti! Guarda!",
   body:[
    {p:"<b>tu</b> için: -are fiilleri -a alır (Parla!), -ere/-ire presente ile aynı (Prendi! Senti!). Düzensiz kısalar: va' (git), fa' (yap), da' (ver), di' (söyle), sta'.", tr:"Yol tarifi, tarif ve teşvikin kipi. 'Dai!' (hadi!) aslında dare'nin emridir — İtalyanların en sevdiği ünlem!"},
    {p:"Olumsuz tú emri = non + MASTAR: <b>Non parlare!</b> (Konuşma!). Zamirler olumluda yapışır: Dim<b>mi</b>! (söyle bana), Guarda<b>lo</b>!", tr:"Kısa emirler + zamir = ünsüz ikizlenir: di' + mi = dimmi, fa' + lo = fallo."}
   ],
   tip:"'Senti!' (baksana/dinle) ve 'Guarda!' (bak) İtalyan sohbetinin kapı tokmaklarıdır — cümleye başlamadan dikkat çeker. 'Senti, andiamo al mare?' Kullan, anında yerli havası ver.",
   ex:[{t:"Prendi la seconda a destra.",tr:"Sağdan ikinciye gir."},{t:"Dimmi la verità!",tr:"Bana doğruyu söyle!"},{t:"Non dimenticare il passaporto.",tr:"Pasaportu unutma."},{t:"Fallo subito, per favore.",tr:"Onu hemen yap lütfen."}],
   quiz:[
    {q:"'dire' fiilinin tú emri + mi:",o:["dicimi","dimmi","dime"],a:1,e:"di' + mi = dimmi (ikizlenme)."},
    {q:"Olumsuz emir (tu): Non ___ così veloce! (parlare)",o:["parla","parlare","parli"],a:1,e:"Olumsuz tú emri → non + mastar."},
    {q:"'Onu yap!' → ___! (fare + lo)",fill:1,a:"fallo",e:"fa' + lo = fallo."}
   ]},
  {t:"Ci e ne", d:"İtalyancanın iki jokeri",
   body:[
    {p:"<b>ci</b> = 'oraya/orada' ve a'lı yapılar: Vai a Roma? — Sì, <b>ci</b> vado domani. Pensi al progetto? — <b>Ci</b> penso sempre.", tr:"'Oraya gidiyorum' kısaltması. 'Ci penso io!' = Onu ben hallederim — altın kalıp!"},
    {p:"<b>ne</b> = 'ondan/onlardan' ve miktar: Quanti caffè bevi? — <b>Ne</b> bevo tre. Vuoi del pane? — Sì, <b>ne</b> voglio un po'.", tr:"Miktar sorusunun cevabında ne zorunludur: 'Üç tane içerim' = Ne bevo tre."}
   ],
   tip:"Hazır kalıp cephanesi: 'Ci penso io' (ben hallederim), 'Non ce la faccio' (yapamıyorum/yetişemiyorum), 'Ne vale la pena?' (değer mi?), 'Che ne dici?' (ne dersin?). Bu dörtlü seni B1'den yukarı fırlatır.",
   ex:[{t:"Sei mai stato a Venezia? — Sì, ci sono stato due volte.",tr:"Venedik'e hiç gittin mi? — Evet, oraya iki kez gittim."},{t:"Quante lingue parli? — Ne parlo tre.",tr:"Kaç dil konuşuyorsun? — Üç (tane) konuşuyorum."},{t:"Che ne dici di una pizza?",tr:"Bir pizzaya ne dersin?"}],
   quiz:[
    {q:"Vai in ufficio? — Sì, ___ vado ora.",o:["ci","ne","lo"],a:0,e:"Yer → ci."},
    {q:"Quanti fratelli hai? — ___ ho due.",o:["Ci","Ne","Li"],a:1,e:"Miktar → ne."},
    {q:"'Ben hallederim' → Ci penso ___.",fill:1,a:"io",e:"Kalıp: ci penso io."}
   ]}

B2:{
 grammar:[
  {t:"Pronomi combinati: me lo, te la, glielo", d:"Zamirlerin füzyonu",
   body:[
    {p:"Dolaylı + doğrudan birleşir: mi+lo=<b>me lo</b>, ti+la=<b>te la</b>, ci+li=<b>ce li</b>. Üçüncü şahıs özel: gli/le + lo = <b>glielo</b> (tek kelime!): <b>Glielo</b> dico io. (Ona onu ben söylerim.)", tr:"'Onu sana veriyorum' = Te lo do. Türkçenin iki zamirini İtalyanca tek pakete koyar."},
    {p:"Passato'da uyum sürer: Il libro? <b>Me l'ha regalato</b> mia madre. Le foto? <b>Te le ho mandate.</b>", tr:"Sıra hep aynı: kime + neyi + fiil. 'Me lo, te lo, glielo, ce lo, ve lo' şarkı gibi akar."}
   ],
   tip:"'Glielo giuro!' (Ona/size yemin ederim!) ve 'Me lo dici sempre' (bunu bana hep söylüyorsun) gibi kalıpları ezberle. Kombine zamirler kural olarak korkutur, kalıp olarak akar.",
   ex:[{t:"Mi presti la macchina? — Sì, te la presto.",tr:"Arabayı ödünç verir misin? — Evet, onu sana veririm."},{t:"Hai dato il regalo a Sara? — Sì, gliel'ho dato ieri.",tr:"Hediyeyi Sara'ya verdin mi? — Evet, onu ona dün verdim."},{t:"Ce lo spieghi ancora una volta?",tr:"Onu bize bir kez daha açıklar mısın?"}],
   quiz:[
    {q:"Mi dai il tuo numero? — Certo, ___ do subito.",o:["te lo","me lo","glielo"],a:0,e:"Sana + onu → te lo."},
    {q:"Hai mandato la mail al cliente? — Sì, ___ ho mandata.",o:["gliel'","te l'","me l'"],a:0,e:"Ona + onu → gliel'ho (uyum: mandata)."},
    {q:"'Onu bize söyle!' → Dic___! (dire + ce + lo)",fill:1,a:"celo",e:"di' + ce + lo = diccelo (yaygın kısaltmayla dicelo/diccelo)."}
   ]},
  {t:"Il discorso indiretto", d:"Ha detto che...",
   body:[
    {p:"Ana fiil geçmişteyse: presente → imperfetto ('Sono stanco' → Ha detto che <b>era</b> stanco), futuro → condizionale passato ('Verrò' → ...che <b>sarebbe venuto</b>!), passato prossimo → trapassato.", tr:"İtalyancanın sürprizi: gelecek, 'condizionale passato' ile aktarılır — 'geleceğini söyledi' = ha detto che sarebbe venuto."},
    {p:"Sorular: 'Dove abiti?' → Mi ha chiesto <b>dove abitavo</b>. Evet/hayır → <b>se</b>. Emirler → <b>di + infinito</b>: 'Vieni!' → Mi ha detto <b>di venire</b>.", tr:"Emir aktarımı Fransızca gibi kolay: di + mastar."}
   ],
   tip:"'Sarebbe venuto' kalıbını damgala: İtalyanca aktarılmış gelecek için hep bu çift yapıyı kullanır. İngilizce 'would come' mantığıyla düşünme — 'would have come' biçimindedir ama anlamı sadece 'gelecekti'.",
   ex:[{t:"'Ti chiamo domani' → Ha detto che mi avrebbe chiamato il giorno dopo.",tr:"'Yarın ararım' → Ertesi gün arayacağını söyledi."},{t:"Mi ha chiesto se avevo finito il progetto.",tr:"Projeyi bitirip bitirmediğimi sordu."},{t:"Il capo ci ha detto di finire entro venerdì.",tr:"Patron bize cuma gününe kadar bitirmemizi söyledi."}],
   quiz:[
    {q:"'Sono occupato' → Ha detto che ___ occupato.",o:["è","era","sarebbe"],a:1,e:"presente → imperfetto."},
    {q:"'Verrò' aktarımı: Ha detto che ___ venuto.",o:["sarà","sarebbe","era"],a:1,e:"Gelecek → condizionale passato: sarebbe venuto."},
    {q:"Emir aktarımı: 'Aspetta!' → Mi ha detto ___ aspettare.",fill:1,a:"di",e:"Emir → di + infinito."}
   ]}

 {t:"Plurals & Prepositions of Place", d:"-s eki ve in/on/at",

   {p:"Çoğul genelde <b>-s</b> alır: book→books, city→cit<b>ies</b> (ünsüz+y→ies), box→box<b>es</b> (-s,-x,-ch,-sh sonrası -es). Düzensizler: man→men, child→children, person→people.", tr:"Türkçedeki '-lar/-ler' ekinin karşılığı ama İngilizce ünsüz kümesine göre -s/-es seçer."},

  ],
  tip:"Zaman edatlarını hiyerarşiyle ezberle: at (saat, en küçük) < on (gün) < in (ay/yıl/mevsim, en büyük): at 9am, on Monday, in July.",
  ex:[{t:"There are three boxes on the table.",tr:"Masada üç kutu var."},{t:"I live in İzmir.",tr:"İzmir'de yaşıyorum."},{t:"The meeting is at 10 o'clock.",tr:"Toplantı saat 10'da."},{t:"My children are at school.",tr:"Çocuklarım okulda."}],

 {t:"can + Emir Kipi (Imperatives)", d:"Yapabilmek ve buyurmak",
  body:[
   {p:"<b>can</b>: yetenek/izin: I <b>can</b> swim. Can I open the window? Olumsuz: <b>can't</b>: I can't drive.", tr:"Türkçedeki '-ebilmek': yüzebilirim = I can swim."},
   {p:"Emir kipi mastarla kurulur, özne yok: <b>Open</b> the door! <b>Don't touch</b> that! Rica için 'please' eklenir: Please <b>sit down</b>.", tr:"Türkçedeki emir eki '-in/-ın' yerine İngilizce sade mastar kullanır."}

EXTRA2.en.A2=[
 {t:"Adverbs of Frequency & Manner", d:"Ne sıklıkta, nasıl",
  body:[
   {p:"Sıklık zarfları be'den sonra, diğer fiillerden önce: I <b>am always</b> tired. She <b>usually walks</b> to work. Sıra: always > usually > often > sometimes > rarely > never.", tr:"Türkçedeki 'her zaman, genellikle, bazen, nadiren, asla' sıralamasının aynısı."},

  ex:[{t:"He is always on time.",tr:"O her zaman zamanında gelir."},{t:"We rarely eat fast food.",tr:"Nadiren fast food yeriz."},{t:"She speaks English fluently.",tr:"İngilizceyi akıcı konuşur."},{t:"He drives carefully.",tr:"Dikkatli araba kullanır."}],
  quiz:[

 {t:"Modals of Ability & Permission", d:"could, may, be able to",
  body:[
   {p:"Geçmiş yetenek: <b>could</b>: I <b>could</b> swim when I was five. Kibar izin: <b>May I</b> come in? Gelecek yetenek: <b>will be able to</b>.", tr:"'could' can'in geçmişidir: yüzebiliyordum = I could swim."},

  tip:"Resmiyet skalası: can (günlük) < could (kibar/geçmiş) < may (en resmi, izin). 'May I ask a question?' bir toplantıda 'Can I ask?'tan daha şık durur.",
  ex:[{t:"I could read when I was four.",tr:"Dört yaşındayken okuyabiliyordum."},{t:"May I use your phone?",tr:"Telefonunuzu kullanabilir miyim?"},{t:"I haven't been able to call him.",tr:"Onu arayamadım (henüz)."}],

  ]}

   {p:"<b>1. tip (gerçekçi)</b>: If + present, will + mastar: If it <b>rains</b>, I <b>will stay</b> home. Gerçekleşmesi mümkün gelecek durumlar.", tr:"'Yağmur yağarsa evde kalırım' — Türkçedeki şart kipiyle aynı mantık."},
