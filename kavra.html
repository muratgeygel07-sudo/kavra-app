   {p:"<b>wish + past</b>: şimdiki pişmanlık: I <b>wish</b> I <b>had</b> more time. <b>wish + past perfect</b>: geçmiş pişmanlık: I wish I <b>had studied</b> harder.", tr:"'Keşke zamanım olsa / olsaydı' ayrımı — şimdiki mi geçmiş mi olduğuna dikkat et."},
   {p:"<b>have/get something done</b>: bir işi başkasına yaptırmak: I <b>had</b> my car <b>repaired</b>. She's getting her hair cut.", tr:"'Arabamı tamir ettirdim' — kendin yapmadın, birine yaptırdın."}
  ],
  tip:"Causative sırası hiç değişmez: have/get + NESNE + V3. 'I had repaired my car' değil, 'I had my car repaired' — nesne fiilden önce!",
  ex:[{t:"I wish I spoke Italian.",tr:"Keşke İtalyanca konuşabilsem."},{t:"She wishes she hadn't sent that email.",tr:"Keşke o e-postayı göndermeseymiş."},{t:"We're having the office painted.",tr:"Ofisi boyatıyoruz."}],
  quiz:[
   {q:"I wish I ___ more free time. (şimdi)",o:["have","had","would have"],a:1,e:"Şimdiki dilek → wish + past."},
   {q:"She wishes she ___ harder for the exam. (geçmiş pişmanlık)",o:["studied","had studied","studies"],a:1,e:"Geçmiş pişmanlık → wish + past perfect."},
   {q:"'Saçımı kestirdim' → I had my hair ___.",fill:1,a:"cut",e:"have + nesne + V3: cut."}
  ]}
];
EXTRA2.en.C1=[
 {t:"Cleft Sentences", d:"Vurguyu öne taşımak",
  body:[
   {p:"<b>It is/was ... that/who</b>: belirli bir öğeyi vurgular: <b>It was John who</b> called, not Mark. <b>It's the price that</b> worries me.", tr:"Türkçedeki 'asıl... olan' vurgusu: 'Beni endişelendiren asıl fiyat' = It's the price that worries me."},
   {p:"<b>What ... is/was</b>: eylemi veya durumu vurgular: <b>What</b> surprised me <b>was</b> his reaction. <b>What</b> we need <b>is</b> more time.", tr:"Cümlenin en önemli parçasını başa alıp gerisini 'is/was' ile bağlar — konuşmayı dramatikleştirir."}
  ],
  tip:"Sunumlarda güç cümlesi kur: 'What really matters is quality, not speed.' Bu yapı, herhangi bir düz cümleden çok daha ikna edicidir — dinleyicinin dikkatini tam istediğin yere kilitler.",
  ex:[{t:"It was the manager who approved the budget.",tr:"Bütçeyi onaylayan müdürdü."},{t:"What I love about this job is the variety.",tr:"Bu işte sevdiğim şey çeşitlilik."},{t:"It wasn't until 2020 that we launched the product.",tr:"Ürünü ancak 2020'de piyasaya sürdük."}],
  quiz:[
   {q:"___ was Ali who fixed the problem.",o:["It","What","That"],a:0,e:"Kişi vurgusu → It was... who."},
   {q:"What surprised everyone ___ the result.",o:["was","were","is being"],a:0,e:"Tekil özne → was."},
   {q:"'Bize gereken şey daha fazla zaman' → What we need ___ more time.",fill:1,a:"is",e:"What ... is yapısı."}
  ]},
 {t:"Discourse Markers & Ellipsis", d:"Söylemi bağlama ve kısaltma",
  body:[
   {p:"İleri söylem işaretleri: <b>having said that</b> (bununla birlikte), <b>that being said</b>, <b>as it happens</b> (öyle oldu ki), <b>for what it's worth</b> (ne kadar değeri varsa).", tr:"Bunlar akademik değil, doğal-yerli konuşmanın imzasıdır — cümleye yumuşak geçiş sağlarlar."},
   {p:"<b>Ellipsis (eksiltme)</b>: tekrarı önlemek için öğeleri düşürme: 'I'll call if I need to (call).' 'She can swim and he can (swim) too.'", tr:"Türkçe de bunu yapar ('gelebilirsen gel, gelemezsen gelme'de tekrar düşer) ama İngilizce'de kural daha katıdır."}
  ],
  tip:"'Having said that' ile 'that being said' neredeyse eş anlamlıdır ve resmi konuşmada 'but' yerine kullanılırsa metni bir ton yükseltir — ama abartma, cümlede bir kez yeter.",
  ex:[{t:"The plan is risky. Having said that, the potential reward is huge.",tr:"Plan riskli. Bununla birlikte potansiyel kazanç büyük."},{t:"I can help today, but not tomorrow — if you need me to, that is.",tr:"Bugün yardım edebilirim ama yarın değil — gerekirse tabii."},{t:"She wanted to stay, but couldn't (stay).",tr:"Kalmak istedi ama kalamadı."}],
  quiz:[
   {q:"'Bununla birlikte' resmi bağlaç:",o:["by the way","having said that","so"],a:1,e:"having said that = bununla birlikte."},
   {q:"Ellipsis örneği: 'He wants to come and she does ___.' (too)",o:["want to come","too","comes"],a:1,e:"Tekrar düşer, sadece 'too' kalır."},
   {q:"'Ne kadar değeri varsa' kalıbı: for what it's ___",fill:1,a:"worth",e:"for what it's worth."}
  ]}
];

EXTRA2.de.A1=[
 {t:"Fälle: Nominativ und Akkusativ (Einführung)", d:"Kim yapıyor, kimi/neyi?",
  body:[
   {p:"<b>Nominativ</b> = özne (kim/ne yapıyor): <b>Der</b> Mann liest. <b>Akkusativ</b> = doğrudan nesne (kimi/neyi): Ich sehe <b>den</b> Mann. Sadece eril artikel değişir: der→den, ein→einen.", tr:"Türkçedeki '-i' belirtme hali: 'adamı görüyorum' → den Mann sehe ich."},
   {p:"Dişil, nötr ve çoğulda Nominativ=Akkusativ aynıdır: die Frau→die Frau, das Kind→das Kind. Sadece eril farklıdır — bu yüzden Almanlar önce erili öğretir.", tr:"Kolaylık: sadece 'der/ein' ailesine dikkat et, gerisi değişmez!"}
  ],
  tip:"Basit test: cümlede 'kimi/neyi?' sorusuna cevap veren kelime Akkusativ'dedir. 'Ich kaufe einen Kaffee' — neyi? bir kahveyi → einen (eril akkusativ).",
  ex:[{t:"Ich habe einen Bruder.",tr:"Bir erkek kardeşim var."},{t:"Sie liest das Buch.",tr:"O kitabı okuyor (nötr, değişmez)."},{t:"Wir sehen den Lehrer.",tr:"Öğretmeni görüyoruz."}],
  quiz:[
   {q:"Ich sehe ___ Mann. (der Mann)",o:["der","den","dem"],a:1,e:"Akkusativ eril: der→den."},
   {q:"Sie kauft ___ Auto. (das Auto — nötr)",o:["das","den","der"],a:0,e:"Nötr değişmez: das."},
   {q:"'Bir kalem alıyorum' (der Stift) → Ich kaufe ___ Stift.",fill:1,a:"einen",e:"ein→einen (eril Akkusativ)."}
  ]},
 {t:"Zahlen und Uhrzeit", d:"Sayılar ve saat",
  body:[
   {p:"1-20: eins, zwei, drei... zehn, elf, zwölf... zwanzig. 21+ tersine yazılır: einundzwanzig (bir-yirmi = 21).", tr:"Almanca sayılarda birler basamağı ONLAR basamağından önce söylenir — Türkçenin tam tersi!"},
   {p:"Saat sorma: <b>Wie spät ist es?</b> / <b>Wie viel Uhr ist es?</b> Cevap: Es ist zwei Uhr. Es ist halb drei (2:30 — üçe yarım demek, 'iki buçuk' değil!).", tr:"'halb drei' tuzağı: Türkçe 'ikibuçuk' derken Almanca 'üçe yarım kalan' der — üçün yarısına doğru gidiyor mantığı."}
  ],
  tip:"'halb' kuralını bir kez anla, hep doğru kullan: halb + [BİR SONRAKİ saat] = o saate yarım kala. halb neun = 8:30 (dokuza yarım, sekiz buçuk değil).",
  ex:[{t:"Ich habe zweiundzwanzig Jahre.",tr:"Yirmi iki yaşındayım (kelimesi kelimesine: iki-yirmi)."},{t:"Es ist halb neun.",tr:"Saat sekiz buçuk (dokuza yarım)."},{t:"Der Zug kommt um Viertel nach drei.",tr:"Tren üçü çeyrek geçe geliyor."}],
  quiz:[
   {q:"'21' Almanca yazılışı:",o:["zwanzigeins","einundzwanzig","zweizehn"],a:1,e:"Birler önce: einundzwanzig."},
   {q:"'8:30' → Es ist ___ neun.",o:["halb","viertel","um"],a:0,e:"halb neun = 8:30."},
   {q:"'Saat kaç?' → Wie ___ ist es?",fill:1,a:"spät",e:"Wie spät ist es?"}
  ]}
];
EXTRA2.de.A2=[
 {t:"Der Dativ: mir, dir, ihm", d:"Kime, kimin için?",
  body:[
   {p:"Dativ = dolaylı nesne (kime?): Ich gebe <b>dir</b> das Buch. Artikeller: der→dem, die→der, das→dem, die(çoğul)→den+n.", tr:"Türkçedeki '-e/-a' yönelme hali: 'sana veriyorum' = ich gebe dir."},
   {p:"Bazı fiiller Dativ ister: helfen, danken, gefallen, gehören: Ich helfe <b>dir</b>. Das gehört <b>meiner Schwester</b>.", tr:"Bu fiiller Türkçede de '-e' hali ister: 'sana yardım ediyorum' — mantık örtüşür!"}
  ],
  tip:"Zamir tablosunu şarkı gibi ezberle: mir, dir, ihm/ihr/ihm, uns, euch, ihnen. 'Wie geht es dir?' (Nasılsın?) bu tablonun günlük hayattaki ilk kullanımıdır.",
  ex:[{t:"Ich schenke meiner Mutter Blumen.",tr:"Anneme çiçek hediye ediyorum."},{t:"Kannst du mir helfen?",tr:"Bana yardım edebilir misin?"},{t:"Das Auto gehört meinem Vater.",tr:"Araba babama ait."}],
  quiz:[
   {q:"Ich helfe ___ Kollegen. (der Kollege)",o:["den","dem","der"],a:1,e:"helfen + Dativ eril: dem."},
   {q:"Das Buch gehört ___ Lehrerin. (die Lehrerin)",o:["der","die","den"],a:0,e:"Dişil Dativ: der."},
   {q:"'Bana' zamiri: ___",fill:1,a:"mir",e:"ich → mir (Dativ)."}
  ]},
 {t:"Possessivartikel: mein, dein, sein...", d:"Benim, senin, onun",
  body:[
   {p:"İyelik sıfatları isim gibi çekilir: <b>mein</b> Auto (nötr), <b>meine</b> Tasche (dişil), <b>meinen</b> Hund (eril Akkusativ). Kök: mein-, dein-, sein-, ihr-, unser-, euer-, ihr-(Sie).", tr:"Türkçedeki '-im/-in/-i' iyelik eklerinin karşılığı; ama Almanca cinsiyet ve hale göre de değişir."},
   {p:"'sein' (onun-eril) ile 'ihr' (onun-dişil) karıştırılmasın: sein Auto (adamın arabası), ihr Auto (kadının arabası).", tr:"Türkçede ikisi de 'onun' — Almanca cinsiyeti sahibine göre ayırır, dikkat!"}
  ],
  tip:"Kök + normal artikel sonu mantığıyla düşün: mein gibi 'ein' ailesi çeker. mein/meine/meinen ayrımı tıpkı ein/eine/einen gibidir.",
  ex:[{t:"Das ist mein Bruder.",tr:"Bu benim erkek kardeşim."},{t:"Wo ist deine Tasche?",tr:"Çantan nerede?"},{t:"Er liebt seine Familie.",tr:"O ailesini seviyor."},{t:"Sie besucht ihre Eltern.",tr:"O ebeveynlerini ziyaret ediyor."}],
  quiz:[
   {q:"Das ist ___ Auto. (benim, das Auto)",o:["mein","meine","meinen"],a:0,e:"Nötr → mein."},
   {q:"Ich sehe ___ Hund. (onun-eril, der Hund, Akkusativ)",o:["sein","seine","seinen"],a:2,e:"Eril Akkusativ → seinen."},
   {q:"'Onun (kadının) çantası' → ___ Tasche",fill:1,a:"ihre",e:"Dişil sahip → ihre."}
  ]}
];
EXTRA2.de.B1=[
 {t:"Plusquamperfekt", d:"Geçmişin geçmişi",
  body:[
   {p:"İki geçmiş olay arasında önceliği gösterir: <b>hatte/war + Partizip II</b>: Ich <b>hatte</b> schon <b>gegessen</b>, als er ankam. (O gelmeden önce ben zaten yemiştim.)", tr:"Türkçedeki '-mişti': yemiştim = ich hatte gegessen."},
   {p:"Genelde 'nachdem' (sonra) ile birlikte kullanılır: <b>Nachdem</b> ich gegessen <b>hatte</b>, ging ich aus.", tr:"'nachdem'li cümlede fiil yan cümle sonuna gider — Almanca kelime sırası kuralı geçerli."}
  ],
  tip:"Plusquamperfekt her zaman İKİNCİ bir geçmiş referans ister — tek başına kullanılmaz. 'Bir şey olmadan önce/sonra ne olmuştu?' sorusuna cevap arıyorsan bu zaman devrede.",
  ex:[{t:"Ich hatte den Film schon gesehen.",tr:"Filmi zaten görmüştüm."},{t:"Nachdem wir gegessen hatten, gingen wir spazieren.",tr:"Yedikten sonra yürüyüşe çıktık."},{t:"Sie war schon weg, als ich ankam.",tr:"Ben geldiğimde o çoktan gitmişti."}],
  quiz:[
   {q:"Als ich ankam, ___ er schon ___.",o:["hatte / gegessen","habe / gegessen","hat / essen"],a:0,e:"Plusquamperfekt: hatte gegessen."},
   {q:"'sein' fiili ile mi kurulur yoksa 'haben' ile mi? — 'gehen' fiili:",o:["haben","sein"],a:1,e:"Hareket fiili → sein: war gegangen."},
   {q:"Nachdem sie ___ hatte, rief sie an. (fertig sein → fertig gewesen)",fill:1,a:"fertig",e:"nachdem sie fertig gewesen war (basitleştirilmiş: schon fertig hatte)."}
  ]}
];
EXTRA2.de.B2=[
 {t:"Erweiterte Passivformen", d:"Zustandspassiv ve daha fazlası",
  body:[
   {p:"<b>Vorgangspassiv</b> (süreç): werden + Partizip II: Die Tür <b>wird geöffnet</b> (kapı açılıyor — eylem). <b>Zustandspassiv</b> (durum): sein + Partizip II: Die Tür <b>ist geöffnet</b> (kapı açık — sonuç durumu).", tr:"Fark: 'açılıyor' (eylem anı) ile 'açık' (bitmiş durum) — Türkçede de bu ayrım var ama gramerde görünmez, Almanca ayırır."},
   {p:"Modal + Passiv: Das Problem <b>muss gelöst werden</b> (çözülmelidir). Passiv Infinitiv her zaman 'werden' ile biter.", tr:"İş yazışmalarının standart kalıbı: 'muss erledigt werden' (halledilmelidir)."}
  ],
  tip:"Zustandspassiv'i tanı-kullan testi: 'Şu an nasıl bir durumda?' sorusuna cevap veriyorsan sein+Partizip; 'Ne oluyor/oldu?' sorusuna cevap veriyorsan werden+Partizip.",
  ex:[{t:"Das Fenster ist geschlossen.",tr:"Pencere kapalı (durum)."},{t:"Das Fenster wird gerade geschlossen.",tr:"Pencere şu an kapatılıyor (eylem)."},{t:"Die Aufgabe muss bis Freitag erledigt werden.",tr:"Görev cumaya kadar halledilmeli."}],
  quiz:[
   {q:"'Dükkan kapalı' (durum) → Der Laden ___ geschlossen.",o:["wird","ist","hat"],a:1,e:"Durum → sein + Partizip."},
   {q:"'Rapor yarına kadar yazılmalı' → Der Bericht muss bis morgen ___ werden.",o:["schreiben","geschrieben","schrieb"],a:1,e:"Modal+Passiv: geschrieben werden."},
   {q:"Vorgangspassiv yardımcı fiili: ___",fill:1,a:"werden",e:"Süreç pasifi → werden."}
  ]}
];
EXTRA2.de.C1=[
 {t:"Funktionsverbgefüge", d:"zur Verfügung stellen gibi kalıp fiiller",
  body:[
   {p:"İsim+basit fiil kalıpları resmi dilin imzasıdır: <b>zur Verfügung stellen</b> (sağlamak/sunmak, basit: geben), <b>in Kraft treten</b> (yürürlüğe girmek, basit: gelten), <b>Rücksicht nehmen auf</b> (dikkate almak, basit: berücksichtigen).", tr:"Türkçedeki 'karar vermek, göz önünde bulundurmak' gibi kalıp fiillerin karşılığı — tek fiil yerine isim+fiil ikilisi kullanılır."},
   {p:"İş yazışmalarında sık geçenler: <b>eine Entscheidung treffen</b> (karar vermek), <b>Anwendung finden</b> (uygulanmak), <b>zum Ausdruck bringen</b> (ifade etmek).", tr:"Bu kalıpları öğrenmek, C1 metnini 'öğrenci' değil 'profesyonel' gibi okutur."}
  ],
  tip:"Bu kalıpları çift olarak ezberle: basit fiil + resmi Funktionsverbgefüge. 'helfen' → 'Hilfe leisten'; 'entscheiden' → 'eine Entscheidung treffen'. Rapor yazarken resmi olanı seç.",
  ex:[{t:"Wir stellen Ihnen alle Unterlagen zur Verfügung.",tr:"Size tüm belgeleri sunuyoruz."},{t:"Das neue Gesetz tritt im Januar in Kraft.",tr:"Yeni yasa Ocak'ta yürürlüğe giriyor."},{t:"Die Firma trifft diese Entscheidung sorgfältig.",tr:"Şirket bu kararı özenle veriyor."}],

   {q:"'Sağlamak/sunmak' (resmi) → zur Verfügung ___",o:["nehmen","stellen","treffen"],a:1,e:"zur Verfügung stellen."},
   {q:"'Karar vermek' (resmi) → eine Entscheidung ___",fill:1,a:"treffen",e:"eine Entscheidung treffen."}

 {t:"Die Satzklammer", d:"Cümle çerçevesi",
  body:[
   {p:"Almanca cümleler bir 'çerçeve' kurar: değişmez öğe 2. pozisyonda, değişken/tamamlayan öğe SONDA: Ich <b>habe</b> das Buch gestern <b>gelesen</b>. (habe...gelesen çerçevesi.)", tr:"Bu çerçeve modal+mastar, Perfekt (haben/sein+Partizip), ayrılabilir fiiller ve Passiv'de hep aynı mantıkla çalışır."},
   {p:"Yan cümlede TÜM fiil sona toplanır (çerçeve dışına taşar gibi görünür ama kural aynı kalır): Ich weiß, dass er das Buch gestern <b>gelesen hat</b>.", tr:"Almanca dinleyeni sona kadar bekletir — cümlenin anlamı son kelimeyle tamamlanır, bu yüzden dikkatli dinlemek şart."}
  ],
  tip:"Satzklammer'i bir zarf gibi düşün: sol tarafta postala (çekimli fiil/modal), sağ tarafta al (mastar/Partizip/önek). İkisi arasına her şey doldurulur — cümle ne kadar uzarsa uzasın çerçeve bozulmaz.",

   {q:"Yan cümlede (dass...) fiil nereye gider?",o:["Başa","2. pozisyona","Sona"],a:2,e:"Yan cümlede tüm fiil sona toplanır."},
   {q:"'werden' modal olarak kullanılınca mastar nereye gider? ___",fill:1,a:"sona",e:"werden + ... + mastar (sonda)."}

EXTRA2.fr.A1=[
 {t:"Genre et nombre", d:"Dişil/eril ve çoğul uyumu",
  body:[
   {p:"İsimler eril veya dişil olur, çoğu zaman tahmin edilemez: <b>le</b> livre (eril), <b>la</b> table (dişil). Sıfat isme uyar: un livre <b>vert</b>, une table <b>verte</b> (dişil +e).", tr:"Türkçede cinsiyet yok; Fransızcada her isim ezberle birlikte cinsiyetiyle öğrenilmeli: 'la table' değil sadece 'table'."},
   {p:"Çoğul genelde <b>-s</b> alır (okunmaz!): livre→livres. -eau/-eu ile bitenler -x alır: bureau→bureaux.", tr:"Yazıda çoğul görünür ama kulakla duyulmaz — artikel (les) çoğulu haber verir."}
  ],
  tip:"Yeni kelimeyi HER ZAMAN artikeliyle ezberle: 'la maison' de, sadece 'maison' değil. Bu alışkanlık cinsiyet hatalarının %80'ini önler.",
  ex:[{t:"J'ai un grand jardin.",tr:"Büyük bir bahçem var."},{t:"Elle a une petite voiture rouge.",tr:"Onun küçük kırmızı bir arabası var."},{t:"Les livres sont sur la table.",tr:"Kitaplar masada."}],
  quiz:[

   {q:"'un bureau' çoğulu:",o:["bureaus","bureaux","bureaues"],a:1,e:"-eau → -eaux."},

EXTRA2.fr.A2=[
 {t:"L'imparfait", d:"Geçmişte alışkanlık ve tasvir",
  body:[
   {p:"Kök: nous'nun présent hali -ons düşer + ait/ais/aient: je parl<b>ais</b>, nous parl<b>ions</b>. Geçmişteki alışkanlıkları ve tasviri anlatır: Quand j'étais petit, je <b>jouais</b> dehors.", tr:"Türkçedeki '-erdim/-ırdım': oynardım = je jouais. Passé composé'nin aksine, bitmemiş/tekrarlı geçmiş."},
   {p:"'être' tek düzensiz kök: ét-: j'étais, tu étais, il était. Tasvirler hep imparfait ister: Il <b>faisait</b> beau, les oiseaux <b>chantaient</b>.", tr:"Bir hikâyenin 'sahnesini' kurar (imparfait), olayları anlatır (passé composé)."}
  ],
  tip:"İkili test: 'Tekrar eden mi tek seferlik mi?' Tekrar/alışkanlık/tasvir → imparfait. Tek seferlik tamamlanmış olay → passé composé. 'Je mangeais quand le téléphone a sonné' — ikisi bir arada görülür.",
  ex:[{t:"Quand j'étais enfant, j'habitais à Lyon.",tr:"Çocukken Lyon'da otururdum."},{t:"Il faisait froid ce jour-là.",tr:"O gün hava soğuktu."},{t:"Nous jouions au foot tous les samedis.",tr:"Her cumartesi futbol oynardık."}],
  quiz:[
   {q:"Quand j'étais jeune, je ___ beaucoup de sport. (faire)",o:["ai fait","faisais","fais"],a:1,e:"Alışkanlık → imparfait: faisais."},
   {q:"'être' fiilinin imparfait kökü:",o:["êt-","ét-","sui-"],a:1,e:"ét- kökü: j'étais."},
   {q:"nous ___ (parler, imparfait)",fill:1,a:"parlions",e:"nous parlions."}
  ]},
 {t:"L'impératif", d:"Emir kipi",
  body:[
   {p:"tu/nous/vous çekimleri özne olmadan kullanılır: <b>Parle!</b> (Konuş!) <b>Parlons!</b> (Konuşalım!) <b>Parlez!</b> (Konuşun!). -er fiillerinde tu'dan -s düşer: tu parles → Parle!", tr:"Türkçedeki emir eki '-in/-alım' karşılığı — Fransızca özneyi tamamen atar."},
   {p:"Olumsuz emirde ne...pas sandviçi devam eder: <b>Ne parle pas</b> si fort! Zamirli emirde zamir fiile tire ile bağlanır: Lève-toi! Mangez-le!", tr:"Olumluda zamir sona, olumsuzda öne geçer: Fais-le! ama Ne le fais pas!"}
  ],
  tip:"Üç düzensiz emir kökünü ezberle: être→sois/soyons/soyez, avoir→aie/ayons/ayez, savoir→sache/sachons/sachez. Bunlar présent'ten tamamen farklıdır!",
  ex:[{t:"Écoute bien la question.",tr:"Soruyu iyi dinle."},{t:"Ne sois pas en retard.",tr:"Geç kalma."},{t:"Asseyez-vous, s'il vous plaît.",tr:"Oturun lütfen."},{t:"Donne-le-moi.",tr:"Onu bana ver."}],
  quiz:[
   {q:"'Konuş!' (tu, parler):",o:["Parles!","Parle!","Parler!"],a:1,e:"-er fiili tu emrinde -s düşer: Parle!"},
   {q:"'être' fiili tu emri:",o:["es","sois","être"],a:1,e:"Düzensiz: sois."},
   {q:"'Otur!' (asseoir, vous, zamirli): Assey___-vous!",fill:1,a:"ez",e:"Asseyez-vous!"}
  ]}
];
EXTRA2.fr.B1=[
 {t:"Le subjonctif (introduction)", d:"Duygu, istek, şüphe kipi",
  body:[
   {p:"İstek/duygu/gereklilik bildiren fiillerden sonra: <b>il faut que, vouloir que, avoir peur que</b> + subjonctif: Il faut que tu <b>viennes</b>. Je veux qu'il <b>parte</b>.", tr:"Türkçedeki '-mesini istiyorum' yapısı: gelmeni istiyorum = je veux que tu viennes."},
   {p:"Kuruluş: ils'in présent kökü + e/es/e/ions/iez/ent: parl(ent)→que je parle. Düzensizler: être→sois, avoir→aie, aller→aille, faire→fasse.", tr:"'que' olmadan subjonctif kullanılmaz — tetikleyici kelime her zaman önde durur."}
  ],
  tip:"İki fiili karşılaştır: 'Je pense qu'il vient' (indicatif — eminim) vs 'Je doute qu'il vienne' (subjonctif — şüpheliyim). Fiil kesinlik mi belirsizlik mi taşıyor, önce onu sor.",
  ex:[{t:"Il faut que nous partions maintenant.",tr:"Şimdi gitmemiz gerekiyor."},{t:"Je suis content que tu sois là.",tr:"Orada olmandan memnunum."},{t:"Elle a peur qu'il soit en retard.",tr:"Onun geç kalmasından korkuyor."}],
  quiz:[
   {q:"Il faut que tu ___ à l'heure. (venir)",o:["viens","viennes","viendras"],a:1,e:"il faut que + subjonctif: viennes."},
   {q:"'être' subjonctif (que je):",o:["suis","sois","serai"],a:1,e:"Düzensiz: que je sois."},
   {q:"Je veux qu'elle ___ contente. (être)",fill:1,a:"soit",e:"que + subjonctif: soit."}
  ]},
 {t:"Le plus-que-parfait", d:"Geçmişin geçmişi",
  body:[
   {p:"İki geçmiş olay arasında önceliği gösterir: <b>avais/étais + participe passé</b>: Quand je suis arrivé, il <b>était</b> déjà <b>parti</b>.", tr:"Türkçedeki '-mişti': gitmişti = il était parti."},
   {p:"Genelde 'quand, après que' ile birlikte: <b>Après qu'</b>elle <b>avait fini</b>, elle est sortie.", tr:"Bir olayın diğerinden önce bittiğini vurgular — hikâye anlatımının vazgeçilmez aracı."}
  ],
  tip:"Sıralama testi: iki geçmiş olaydan hangisi önce bitti? O, plus-que-parfait alır; sonraki passé composé kalır.",
  ex:[{t:"J'avais déjà mangé quand il est arrivé.",tr:"O geldiğinde ben zaten yemiştim."},{t:"Elle était partie avant que nous arrivions.",tr:"Biz varmadan önce o gitmişti."},{t:"Il avait oublié son passeport.",tr:"Pasaportunu unutmuştu."}],
  quiz:[
   {q:"Quand nous sommes arrivés, le film ___ déjà.",o:["a commencé","avait commencé","commençait"],a:1,e:"Önce biten olay → plus-que-parfait."},
   {q:"'avoir' ile mi 'être' ile mi? — 'partir' fiili:",o:["avoir","être"],a:1,e:"Hareket fiili → être: était parti."},
   {q:"J'___ oublié mes clés. (geçmişin geçmişi)",fill:1,a:"avais",e:"avais + participe passé."}
  ]}
];
EXTRA2.fr.B2=[
 {t:"La voix passive", d:"Edilgen çatı",
  body:[
   {p:"<b>être + participe passé</b>: özneyi arka plana atar: Le rapport <b>a été écrit</b> par Marie. Le contrat <b>sera signé</b> demain.", tr:"Türkçedeki edilgen '-il/-ın': yazıldı = a été écrit."},
   {p:"Participe passé özneyle uyum yapar: La lettre <b>a été envoyée</b> (dişil +e), Les documents <b>ont été envoyés</b> (çoğul +s).", tr:"Fransızca edilgende bu uyum zorunludur — İngilizceden farklı bir incelik."}
  ],
  tip:"Fransızca konuşma dili edilgeni pek sevmez; mümkünse 'on' ile aktif çatıya çevirir: 'On a écrit le rapport' = 'Le rapport a été écrit'. Yazıda edilgen, konuşmada 'on' — ikisini de bil.",
  ex:[{t:"Cette maison a été construite en 1950.",tr:"Bu ev 1950'de inşa edildi."},{t:"Les billets seront envoyés par email.",tr:"Biletler e-posta ile gönderilecek."},{t:"Le problème a été résolu rapidement.",tr:"Sorun hızla çözüldü."}],
  quiz:[
   {q:"La lettre ___ hier. (dişil, gönderildi)",o:["a été envoyé","a été envoyée","a envoyé"],a:1,e:"Dişil uyum: envoyée."},
   {q:"'On parle français ici' cümlesinin edilgen hali:",o:["Le français est parlé ici.","Le français a parlé ici.","On a parlé français."],a:0,e:"est parlé = edilgen geniş zaman."},
   {q:"Les documents ___ envoyés demain. (gönderilecek)",fill:1,a:"seront",e:"Gelecek edilgen: seront + participe."}
  ]}
];
EXTRA2.fr.C1=[
 {t:"La concordance des temps", d:"Zamanların uyumu",
  body:[
   {p:"Ana cümle geçmişteyse, bağlı cümlenin zamanı kayar: 'Il dit qu'il <b>vient</b>' (şimdi) → 'Il a dit qu'il <b>venait</b>' (geçmişte). Gelecek → conditionnel: 'viendra'→'viendrait'.", tr:"Discours indirect'in temelini oluşturan mekanik — İngilizce/İspanyolca/Almancadaki backshift ile aynı mantık."},
   {p:"Subjonctif'te de kayma olur (edebî düzeyde imparfait du subjonctif kullanılır) ama günlük dilde subjonctif présent genelde korunur: Il fallait qu'il <b>vienne</b> (günlük) / <b>vînt</b> (edebî, çok nadir).", tr:"İkinci biçim (vînt) sadece klasik edebiyatta görülür — tanıman yeter, kullanmana gerek yok."}
  ],
  tip:"Pratik kural: ana fiil geçmişse (a dit, pensait), bağlı cümledeki fiili bir kademe geriye çek: présent→imparfait, futur→conditionnel, passé composé→plus-que-parfait.",
  ex:[{t:"Il a dit qu'il était fatigué.",tr:"Yorgun olduğunu söyledi."},{t:"Elle pensait qu'il viendrait.",tr:"Onun geleceğini düşünüyordu."},{t:"Nous savions qu'elle avait déjà fini.",tr:"Onun zaten bitirdiğini biliyorduk."}],
  quiz:[
   {q:"'Je suis prêt' → Il a dit qu'il ___ prêt.",o:["est","était","serait"],a:1,e:"présent→imparfait."},
   {q:"'Je viendrai' → Elle a dit qu'elle ___.",o:["viendra","viendrait","venait"],a:1,e:"futur→conditionnel."},
   {q:"'J'ai fini' → Il a dit qu'il ___ fini.",fill:1,a:"avait",e:"passé composé→plus-que-parfait: avait fini."}
  ]},
 {t:"L'inversion à l'écrit", d:"Yazı dilinin zarafeti",
  body:[
   {p:"Resmi/edebî yazıda soru ve bazı bağlaçlardan sonra özne-fiil devrilir: <b>Peut-être</b> viendra-t-il. <b>Aussi</b> décida-t-elle de partir. (Belki gelir. Bu yüzden gitmeye karar verdi.)", tr:"Türkçede karşılığı yok ama etkisi benzer: cümleye resmi/edebî bir hava katar."},
   {p:"Bağımlı önerme sonrası da görülür: 'Comme le disait mon père...' Gazete başlıklarında ve raporlarda sıktır: 'Ainsi s'achève cette réunion.'", tr:"Bu yapı konuşmada neredeyse hiç kullanılmaz — sadece yazılı/resmi kayıt."}
  ],
  tip:"Dört tetikleyici kelimeyi ezberle: peut-être, aussi (bu nedenle anlamında), sans doute, à peine. Bunlardan biri cümle başındaysa, devrik yapı bekle.",
  ex:[{t:"Peut-être a-t-il raison.",tr:"Belki haklıdır."},{t:"Sans doute est-ce la meilleure solution.",tr:"Şüphesiz en iyi çözüm budur."},{t:"À peine était-elle arrivée qu'elle est repartie.",tr:"Daha yeni varmıştı ki tekrar gitti."}],
  quiz:[
   {q:"'Belki' ile başlayan resmi cümlede yapı:",o:["Özne-fiil normal","Fiil-özne devrik","Sadece fiil"],a:1,e:"peut-être + devrik: peut-être a-t-il..."},
   {q:"Devrik yapıyı tetikleyen kelime hangisi DEĞİL?",o:["aussi","peut-être","parce que"],a:2,e:"parce que devrik gerektirmez."},
   {q:"À peine ___-elle arrivée...",fill:1,a:"était",e:"À peine + devrik: était-elle."}
  ]}
];

EXTRA2.es.A1=[
 {t:"Género y número de sustantivos", d:"Dişil/eril ve çoğul",
  body:[
   {p:"-o eril, -a dişil eğilimi: el libr<b>o</b>, la cas<b>a</b>. Sıfat uyum yapar: el chico alt<b>o</b>, la chica alt<b>a</b>. -e/-ista gibi ekler her iki cinsiyette de kullanılabilir: el/la estudiante.", tr:"Türkçede cinsiyet yok; kelimeyi artikeliyle birlikte ezberle: 'la mesa' de, sadece 'mesa' değil."},
   {p:"Çoğul: sesli harfle bitene -s (casa→casas), ünsüzle bitene -es (papel→papeles), -z ile bitende z→c: lápiz→lápices.", tr:"Türkçedeki '-lar/-ler' ekinin karşılığı ama son harfe göre -s/-es seçilir."}
  ],
  tip:"İstisna listesi kısa ama önemli: la mano (el), el día, el mapa, el problema, la foto, la moto. Bunları erken ezberle, sonra kural akışkan çalışır.",
  ex:[{t:"Tengo dos hermanos y una hermana.",tr:"İki erkek kardeşim ve bir kız kardeşim var."},{t:"Las casas blancas son bonitas.",tr:"Beyaz evler güzel."},{t:"El problema es serio.",tr:"Sorun ciddi (el problema — istisna!)."}],
  quiz:[
   {q:"'el lápiz' çoğulu:",o:["lápizs","lápices","lápizes"],a:1,e:"-z → -ces: lápices."},
   {q:"la mesa ___ (sıfat: grande)",o:["grande","granda","grandes"],a:0,e:"'grande' her iki cinsiyette de aynı kalır."},
   {q:"'el mapa' eril, çünkü kelimenin kökeni:",o:["Latince","Yunanca (istisna)","Arapça"],a:1,e:"-a ile bitse de Yunanca kökenli istisna: el mapa."}
  ]}
];
EXTRA2.es.A2=[
 {t:"El pretérito imperfecto", d:"Geçmişte alışkanlık ve tasvir",
  body:[
   {p:"-ar: -aba/-abas/-aba/-ábamos/-abais/-aban; -er/-ir: -ía/-ías/-ía... Geçmişteki alışkanlık/tasvir: Cuando era niño, <b>jugaba</b> en el parque.", tr:"Türkçedeki '-erdim/-ırdım': oynardım = jugaba. Tekrarlı, bitmemiş geçmiş."},
   {p:"Sadece 3 düzensiz var: ser→era, ir→iba, ver→veía. Gerisi tamamen kurallı — İspanyolcanın en 'kolay' geçmiş zamanı.", tr:"Tasvir hep imperfecto ister: Hacía frío, el cielo estaba gris (hava soğuktu, gökyüzü griydi)."}
  ],
  tip:"İkili test: 'Tekrar eden mi tek seferlik mi?' Alışkanlık/tasvir/arka plan → imperfecto. Tek seferlik olay → indefinido/perfecto. 'Comía cuando sonó el teléfono' — ikisi bir arada görülür.",
  ex:[{t:"Cuando era pequeño, vivía en Ankara.",tr:"Küçükken Ankara'da yaşardım."},{t:"Hacía mucho calor ese día.",tr:"O gün hava çok sıcaktı."},{t:"Jugábamos al fútbol todos los sábados.",tr:"Her cumartesi futbol oynardık."}],
  quiz:[
   {q:"De niño, (yo) ___ mucho deporte. (hacer)",o:["hice","hacía","hago"],a:1,e:"Alışkanlık → imperfecto: hacía."},
   {q:"'ser' fiilinin imperfecto'su (yo):",o:["soy","era","fui"],a:1,e:"Düzensiz: era."},
   {q:"nosotros ___ (jugar, imperfecto)",fill:1,a:"jugábamos",e:"nosotros jugábamos."}
  ]},
 {t:"El futuro simple", d:"-é, -ás, -á",
  body:[
   {p:"Mastara doğrudan ek: hablar<b>é</b>, comer<b>ás</b>, vivir<b>á</b>. Kesin planlar ve tahminler: Mañana <b>llegaré</b> temprano. <b>Será</b> difícil, pero lo lograremos.", tr:"Türkçedeki '-ecek/-acak': geleceğim = vendré. Ir a + infinitivo (gidiyorum yapmaya) daha günlük, futuro simple daha resmi/kesin."},
   {p:"Düzensiz kökler: tener→tendr-, poner→pondr-, salir→saldr-, hacer→har-, decir→dir-, poder→podr-.", tr:"Bu düzensizler koşul kipinde (condicional) de aynı kökü kullanır — ikisini birlikte öğren."}
  ],
  tip:"Futuro aynı zamanda 'şimdiki tahmin' bildirir: '¿Dónde está Juan? — Estará en casa' (Herhalde evdedir). Bu kullanım Türkçedeki '-dir' ekiyle örtüşür.",
  ex:[{t:"El año que viene viajaré a España.",tr:"Gelecek yıl İspanya'ya seyahat edeceğim."},{t:"Tendremos una reunión mañana.",tr:"Yarın bir toplantımız olacak."},{t:"¿Qué hora será? — Serán las tres.",tr:"Saat kaç olabilir? — Herhalde saat üç."}],
  quiz:[
   {q:"Mañana (yo) ___ el informe. (terminar)",o:["terminaré","terminaba","termino"],a:0,e:"Gelecek → -aré: terminaré."},
   {q:"'tener' fiilinin futuro kökü:",o:["tener-","tendr-","tenir-"],a:1,e:"Düzensiz kök: tendr-."},
   {q:"¿Dónde ___ mis llaves? (tahmin, estar)",fill:1,a:"estarán",e:"Şimdiki tahmin → futuro: estarán."}
  ]}
];
EXTRA2.es.B1=[
 {t:"El subjuntivo presente (introducción)", d:"İstek, duygu, şüphe kipi",
  body:[
   {p:"İstek/duygu/öneri fiillerinden sonra: <b>querer que, esperar que, es importante que</b> + subjuntivo: Quiero que <b>vengas</b>. Espero que <b>tengas</b> razón.", tr:"Türkçedeki '-mesini istiyorum' yapısı: gelmeni istiyorum = quiero que vengas."},
   {p:"Kuruluş: yo'nun presente kökü + zıt ünlü: hablar→hable, comer→coma, vivir→viva. Düzensizler presente indicativo'daki gibi köke sadık kalır: tener→tenga, hacer→haga.", tr:"'que' olmadan subjuntivo görünmez — tetikleyici ifade her zaman önde."}
  ],
  tip:"İki fiili karşılaştır: 'Creo que viene' (indicativo — eminim) vs 'Dudo que venga' (subjuntivo — şüpheliyim). Fiil kesinlik mi belirsizlik mi taşıyor, önce onu sor.",
  ex:[{t:"Es necesario que estudies más.",tr:"Daha çok çalışman gerekiyor."},{t:"Ojalá que llueva mañana.",tr:"Umarım yarın yağmur yağar."},{t:"No creo que sea fácil.",tr:"Kolay olacağını sanmıyorum."}],
  quiz:[
   {q:"Espero que (tú) ___ pronto. (venir)",o:["vienes","vengas","vendrás"],a:1,e:"esperar que + subjuntivo: vengas."},
   {q:"'ser' subjuntivo (que yo):",o:["soy","sea","seré"],a:1,e:"Düzensiz: que yo sea."},
   {q:"Quiero que ella ___ feliz. (estar)",fill:1,a:"esté",e:"que + subjuntivo: esté."}
  ]}
];
EXTRA2.es.B2=[
 {t:"Oraciones condicionales (si + subjuntivo)", d:"Hayali ve imkânsız şartlar",
  body:[
   {p:"<b>Si + imperfecto de subjuntivo, condicional</b>: hayali/uzak durumlar: Si <b>tuviera</b> más tiempo, <b>viajaría</b> más. (Zamanım olsa daha çok seyahat ederdim.)", tr:"'si' tarafında ASLA condicional kullanılmaz — bu en yaygın hatadır: 'si tendría' ✗"},
   {p:"İmkânsız geçmiş: <b>Si + pluscuamperfecto de subjuntivo, condicional perfecto</b>: Si <b>hubiera estudiado</b> medicina, <b>habría sido</b> médico.", tr:"'Tıp okusaydım doktor olurdum' — geçmişte gerçekleşmemiş bir varsayım."}
  ],
  tip:"İmperfecto de subjuntivo'nun iki biçimi vardır (-ra/-se), ikisi de doğrudur: hablara=hablase. Konuşmada -ra biçimi çok daha yaygındır, onu öncelikle öğren.",
  ex:[{t:"Si fuera rico, compraría una casa en la playa.",tr:"Zengin olsam sahilde bir ev alırdım."},{t:"Si hubiera sabido, te habría llamado.",tr:"Bilseydim seni ararlardım (arardım)."},{t:"Si pudiera, cambiaría de trabajo.",tr:"Yapabilsem işimi değiştirirdim."}],
  quiz:[
   {q:"Si yo ___ más dinero, viajaría por el mundo. (tener)",o:["tengo","tuviera","tendría"],a:1,e:"si + imperfecto de subjuntivo: tuviera."},
   {q:"Si hubiera llovido, nosotros ___ en casa. (quedarse)",o:["nos quedamos","nos quedaríamos","nos habríamos quedado"],a:2,e:"İmkânsız geçmiş sonuç → habría + participio."},
   {q:"Si ___ (yo, saber) la verdad, no habría dicho nada.",fill:1,a:"hubiera sabido",e:"si + pluscuamperfecto de subjuntivo."}
  ]}
];
EXTRA2.es.C1=[
 {t:"Énfasis e inversión sintáctica", d:"Vurgu için sıra değişimi",
  body:[
   {p:"Vurgu için sıralama devrilebilir: <b>Lo que</b> más me gusta <b>es</b> la libertad. <b>Fue</b> Juan <b>quien</b> lo resolvió, no yo.", tr:"Türkçedeki 'asıl... olan' vurgusu: 'En sevdiğim şey özgürlük' = Lo que más me gusta es la libertad."},

EXTRA2.it.A1=[
 {t:"Il plurale dei nomi", d:"-o/-a/-e çoğul kuralları",
  body:[
   {p:"-o → -i (eril): libr<b>o</b>→libr<b>i</b>. -a → -e (dişil): cas<b>a</b>→cas<b>e</b>. -e → -i (her iki cinsiyet): stazion<b>e</b>→stazion<b>i</b>.", tr:"Türkçedeki '-lar/-ler' ekinin karşılığı ama son harfe göre farklı ünlüye döner."},

  ],
  tip:"Üç ünlü hafızası: -o→-i, -a→-e, -e→-i. Bu üçlüyü bir şarkı gibi tekrarla — İtalyanca çoğulun tamamı bu üç dönüşüme dayanır.",

EXTRA2.it.A2=[
 {t:"L'imperfetto", d:"Geçmişte alışkanlık ve tasvir",
  body:[
   {p:"Kök + avo/avi/ava... (-are), evo/evi/eva... (-ere/-ire): parl<b>avo</b>, prend<b>evo</b>, dorm<b>ivo</b>. Geçmişteki alışkanlık/tasvir: Da bambino, <b>giocavo</b> nel parco.", tr:"Türkçedeki '-erdim/-ırdım': oynardım = giocavo. Tekrarlı, bitmemiş geçmiş."},
   {p:"Sadece birkaç düzensiz: essere→ero, fare→facevo, bere→bevevo, dire→dicevo. Tasvirler hep imperfetto ister: Faceva freddo, il cielo era grigio.", tr:"İtalyancanın en 'kolay' geçmiş zamanı — kurallı çekim baskındır."}
  ],
  tip:"İkili test: 'Tekrar eden mi tek seferlik mi?' Alışkanlık/tasvir/arka plan → imperfetto. Tek seferlik olay → passato prossimo. 'Mangiavo quando ha squillato il telefono' — ikisi bir arada görülür.",
  ex:[{t:"Da piccolo, abitavo a Smirne.",tr:"Küçükken İzmir'de otururdum."},{t:"Faceva molto caldo quel giorno.",tr:"O gün hava çok sıcaktı."},{t:"Giocavamo a calcio ogni sabato.",tr:"Her cumartesi futbol oynardık."}],
  quiz:[
   {q:"Da bambino, (io) ___ molto sport. (fare)",o:["ho fatto","facevo","faccio"],a:1,e:"Alışkanlık → imperfetto: facevo."},
   {q:"'essere' fiilinin imperfetto'su (io):",o:["sono","ero","sarò"],a:1,e:"Düzensiz: ero."},
   {q:"noi ___ (giocare, imperfetto)",fill:1,a:"giocavamo",e:"noi giocavamo."}
  ]}
];
EXTRA2.it.B1=[
 {t:"Il congiuntivo presente (introduzione)", d:"İstek, duygu, şüphe kipi",
  body:[
   {p:"İstek/duygu/olasılık fiillerinden sonra: <b>volere che, sperare che, è importante che</b> + congiuntivo: Voglio che tu <b>venga</b>. Spero che <b>abbia</b> ragione.", tr:"Türkçedeki '-mesini istiyorum' yapısı: gelmeni istiyorum = voglio che tu venga."},
   {p:"Kuruluş: -are→i/i/i/iamo/iate/ino; -ere/-ire→a/a/a/iamo/iate/ano: parli, prenda, dorma. Düzensizler: essere→sia, avere→abbia, fare→faccia, andare→vada.", tr:"'che' olmadan congiuntivo görünmez — tetikleyici ifade her zaman önde."}
  ],
  tip:"İki fiili karşılaştır: 'Penso che venga' (belirsizlik → congiuntivo, İtalyanca'da 'penso che' bile congiuntivo ister!) vs 'So che viene' (kesinlik → indicativo). İtalyanca subjunctive'i İspanyolca/Fransızcadan daha sık kullanır.",
  ex:[{t:"È necessario che tu studi di più.",tr:"Daha çok çalışman gerekiyor."},{t:"Spero che piova domani.",tr:"Umarım yarın yağmur yağar."},{t:"Non credo che sia facile.",tr:"Kolay olacağını sanmıyorum."}],
  quiz:[
   {q:"Spero che (tu) ___ presto. (venire)",o:["vieni","venga","verrai"],a:1,e:"sperare che + congiuntivo: venga."},
   {q:"'essere' congiuntivo (che io):",o:["sono","sia","sarò"],a:1,e:"Düzensiz: che io sia."},
   {q:"Voglio che lei ___ felice. (essere)",fill:1,a:"sia",e:"che + congiuntivo: sia."}
  ]}
];
EXTRA2.it.B2=[
 {t:"Il periodo ipotetico", d:"Hayali ve imkânsız şartlar",
  body:[
   {p:"<b>Se + congiuntivo imperfetto, condizionale</b>: hayali/uzak durumlar: Se <b>avessi</b> più tempo, <b>viaggerei</b> di più. (Zamanım olsa daha çok seyahat ederdim.)", tr:"'se' tarafında ASLA condizionale kullanılmaz — bu en yaygın hatadır: 'se avrei' ✗"},

  tip:"Üç tip periodo ipotetico var: gerçek (se + indicativo, indicativo/imperativo), hayali (se + congiuntivo imperfetto, condizionale), imkânsız (se + congiuntivo trapassato, condizionale passato). Hangi zaman çizgisinde olduğunu önce belirle.",
  ex:[{t:"Se fossi ricco, comprerei una casa al mare.",tr:"Zengin olsam sahilde bir ev alırdım."},{t:"Se avessi saputo, ti avrei chiamato.",tr:"Bilseydim seni ararlardım."},{t:"Se potessi, cambierei lavoro.",tr:"Yapabilsem işimi değiştirirdim."}],

  body:[

const FRGRAM2 = {A1:[],A2:[],B1:[],B2:[],C1:[]};

FRGRAM2.A1=[
 {t:"Adjectifs possessifs: mon, ton, son", d:"Benim, senin, onun",
  body:[
   {p:"İyelik sıfatları isme göre değil, İSMİN CİNSİYETİNE göre çekilir (sahibin cinsiyetine değil!): <b>mon</b> livre (eril), <b>ma</b> voiture (dişil), <b>mes</b> livres (çoğul).", tr:"Türkçedeki '-im/-in' iyelik eklerinin karşılığı; ama Fransızca sahibi değil, SAHİP OLUNAN şeyin cinsiyetini dikkate alır."},
   {p:"Sesli harfle başlayan dişil isimlerde 'ma' yerine 'mon' kullanılır (ses kolaylığı için): <b>mon</b> amie (kız arkadaşım — amie dişil ama 'a' ile başlıyor).", tr:"Bu istisna, iki sesli harfin yan yana gelmesini önler — Fransızcanın akıcılık kaygısı."}
  ],
  tip:"Kural basit ama alışılmadık: iyelik sıfatını seçerken KİME ait olduğuna değil, NEYİN adı olduğuna (eril/dişil/çoğul) bak. 'Onun arabası' erkek de kadın da olsa dişil isim (voiture) yüzünden hep 'sa voiture'.",
  ex:[{t:"C'est mon frère.",tr:"Bu benim erkek kardeşim."},{t:"Où est ta valise?",tr:"Bavulun nerede?"},{t:"Il aime sa famille.",tr:"O ailesini seviyor."},{t:"Voici mes clés.",tr:"İşte anahtarlarım."}],
  quiz:[
   {q:"___ voiture est rouge. (benim, la voiture)",o:["mon","ma","mes"],a:1,e:"Dişil → ma."},
   {q:"Il aime ___ amie. (onun, sesli harfle başlayan dişil)",o:["sa","son","ses"],a:1,e:"Sesli harf öncesi → son (istisna)."},
   {q:"'Onların kitapları' → ___ livres",fill:1,a:"leurs",e:"Çoğul sahip → leurs."}
  ]},
 {t:"il y a", d:"Var demenin Fransızcası",
  body:[
   {p:"<b>il y a</b> (değişmez!): varlık bildirir, tekil de çoğul da olsa aynı kalır: <b>Il y a</b> un parc ici. <b>Il y a</b> trois personnes.", tr:"Türkçedeki 'var': İngilizce there is/are gibi ikiye ayrılmaz, Fransızca tek kalıpla her duruma uyar."},
   {p:"Olumsuz: <b>il n'y a pas de...</b>: Il n'y a pas de lait. Soru: <b>Y a-t-il...?</b> veya günlük dilde <b>Il y a...?</b> tonlamayla.", tr:"'Süt yok' = il n'y a pas de lait — 'de' burada artikel yerine geçer."}
  ],
  tip:"'il y a' aynı zamanda zaman ifadesi olarak da kullanılır: 'il y a trois ans' (üç yıl önce) — bu ikinci anlamı da not et, çok sık karşına çıkacak.",
  ex:[{t:"Il y a une pharmacie près d'ici.",tr:"Buranın yakınında bir eczane var."},{t:"Il y a beaucoup de monde aujourd'hui.",tr:"Bugün çok insan var."},{t:"Il n'y a pas de problème.",tr:"Sorun yok."}],
  quiz:[
   {q:"___ un café au coin de la rue.",o:["Il y a","Il est","C'est"],a:0,e:"Varlık → il y a."},
   {q:"Olumsuz: Il n'y a pas ___ pain. (ekmek yok)",o:["du","de","des"],a:1,e:"Olumsuzda → de."},
   {q:"'Üç yıl önce' → il y a trois ___",fill:1,a:"ans",e:"il y a + süre = önce."}
  ]},
 {t:"Prépositions de lieu: à, en, dans, sur", d:"Yer edatları",
  body:[
   {p:"<b>à</b> (şehir): à Paris. <b>en</b> (dişil ülke): en France. <b>au</b> (eril ülke): au Japon. <b>dans</b> (içinde): dans la boîte. <b>sur</b> (üzerinde): sur la table.", tr:"Türkçedeki '-de/-da' üçe bölünür: şehir→à, ülke (cinsiyete göre en/au), içinde→dans, üstünde→sur."},
   {p:"Ülke isimleri -e ile bitiyorsa genelde dişildir (en): la France→en France. Diğerleri eril (au): le Japon→au Japon. Çoğul ülkeler: aux (les États-Unis→aux États-Unis).", tr:"Bu üçlü ayrım (en/au/aux) Fransızca ülke isimlerinin cinsiyetine bağlıdır — ezber gerekir."}
  ],
  tip:"Şehir/ülke edatı kararı için basit kural: şehir→à (à Rome), dişil ülke→en (en Italie), eril ülke→au (au Portugal), çoğul ülke→aux (aux Pays-Bas).",
  ex:[{t:"Elle habite à Lyon.",tr:"O Lyon'da yaşıyor."},{t:"Nous allons en Espagne.",tr:"İspanya'ya gidiyoruz."},{t:"Il travaille au Canada.",tr:"O Kanada'da çalışıyor."},{t:"Le chat est sur le lit.",tr:"Kedi yatağın üzerinde."}],
  quiz:[
   {q:"Je vais ___ Italie. (dişil ülke)",o:["à","en","au"],a:1,e:"Dişil ülke → en."},
   {q:"Il vit ___ Brésil. (eril ülke)",o:["en","au","à"],a:1,e:"Eril ülke → au."},
   {q:"Les clés sont ___ la table. (üzerinde)",fill:1,a:"sur",e:"Üzerinde → sur."}
  ]}
];

FRGRAM2.A2=[
 {t:"Futur proche: aller + infinitif", d:"Yakın gelecek: gidiyorum yapmaya",
  body:[
   {p:"<b>aller (çekimli) + infinitif</b>: yakın gelecekteki plan/niyet: Je <b>vais partir</b> demain. Elle <b>va appeler</b> son frère.", tr:"Türkçedeki '-eceğim' (yakın plan): gideceğim = je vais partir. İngilizce 'going to' ile birebir aynı mantık."},
   {p:"Futur simple (B1'de göreceksin) daha resmi/uzak geleceği anlatır; futur proche günlük konuşmanın standart geleceğidir.", tr:"Konuşurken hep futur proche kullan — futur simple yazıda ve resmi bağlamda daha yaygındır."}
  ],
  tip:"'aller' burada 'gitmek' anlamında DEĞİL, sadece gelecek zaman yardımcısı olarak çalışır: 'Je vais manger' = yemek yiyeceğim (yemeğe gitmiyorum!).",

 {t:"Adverbes de fréquence", d:"Sıklık zarfları",
  body:[
   {p:"<b>toujours</b> (her zaman), <b>souvent</b> (sık sık), <b>parfois/quelquefois</b> (bazen), <b>rarement</b> (nadiren), <b>jamais</b> (asla). Genelde fiilden SONRA gelir: Je <b>mange toujours</b> à midi.", tr:"Türkçedeki 'her zaman, genellikle, bazen, nadiren, asla' sıralamasının aynısı, ama İngilizce'nin aksine fiilden önce değil SONRA gelir."},
   {p:"<b>jamais</b> olumsuzluk kalıbında (ne...jamais) kullanılır: Je <b>ne</b> fume <b>jamais</b>. (Asla sigara içmem.)", tr:"'jamais' tek başına olumsuz anlam taşımaz, 'ne' ile birlikte çalışır."}
  ],
  tip:"'ne...jamais' 'ne...pas'ın kardeşidir — aynı sandviç yapısını kullanır ama 'pas' yerine 'jamais' koyarsın. 'asla' anlamı bu ikili sayesinde oluşur.",
  ex:[{t:"Il arrive toujours à l'heure.",tr:"O her zaman zamanında gelir."},{t:"Nous sortons souvent le week-end.",tr:"Hafta sonları sık sık dışarı çıkarız."},{t:"Elle ne boit jamais de café.",tr:"O asla kahve içmez."}],
  quiz:[
   {q:"Je ___ mange du poisson. (nadiren)",o:["rarement","jamais","toujours"],a:0,e:"rarement = nadiren."},
   {q:"'Asla' kalıbı: Je ne fume ___.",o:["jamais","souvent","parfois"],a:0,e:"ne...jamais = asla."},
   {q:"'Her zaman' → ___",fill:1,a:"toujours",e:"toujours = her zaman."}
  ]},
 {t:"Comparatifs et superlatifs", d:"Karşılaştırma ve enüstünlük",
  body:[
   {p:"Karşılaştırma: <b>plus...que</b> (daha...den), <b>moins...que</b> (daha az...den), <b>aussi...que</b> (kadar): Elle est <b>plus grande que</b> moi.", tr:"Türkçedeki '-den daha' yapısının karşılığı — İngilizce gibi -er eki yerine hep 'plus/moins' kullanılır."},
   {p:"Enüstünlük: <b>le/la plus...</b> / <b>le/la moins...</b>: C'est <b>le plus beau</b> jardin de la ville. Düzensiz: bon→meilleur→le meilleur.", tr:"'en iyi' = le meilleur — bu düzensiz form çok sık kullanılır, ayrıca ezberle."}
  ],
  tip:"'bon/meilleur/le meilleur' üçlüsünü ezberle — İngilizce good/better/best ile birebir aynı mantıkla düzensizdir ve günlük konuşmada sürekli karşına çıkar.",
  ex:[{t:"Ce restaurant est plus cher que l'autre.",tr:"Bu restoran diğerinden daha pahalı."},{t:"C'est le plus grand bâtiment de la ville.",tr:"Bu şehrin en büyük binası."},{t:"Son gâteau est meilleur que le mien.",tr:"Onun pastası benimkinden daha iyi."}],
  quiz:[
   {q:"Elle est ___ jeune ___ sa sœur. (daha az)",o:["moins / que","plus / que","aussi / que"],a:0,e:"Daha az → moins...que."},
   {q:"'bon' sıfatının karşılaştırma hali:",o:["plus bon","meilleur","le meilleur"],a:1,e:"Düzensiz: meilleur."},
   {q:"C'est ___ restaurant de la ville. (en iyi)",fill:1,a:"le meilleur",e:"Enüstünlük düzensiz: le meilleur."}
  ]}

FRGRAM2.B1=[
 {t:"Pronoms COI: lui, leur", d:"Dolaylı nesne zamirleri",
  body:[
   {p:"'à' ile kullanılan fiillerden sonraki kişi nesneleri: <b>lui</b> (ona, tekil), <b>leur</b> (onlara, çoğul): Je <b>lui</b> parle. (Ona konuşuyorum.) Je <b>leur</b> donne un cadeau.", tr:"Türkçedeki '-e/-a' yönelme hali: 'ona söyledim' = je lui ai dit."},

  quiz:[

 {t:"Adjectifs indéfinis: chaque, plusieurs, quelques", d:"Belirsiz sıfatlar",
  body:[
   {p:"<b>chaque</b> (her, her zaman tekil): <b>chaque</b> jour. <b>plusieurs</b> (birçok, değişmez): <b>plusieurs</b> fois. <b>quelques</b> (birkaç): <b>quelques</b> amis.", tr:"Türkçedeki 'her/birçok/birkaç' sıfatlarının karşılığı — İngilizce each/several/a few ile birebir örtüşür."},
   {p:"'chaque' ASLA çoğul isimle kullanılmaz (her zaman tekil): 'chaque jour' ✓ 'chaque jours' ✗. 'plusieurs' ve 'quelques' ise her zaman çoğul isterler.", tr:"Bu üçlü arasındaki en yaygın hata: chaque'ı çoğul isimle kullanmak."}

  ex:[{t:"Chaque étudiant a un ordinateur.",tr:"Her öğrencinin bir bilgisayarı var."},{t:"J'ai plusieurs questions.",tr:"Birkaç (birçok) sorum var."},{t:"Il reste quelques places.",tr:"Birkaç yer kaldı."}],

   {q:"J'ai ___ amis à Paris. (birkaç)",fill:1,a:"quelques",e:"birkaç → quelques."}
  ]},
 {t:"Expressions de temps: depuis, pendant, il y a", d:"Süre ifadeleri",
  body:[
   {p:"<b>depuis</b> = -den beri (hâlâ devam eden): J'habite ici <b>depuis</b> 2020. <b>pendant</b> = süresince (belirli bir süre): J'ai voyagé <b>pendant</b> deux semaines.", tr:"'depuis' devam eden bir durumu, 'pendant' tamamlanmış/belirli bir süreyi anlatır."},
   {p:"<b>il y a</b> = önce (geçmişte belirli bir an): Je l'ai vu <b>il y a</b> trois jours. (Üç gün önce gördüm.)", tr:"Bu üçlü çok karıştırılır: depuis=beri, pendant=süresince, il y a=önce."}
  ],
  tip:"Test: cümle hâlâ devam eden bir durum mu (depuis), tamamlanmış bir süre mi (pendant), yoksa geçmişte bir an mı (il y a)? Bu üç soruyu sırayla sor.",
  ex:[{t:"Je travaille ici depuis trois ans.",tr:"Üç yıldır burada çalışıyorum."},{t:"Nous avons attendu pendant une heure.",tr:"Bir saat boyunca bekledik."},{t:"Elle est partie il y a dix minutes.",tr:"On dakika önce gitti."}],
  quiz:[
   {q:"J'apprends le français ___ deux ans. (hâlâ devam ediyor)",o:["pendant","depuis","il y a"],a:1,e:"Devam eden durum → depuis."},
   {q:"Il a dormi ___ dix heures. (tamamlanmış süre)",o:["depuis","pendant","il y a"],a:1,e:"Tamamlanmış süre → pendant."},
   {q:"'Beş dakika önce' → il y a cinq ___",fill:1,a:"minutes",e:"il y a + süre = önce."}
  ]}

FRGRAM2.B2=[
 {t:"Pronoms possessifs: le mien, la tienne...", d:"İyelik zamirleri",

   {p:"İsmi tekrarlamadan iyelik belirtir: <b>le mien</b> (benimki, eril), <b>la mienne</b> (benimki, dişil), <b>les tiens</b> (seninkiler): Ta voiture est rouge, <b>la mienne</b> est bleue.", tr:"Türkçedeki 'benimki/seninki' zamirlerinin karşılığı — hem cinsiyet hem sayı uyumu gerektirir."},
   {p:"Tam tablo: le mien/la mienne (benim), le tien/la tienne (senin), le sien/la sienne (onun), le nôtre/la nôtre (bizim), le vôtre/la vôtre (sizin), le leur/la leur (onların).", tr:"İyelik sıfatından (mon/ma) farklı olarak burada isim tamamen düşer, zamir tek başına isim yerine geçer."}

  ex:[{t:"Mon téléphone est cassé, je vais utiliser le tien.",tr:"Telefonum kırık, seninkini kullanacağım."},{t:"Cette maison est la nôtre.",tr:"Bu ev bizim."},{t:"Leurs enfants sont plus jeunes que les nôtres.",tr:"Onların çocukları bizimkilerden daha genç."}],

 {t:"Le subjonctif passé", d:"Geçmişe yönelik duygu/şüphe",

ITGRAM2.A1=[
 {t:"Aggettivi possessivi: il mio, il tuo", d:"Benim, senin, onun",
  body:[
   {p:"İyelik sıfatları genelde ARTİKELLE birlikte kullanılır ve isme (sahibe değil!) cinsiyet/sayı uyumu yapar: <b>il mio</b> libro, <b>la mia</b> casa, <b>i miei</b> libri.", tr:"Türkçedeki '-im/-in' iyelik eklerinin karşılığı; İtalyanca hem artikel hem sıfat gerektirir — 'mio libro' değil 'il mio libro'."},
   {p:"Aile üyeleriyle (tekil, yalın) artikel DÜŞER: <b>mia</b> madre, <b>mio</b> padre, <b>tuo</b> fratello. Ama çoğulda veya sıfatlıysa artikel geri döner: <b>i miei</b> fratelli, <b>la mia</b> cara madre.", tr:"Bu istisna sık kullanılan bir konudur: 'annem' = mia madre (artikelsiz) ama 'kardeşlerim' = i miei fratelli (artikelli)."}
  ],
  tip:"Aile üyesi + tekil + sıfatsız = artikel yok (mia madre). Bunun dışında her zaman artikel kullan (il mio, la mia, i miei, le mie).",
  ex:[{t:"Il mio fratello vive a Roma.",tr:"Erkek kardeşim Roma'da yaşıyor."},{t:"Dov'è la tua borsa?",tr:"Çantan nerede?"},{t:"Mia madre è medica.",tr:"Annem doktor (aile+tekil → artikelsiz)."}],

   {q:"'Kardeşlerim' (çoğul, artikel geri gelir) → ___ fratelli",fill:1,a:"i miei",e:"Çoğulda artikel döner: i miei fratelli."}
  ]},
 {t:"Verbi riflessivi: chiamarsi", d:"Kendine dönen fiiller",
  body:[
   {p:"Bazı fiiller dönüşlü zamir ister: <b>chiamarsi</b> (adı olmak), <b>alzarsi</b> (kalkmak), <b>lavarsi</b> (yıkanmak): Mi <b>chiamo</b> Anna. Si <b>alza</b> alle sette.", tr:"Türkçedeki '-in/-ün' dönüşlülük eki: 'adım Anna' kelimesi kelimesine 'kendimi Anna çağırıyorum' = mi chiamo Anna."},
   {p:"Dönüşlü zamirler: mi, ti, si, ci, vi, si — fiilden ÖNCE gelir (mastar hariç, o zaman sona yapışır: chiamar<b>si</b>).", tr:"Sözlükte mastar hep 'si' ekiyle görünür: bu, fiilin dönüşlü olduğunun işaretidir."}
  ],
  tip:"Zamir tablosu kısadır: mi/ti/si/ci/vi/si. 'io' ve 'tu' hariç herkes (lui/lei/loro) 'si' kullanır.",
  ex:[{t:"Come ti chiami?",tr:"Adın ne?"},{t:"Mi alzo alle sette.",tr:"Saat yedide kalkıyorum."},{t:"Lei si lava la mattina.",tr:"O sabahları yıkanır."}],
  quiz:[
   {q:"Io ___ chiamo Murat.",o:["mi","ti","si"],a:0,e:"io → mi."},
   {q:"A che ora ti ___?",o:["mi","alzi","ti"],a:1,e:"tu → ti alzi (fiil formu)."},
   {q:"Loro ___ lavano la sera.",fill:1,a:"si",e:"loro → si."}
  ]},
 {t:"Aggettivi dimostrativi: questo, quello", d:"Bu, şu, o",
  body:[
   {p:"<b>questo</b> (bu, yakın), <b>quello</b> (şu/o, uzak): <b>questo</b> libro (elimdeki), <b>quel</b> libro (uzaktaki). 'quello' artikel gibi davranır ve isme göre değişir: quel, quello, quella, quei, quegli, quelle.", tr:"Türkçedeki 'bu/şu/o' ayrımı — İtalyanca iki mesafe seviyesi kullanır, Fransızca/İspanyolca gibi üç değil."},
   {p:"'quello' ismin ilk harfine göre bile değişir (artikel gibi): <b>quel</b> ragazzo, <b>quello</b> studente (s+ünsüz), <b>quell'</b>amico (sesli harf).", tr:"Bu davranış tam olarak belirli artikelin (il/lo/l') davranışıyla aynıdır — aynı kuralları uygula."}
  ],
  tip:"'quello' kuralını öğrenmenin kısayolu: artikeli nasıl seçiyorsan (il/lo/l'), quello'yu da aynı mantıkla seç (quel/quello/quell'). İkisi paraleldir.",
  ex:[{t:"Questo libro è interessante.",tr:"Bu kitap ilginç."},{t:"Mi piace quella camicia.",tr:"Şu gömleği beğendim."},{t:"Quello studente è molto bravo.",tr:"O öğrenci çok başarılı."}],
  quiz:[
   {q:"___ macchina è nuova. (bu, dişil)",o:["questo","questa","questi"],a:1,e:"Dişil tekil → questa."},
   {q:"___ ragazzo è mio fratello. (o, eril, ünsüzle başlayan)",o:["quel","quello","quell'"],a:0,e:"Normal ünsüz → quel."},
   {q:"___ amico è simpatico. (o, sesli harfle başlayan)",fill:1,a:"quell'",e:"Sesli harf → quell'."}

];

ITGRAM2.A2=[
 {t:"Comparativi e superlativi", d:"Karşılaştırma ve enüstünlük",

 {t:"Avverbi di frequenza", d:"Sıklık zarfları",
  body:[
   {p:"<b>sempre</b> (her zaman), <b>spesso</b> (sık sık), <b>a volte</b> (bazen), <b>raramente</b> (nadiren), <b>mai</b> (asla). Genelde fiilden sonra: Bevo <b>sempre</b> il tè.", tr:"Türkçedeki 'her zaman, sık sık, bazen, nadiren, asla' sıralamasının aynısı."},

  ex:[{t:"Arriva sempre in orario.",tr:"O her zaman zamanında gelir."},{t:"Usciamo spesso il weekend.",tr:"Hafta sonları sık sık dışarı çıkarız."},{t:"Non beve mai caffè.",tr:"O asla kahve içmez."}],
  quiz:[

   {q:"'Her zaman' → ___",fill:1,a:"sempre",e:"sempre = her zaman."}

 {t:"Stare per + infinito", d:"Tam şimdi yapmak üzere olmak",
  body:[
   {p:"<b>stare per + infinito</b>: bir eylemin gerçekleşmek ÜZERE olduğunu bildirir: Sto per <b>uscire</b>. (Tam çıkıyordum/çıkmak üzereyim.)", tr:"Türkçedeki '-mek üzere' yapısının karşılığı — eylem çok yakında, neredeyse şu an gerçekleşecek."},
   {p:"'andare a + infinito' (gitmek + mastar) de yakın gelecek için kullanılır ama daha genel bir plan bildirir: Vado a <b>studiare</b>. (Çalışmaya gidiyorum/çalışacağım.)", tr:"'stare per' ÇOK yakın anı, 'andare a' biraz daha genel bir yakın planı anlatır."}

  tip:"'Il treno sta per partire!' (Tren kalkmak üzere!) — bu yapı aciliyet/heyecan katar, tam o anı vurgular.",

   {q:"'Çıkmak üzereyim' → Sto ___ uscire.",fill:1,a:"per",e:"stare per + infinito."}
  ]}

 {t:"Pronomi relativi: che, cui, il quale", d:"İlgi zamirleri",

  tip:"Başlangıçta hep 'che' kullan — neredeyse her durumda işe yarar. 'cui'yi sadece edattan sonra, 'il quale'yi sadece resmi/yazılı dilde devreye sok.",
  ex:[{t:"L'uomo che vive lì è medico.",tr:"Orada yaşayan adam doktor."},{t:"La persona di cui ti ho parlato è arrivata.",tr:"Sana bahsettiğim kişi geldi."},{t:"Il professore, il quale ha scritto il libro, è famoso.",tr:"Kitabı yazan profesör ünlü."}],

 {t:"Pronomi relativi avanzati: il quale, cui + preposizioni", d:"İleri ilgi zamirleri",
  body:[
   {p:"'il quale/la quale/i quali/le quali' edatlarla birlikte 'cui'nin daha net/resmi versiyonudur: la ragione <b>per la quale</b>... = la ragione <b>per cui</b>... (ikisi de doğru, il quale daha resmi).", tr:"'il quale' özellikle 'cui' belirsizlik yaratabileceğinde (birden fazla isim varsa) tercih edilir — hangi isme atıfta bulunduğu netleşir."},
   {p:"<b>il cui/la cui/i cui/le cui</b> = 'ki onun' (iyelik ilgi zamiri), takip ettiği isme uyum yapar: Lo scrittore <b>il cui</b> libro ho letto... (kitabını okuduğum yazar).", tr:"'cui' burada İngilizce 'whose' gibidir — sahip olunan şeyin cinsiyetine uyar, sahibinkine değil."}
  ],
  tip:"'il cui' sırası dikkat gerektirir: 'il cui' + isim bitişik durur ve İTALYANCA sırası TERS değildir (İngilizce 'whose book' gibi): lo scrittore il cui libro = yazar+kitabı (kelimesi kelimesine).",
  ex:[{t:"L'azienda per la quale lavoro è grande.",tr:"Çalıştığım şirket büyük."},{t:"Ha perso il treno, il che ha complicato tutto.",tr:"Treni kaçırdı, bu da her şeyi zorlaştırdı."},{t:"Lo scrittore il cui libro ha vinto il premio è giovane.",tr:"Kitabı ödül kazanan yazar genç."}],
  quiz:[
   {q:"La ragione per ___ sono arrivato tardi è il traffico.",o:["cui","il quale","che"],a:0,e:"Edattan sonra → cui (veya la quale)."},
   {q:"L'attore ___ film ha vinto un Oscar è famoso. (kimin filmi)",o:["cui","il cui","che"],a:1,e:"İyelik ilgi zamiri → il cui."},
   {q:"Non è venuto alla riunione, ___ ci ha sorpreso. (bu da)",fill:1,a:"il che",e:"Önceki cümleye atıf → il che."}
  ]},
 {t:"Verbi di cambiamento: diventare, farsi, rendersi", d:"Olmak fiilinin farklı halleri",
  body:[
   {p:"<b>diventare</b> = en genel 'olmak/hâline gelmek': È <b>diventato</b> medico. Si è <b>diventato</b> triste. <b>farsi</b> + sıfat = fiziksel/duygusal değişim: Si è <b>fatto</b> tardi.", tr:"Türkçedeki 'oldu/hale geldi' fiillerinin İtalyanca'daki nüansları — hangi TÜR değişim olduğuna göre farklı fiil seçilir."},
   {p:"<b>rendersi conto</b> = farkına varmak (sabit ifade): Mi sono <b>reso conto</b> dell'errore. <b>diventare</b> en yaygın ve güvenli seçimdir — emin değilsen onu kullan.", tr:"'diventare' İngilizce 'become' gibi en genel kullanımdır; diğerleri daha spesifik bağlamlarda tercih edilir."}
  ],
  tip:"Emin değilsen 'diventare' kullan — çoğu durumda doğrudur. 'farsi' daha çok zaman/hava ifadelerinde (si fa tardi = geç oluyor) veya fiziksel değişimde kullanılır.",
  ex:[{t:"È diventata una brava dottoressa.",tr:"İyi bir doktor oldu."},{t:"Si è fatto buio presto.",tr:"Erken karardı."},{t:"Mi sono reso conto del problema.",tr:"Sorunun farkına vardım."}],
  quiz:[
   {q:"Dopo anni di studio, si è ___ avvocato. (en genel 'oldu')",o:["diventato","fatto","reso"],a:0,e:"Genel değişim → diventare."},
   {q:"'Geç oluyor' → Si ___ tardi.",o:["diventa","fa","rende"],a:1,e:"Zaman ifadesi → farsi: si fa tardi."},
   {q:"'Farkına vardım' → Mi sono ___ conto.",fill:1,a:"reso",e:"rendersi conto = farkına varmak."}
  ]}
];

ITGRAM2.C1=[
 {t:"Il congiuntivo nelle relative", d:"Belirsiz/var olmayan varlıklar için congiuntivo",
  body:[
   {p:"İlgi cümlesindeki isim BELİRSİZ veya VAR OLMADIĞI biliniyorsa fiil congiuntivo alır: Cerco un impiegato <b>che parli</b> tedesco. (Belirli bir kişi değil, herhangi biri.) Karşılaştır: Ho un impiegato <b>che parla</b> tedesco (belirli, indicativo).", tr:"Türkçede bu ayrım gramerde görünmez ama İtalyanca 'aranan/var olmayan biri' ile 'bilinen biri' arasında fiil kipini değiştirir."},
   {p:"'non c'è nessuno che...', 'non conosco nessuno che...' gibi olumsuz+belirsizlik yapıları da her zaman congiuntivo ister: Non c'è nessuno che <b>sappia</b> la risposta.", tr:"Bu, İtalyancanın en ince gramer noktalarından biridir ve C1 sınavlarının favori konusudur."}
  ],
  tip:"Test: aradığın/tarif ettiğin kişi/şey SOMUT ve BELİRLİ mi (indicativo), yoksa VAR OLUP OLMADIĞI BELİRSİZ mi (congiuntivo)? 'Conosco qualcuno che sa' (belirli, var) vs 'Cerco qualcuno che sappia' (belirsiz, aranıyor).",
  ex:[{t:"Ho bisogno di un libro che spieghi bene questo argomento.",tr:"Bu konuyu iyi açıklayan bir kitaba ihtiyacım var (belirsiz, henüz bulunmadı)."},{t:"Non c'è niente che possiamo fare.",tr:"Yapabileceğimiz hiçbir şey yok."},{t:"Conosci qualcuno che parli russo?",tr:"Rusça konuşan birini tanıyor musun?"}],
  quiz:[
   {q:"Cerco una casa che ___ giardino. (avere, belirsiz)",o:["ha","abbia","avesse"],a:1,e:"Belirsiz/aranan → congiuntivo: abbia."},
   {q:"Ho un amico che ___ francese. (parlare, belirli/var olan)",o:["parli","parla","parlasse"],a:1,e:"Belirli, var olan → indicativo: parla."},
   {q:"Non conosco nessuno che ___ questo. (sapere, belirsiz+olumsuz)",fill:1,a:"sappia",e:"Olumsuz+belirsiz → congiuntivo: sappia."}
  ]},
 {t:"La nominalizzazione", d:"Fiili isme çevirmek — akademik yazı",
  body:[
   {p:"Konuşma dilindeki fiil cümleleri, akademik/resmi yazıda isim kalıplarına dönüşür: 'Abbiamo deciso di espandere' → 'La nostra <b>decisione</b> di espandere...'. 'Hanno analizzato i dati' → 'La loro <b>analisi</b> dei dati...'", tr:"Türkçede de resmi yazı fiilden çok isim kullanır ('karar aldık' yerine 'kararımız'), İtalyanca akademik yazıda bu dönüşüm sistematiktir."},
   {p:"Sık ekler: -zione (decidere→decisione), -mento (crescere→crescimento), -anza/-enza (differire→differenza), -ità (possibile→possibilità).", tr:"Bu isimler cümlenin öznesi olarak kullanılınca metni daha nesnel ve akademik kılar."}
  ],
  tip:"Akademik metni ağırlaştırmak için dene: özne+fiil → il/la + isim + di. 'L'azienda è cresciuta rapidamente' → 'La rapida crescita dell'azienda' — özne fiilden isme dönüşür.",
  ex:[{t:"L'implementazione della nuova politica ha causato ritardi.",tr:"Yeni politikanın uygulanması gecikmelere yol açtı."},{t:"Il suo rifiuto di scendere a compromessi ha concluso le trattative.",tr:"Uzlaşmayı reddetmesi görüşmeleri bitirdi."},{t:"La rapida crescita del settore ha sorpreso gli analisti.",tr:"Sektörün hızlı büyümesi analistleri şaşırttı."}],
  quiz:[
   {q:"'decidere' fiilinin isim hali:",o:["decidimento","decisione","decidenza"],a:1,e:"decidere → decisione."},

   {q:"'crescere' fiilinin isim hali: ___",fill:1,a:"crescita",e:"crescere → crescita."}
  ]}
];
